                                    <option value="all">🏪 Todas as Lojas</option>
                                    {STORES.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>
                            </div>
                            {filteredExchanges.length > 0 ? (
                                <div className="table-container">
                                    <table className="table">
                                        <thead><tr><th>Loja</th><th>Nº Venda</th><th>Data</th><th>Cliente</th><th>Vendedor</th><th>Diferença</th><th>Status</th><th>Ações</th></tr></thead>
                                        <tbody>
                                            {filteredExchanges.map(ex => (
                                                <tr key={`${ex.storeId}-${ex.id}`}>
                                                    <td style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>{ex.storeName}</td>
                                                    <td style={{ fontWeight: '700' }}>{ex.saleNumber}</td>
                                                    <td>{ex.date ? new Date(ex.date).toLocaleDateString('pt-BR') : '-'}</td>
                                                    <td>{ex.customerName}</td>
                                                    <td>{ex.salesPerson || '-'}</td>
                                                    <td><span style={{ color: ex.difference >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight: '700' }}>{fmt(ex.difference)}</span></td>
                                                    <td><span className={`badge badge-${ex.status}`}>{ex.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}</span></td>
                                                    <td><button className="btn btn-primary btn-small" onClick={() => setSelectedExchange(ex)}>👁️</button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            ) : (
                                <div className="empty-state"><div className="empty-state-icon">📭</div><p>Nenhuma troca encontrada</p></div>
                            )}
                        </div>
                        {selectedExchange && (
                            <ExchangeModal exchange={selectedExchange} storeId={selectedExchange.storeId}
                                onClose={() => setSelectedExchange(null)} readOnly={true} />
                        )}
                    </>
                )}
            </main>
        </div>
    );
}

// ─── NOVA TROCA ───────────────────────────────────────────────────────────────
function NewExchangePage({ storeId, inventory, showToast }) {
    const [form, setForm] = useState({
        saleNumber: '', customerName: '', customerCPF: '',
        salesPerson: '', date: new Date().toISOString().split('T')[0], observations: ''
    });
    const [outgoingItems, setOutgoingItems] = useState([]);
    const [incomingItems, setIncomingItems] = useState([]);
    const [photos, setPhotos] = useState([]);
    const [newOut, setNewOut] = useState({ description: '', value: '' });
    const [newIn, setNewIn]   = useState({ description: '', value: '', condition: 'Novo' });
    const [saving, setSaving] = useState(false);

    const outTotal   = outgoingItems.reduce((s, i) => s + parseFloat(i.value), 0);
    const inTotal    = incomingItems.reduce((s, i) => s + parseFloat(i.value), 0);
    const difference = outTotal - inTotal;

    const addOut = () => {
        if (!newOut.description || !newOut.value) return;
        setOutgoingItems(prev => [...prev, { id: Date.now(), description: newOut.description, value: parseFloat(newOut.value) }]);
        setNewOut({ description: '', value: '' });
    };
    const addIn = () => {
        if (!newIn.description || !newIn.value) return;
        setIncomingItems(prev => [...prev, { id: Date.now(), description: newIn.description, value: parseFloat(newIn.value), condition: newIn.condition }]);
        setNewIn({ description: '', value: '', condition: 'Novo' });
    };
    const handlePhoto = (e) => {
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => setPhotos(prev => [...prev, { id: Date.now() + Math.random(), url: ev.target.result }]);
            reader.readAsDataURL(file);
        });
    };

    const handleSubmit = async (e) => {
        e.preventDefault();
        if (!form.saleNumber || !form.customerName || !form.salesPerson) {
            showToast('Preencha todos os campos obrigatórios', 'error'); return;
        }
        if (outgoingItems.length === 0 || incomingItems.length === 0) {
            showToast('Adicione itens de saída e entrada', 'error'); return;
        }
        setSaving(true);
        try {
            await window.TrocaDB.salvarTroca(storeId, {
                ...form, outgoingItems, incomingItems, photos,
                outTotal, inTotal, difference, status: 'pending',
            });
            setForm({ saleNumber: '', customerName: '', customerCPF: '', salesPerson: '', date: new Date().toISOString().split('T')[0], observations: '' });
            setOutgoingItems([]); setIncomingItems([]); setPhotos([]);
            showToast('Troca registrada com sucesso! 🎉');
        } catch (err) {
            console.error(err);
            showToast('Erro ao salvar no Firebase. Tente novamente.', 'error');
        } finally {
            setSaving(false);
        }
    };

    const setF = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

    return (
        <div>
            <div className="header"><h1 className="page-title">➕ Nova Troca</h1><p className="page-subtitle">Registre uma nova troca de produtos</p></div>
            <form onSubmit={handleSubmit}>
                <div className="card">
                    <h2 className="card-title">📝 Informações da Venda</h2>
                    <div className="form-row">
                        <div className="form-group"><label className="form-label">Nº da Venda *</label><input type="text" className="form-input" value={form.saleNumber} onChange={e => setF('saleNumber', e.target.value)} placeholder="Ex: 12345" required /></div>
                        <div className="form-group"><label className="form-label">Nome do Cliente *</label><input type="text" className="form-input" value={form.customerName} onChange={e => setF('customerName', e.target.value)} placeholder="Nome completo" required /></div>
                    </div>
                    <div className="form-row">
                        <div className="form-group"><label className="form-label">CPF</label><input type="text" className="form-input" value={form.customerCPF} onChange={e => setF('customerCPF', e.target.value)} placeholder="000.000.000-00" /></div>
                        <div className="form-group"><label className="form-label">Vendedor *</label><input type="text" className="form-input" value={form.salesPerson} onChange={e => setF('salesPerson', e.target.value)} placeholder="Nome do vendedor" required /></div>
                        <div className="form-group"><label className="form-label">Data *</label><input type="date" className="form-input" value={form.date} onChange={e => setF('date', e.target.value)} required /></div>
                    </div>
                    <div className="form-group"><label className="form-label">Observações</label><textarea className="form-textarea" value={form.observations} onChange={e => setF('observations', e.target.value)} placeholder="Observações adicionais..." /></div>
                </div>
                <div className="card">
                    <h2 className="card-title">📤 Produtos de Saída</h2>
                    <div className="form-row">
                        <div className="form-group"><label className="form-label">Descrição</label><input type="text" className="form-input" value={newOut.description} onChange={e => setNewOut({...newOut, description: e.target.value})} placeholder="Ex: Camiseta Azul M" list="inv-list" /></div>
                        <div className="form-group"><label className="form-label">Valor (R$)</label><input type="number" step="0.01" className="form-input" value={newOut.value} onChange={e => setNewOut({...newOut, value: e.target.value})} placeholder="0.00" /></div>
                        <div className="form-group" style={{ display:'flex', alignItems:'flex-end' }}><button type="button" className="btn btn-primary" onClick={addOut} style={{ width:'100%' }}>➕ Adicionar</button></div>
                    </div>
                    <datalist id="inv-list">{inventory.map(i => <option key={i.id} value={i.product} />)}</datalist>
                    {outgoingItems.length > 0 && (
                        <div className="item-list">
                            {outgoingItems.map(item => (
                                <div key={item.id} className="item-card">
                                    <div className="item-info"><div className="item-description">{item.description}</div><div className="item-value">{fmt(item.value)}</div></div>
                                    <button type="button" className="btn btn-danger btn-small" onClick={() => setOutgoingItems(prev => prev.filter(i => i.id !== item.id))}>🗑️</button>
                                </div>
                            ))}
                            <div style={{ textAlign:'right', fontWeight:'700', padding:'1rem', background:'var(--bg-dark)', borderRadius:'12px' }}>Total de Saída: <span style={{ color:'var(--accent)' }}>{fmt(outTotal)}</span></div>
                        </div>
                    )}
                </div>
                <div className="card">
                    <h2 className="card-title">📥 Produtos de Entrada</h2>
                    <div className="form-row">
                        <div className="form-group"><label className="form-label">Descrição</label><input type="text" className="form-input" value={newIn.description} onChange={e => setNewIn({...newIn, description: e.target.value})} placeholder="Ex: Calça Preta 38" list="inv-list" /></div>
                        <div className="form-group"><label className="form-label">Valor (R$)</label><input type="number" step="0.01" className="form-input" value={newIn.value} onChange={e => setNewIn({...newIn, value: e.target.value})} placeholder="0.00" /></div>
                        <div className="form-group"><label className="form-label">Condição</label>
                            <select className="form-select" value={newIn.condition} onChange={e => setNewIn({...newIn, condition: e.target.value})}>
                                <option>Novo</option><option>Usado - Ótimo</option><option>Usado - Bom</option><option>Usado - Regular</option><option>Danificado</option>
                            </select>
                        </div>
                        <div className="form-group" style={{ display:'flex', alignItems:'flex-end' }}><button type="button" className="btn btn-primary" onClick={addIn} style={{ width:'100%' }}>➕ Adicionar</button></div>
                    </div>
                    {incomingItems.length > 0 && (
                        <div className="item-list">
                            {incomingItems.map(item => (
                                <div key={item.id} className="item-card">
                                    <div className="item-info"><div className="item-description">{item.description}</div><div className="item-value">{fmt(item.value)}</div><div className="item-condition">Condição: {item.condition}</div></div>
                                    <button type="button" className="btn btn-danger btn-small" onClick={() => setIncomingItems(prev => prev.filter(i => i.id !== item.id))}>🗑️</button>
                                </div>
                            ))}
                            <div style={{ textAlign:'right', fontWeight:'700', padding:'1rem', background:'var(--bg-dark)', borderRadius:'12px' }}>Total de Entrada: <span style={{ color:'var(--success)' }}>{fmt(inTotal)}</span></div>
                        </div>
                    )}
                </div>
                <div className="card">
                    <h2 className="card-title">📸 Fotos dos Produtos</h2>
                    <div style={{ padding:'0.75rem', background:'rgba(247,179,43,0.1)', borderRadius:'8px', border:'1px solid var(--accent)', marginBottom:'1rem', fontSize:'0.9rem', color:'var(--accent)' }}>
                        ⚠️ As fotos ficam armazenadas <strong>localmente neste dispositivo</strong> por limitação de tamanho do Firestore.
                    </div>
                    <input type="file" accept="image/*" multiple onChange={handlePhoto} style={{ display:'none' }} id="photo-upload" />
                    <label htmlFor="photo-upload" className="btn btn-secondary">📷 Adicionar Fotos</label>
                    {photos.length > 0 && (
                        <div className="photos-grid" style={{ marginTop:'1rem' }}>
                            {photos.map(photo => (
                                <div key={photo.id} className="photo-preview">
                                    <img src={photo.url} alt="Produto" />
                                    <button type="button" className="photo-remove" onClick={() => setPhotos(prev => prev.filter(p => p.id !== photo.id))}>×</button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
                {outgoingItems.length > 0 && incomingItems.length > 0 && (
                    <div className="card" style={{ background: difference >= 0 ? 'rgba(6,214,160,0.1)' : 'rgba(239,71,111,0.1)', border:`2px solid ${difference >= 0 ? 'var(--success)' : 'var(--danger)'}` }}>
                        <div style={{ textAlign:'center' }}>
                            <div style={{ fontSize:'1.1rem', marginBottom:'1rem', color:'var(--text-secondary)' }}>💰 Diferença da Troca</div>
                            <div style={{ fontSize:'3rem', fontWeight:'800', fontFamily:'Syne, sans-serif', color: difference >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(Math.abs(difference))}</div>
                            <div style={{ fontSize:'1.1rem', color:'var(--text-secondary)', marginTop:'0.5rem' }}>
                                {difference > 0 && '↗️ Cliente deve pagar'}
                                {difference < 0 && '↙️ Cliente deve receber'}
                                {difference === 0 && '✅ Troca equilibrada'}
                            </div>
                        </div>
                    </div>
                )}
                <button type="submit" className="btn btn-success" style={{ width:'100%' }} disabled={saving}>
                    {saving ? '⏳ Salvando no Firebase…' : '✅ Registrar Troca'}
                </button>
            </form>
        </div>
    );
}

// ─── CALENDÁRIO (loja individual) ─────────────────────────────────────────────
function CalendarView({ exchanges, onSelectExchange }) {
    const today = new Date();
    const [viewYear,  setViewYear]  = useState(today.getFullYear());
    const [viewMonth, setViewMonth] = useState(today.getMonth());
    const [selectedDay, setSelectedDay] = useState(null);

    const exchangesByDay = useMemo(() => {
        const map = {};
        exchanges.forEach(ex => {
            if (!ex.date) return;
            const d = parseDateKey(ex.date);
            if (!d) return;
            const k = dateKey(d);
            if (!map[k]) map[k] = [];
            map[k].push(ex);
        });
        return map;
    }, [exchanges]);

    const monthExchanges = useMemo(() => {
        return exchanges.filter(ex => {
            if (!ex.date) return false;
            const d = parseDateKey(ex.date);
            if (!d) return false;
            return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
        });
    }, [exchanges, viewYear, viewMonth]);

    const calendarDays = useMemo(() => {
        const firstDay = new Date(viewYear, viewMonth, 1);
        const lastDay  = new Date(viewYear, viewMonth + 1, 0);
        const startWd  = firstDay.getDay();
        const days = [];
        for (let i = startWd - 1; i >= 0; i--) {
            days.push({ date: new Date(viewYear, viewMonth, -i), otherMonth: true });
        }
        for (let i = 1; i <= lastDay.getDate(); i++) {
            days.push({ date: new Date(viewYear, viewMonth, i), otherMonth: false });
        }
        const remaining = 7 - (days.length % 7);
        if (remaining < 7) {
            for (let i = 1; i <= remaining; i++) {
                days.push({ date: new Date(viewYear, viewMonth + 1, i), otherMonth: true });
            }
        }
        return days;
    }, [viewYear, viewMonth]);

    const prevMonth = () => {
        if (viewMonth === 0) { setViewYear(y => y - 1); setViewMonth(11); }
        else setViewMonth(m => m - 1);
        setSelectedDay(null);
    };
    const nextMonth = () => {
        if (viewMonth === 11) { setViewYear(y => y + 1); setViewMonth(0); }
        else setViewMonth(m => m + 1);
        setSelectedDay(null);
    };
    const goToday = () => { setViewYear(today.getFullYear()); setViewMonth(today.getMonth()); setSelectedDay(null); };

    const todayKey = dateKey(today);
    const selectedKey = selectedDay ? dateKey(selectedDay) : null;
    const selectedDayExchanges = selectedKey ? (exchangesByDay[selectedKey] || []) : [];

    const monthPending   = monthExchanges.filter(e => e.status === 'pending').length;
    const monthDiff      = monthExchanges.reduce((s, e) => s + (e.difference || 0), 0);

    return (
        <div>
            <div className="calendar-nav">
                <div style={{ display:'flex', gap:'0.5rem', alignItems:'center' }}>
                    <button className="calendar-nav-btn" onClick={prevMonth}>‹</button>
                    <button className="calendar-nav-btn" onClick={nextMonth}>›</button>
                    <button className="btn btn-outline btn-small" style={{ marginLeft:'0.5rem' }} onClick={goToday}>Hoje</button>
                </div>
                <div className="calendar-month-label">{MONTH_NAMES_PT[viewMonth]} {viewYear}</div>
                <div style={{ fontSize:'0.9rem', color:'var(--text-secondary)' }}>
                    {monthExchanges.length} troca{monthExchanges.length !== 1 ? 's' : ''} no mês
                </div>
            </div>
            <div className="calendar-summary-bar">
                <div className="cal-summary-item">
                    <span className="cal-summary-value" style={{ color:'var(--text-primary)' }}>{monthExchanges.length}</span>
                    <div className="cal-summary-label">Total do Mês</div>
                </div>
                <div className="cal-summary-item">
                    <span className="cal-summary-value" style={{ color:'var(--warning)' }}>{monthPending}</span>
                    <div className="cal-summary-label">⏳ Pendentes</div>
                </div>
                <div className="cal-summary-item">
                    <span className="cal-summary-value" style={{ color: monthDiff >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(Math.abs(monthDiff))}</span>
                    <div className="cal-summary-label">{monthDiff >= 0 ? '↗️ A receber' : '↙️ A devolver'}</div>
                </div>
            </div>
            <div className="calendar-grid">
                {DAY_NAMES_PT.map(d => <div key={d} className="calendar-weekday">{d}</div>)}
                {calendarDays.map(({ date, otherMonth }, idx) => {
                    const k    = dateKey(date);
                    const exs  = exchangesByDay[k] || [];
                    const isToday = k === todayKey;
                    const isSel   = k === selectedKey && !otherMonth;
                    let cls = 'calendar-day';
                    if (otherMonth) cls += ' other-month';
                    if (exs.length > 0 && !otherMonth) cls += ' has-exchanges';
                    if (isToday) cls += ' today';
                    if (isSel) cls += ' selected';
                    const handleClick = () => {
                        if (otherMonth || exs.length === 0) return;
                        setSelectedDay(isSel ? null : date);
                    };
                    const MAX_PILLS = 2;
                    return (
                        <div key={idx} className={cls} onClick={handleClick}>
                            <div className="day-number">
                                {date.getDate()}
                                {isToday && <span className="day-today-dot" title="Hoje"></span>}
                            </div>
                            {!otherMonth && exs.slice(0, MAX_PILLS).map(ex => (
                                <span key={ex.id} className={`day-exchange-pill ${ex.status}`} title={`${ex.saleNumber} – ${ex.customerName}`}>
                                    {ex.saleNumber}
                                </span>
                            ))}
                            {!otherMonth && exs.length > MAX_PILLS && (
                                <span className="day-more-pill">+{exs.length - MAX_PILLS} mais</span>
                            )}
                        </div>
                    );
                })}
            </div>
            {selectedDay && selectedDayExchanges.length > 0 && (
                <div className="cal-day-detail">
                    <div className="cal-day-detail-title">
                        <span>
                            📅 {selectedDay.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' })}
                            <span style={{ marginLeft:'0.75rem', fontSize:'0.9rem', color:'var(--text-secondary)', fontWeight:'400' }}>
                                {selectedDayExchanges.length} troca{selectedDayExchanges.length > 1 ? 's' : ''}
                            </span>
                        </span>
                        <button className="cal-day-detail-close" onClick={() => setSelectedDay(null)}>×</button>
                    </div>
                    {selectedDayExchanges.map(ex => (
                        <div key={ex.id} className="cal-exchange-row" onClick={() => onSelectExchange(ex)}>
                            <div>
                                <div style={{ fontWeight:'700' }}>#{ex.saleNumber} — {ex.customerName}</div>
                                <div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>Vendedor: {ex.salesPerson || '-'}</div>
                            </div>
                            <div style={{ textAlign:'right' }}>
                                <div style={{ fontWeight:'700', color: ex.difference >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(ex.difference)}</div>
                                <span className={`badge badge-${ex.status}`} style={{ padding:'0.2rem 0.6rem', fontSize:'0.75rem' }}>
                                    {ex.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}
                                </span>
                            </div>
                        </div>
                    ))}
                </div>
            )}
            {monthExchanges.length > 0 && (
                <div className="month-exchange-list">
                    <div className="month-list-title">📋 Todas as trocas de {MONTH_NAMES_PT[viewMonth]}</div>
                    <div className="table-container">
                        <table className="table">
                            <thead><tr><th>Data</th><th>Nº Venda</th><th>Cliente</th><th>Vendedor</th><th>Diferença</th><th>Status</th><th></th></tr></thead>
                            <tbody>
                                {monthExchanges
                                    .slice()
                                    .sort((a,b) => {
                                        const da = parseDateKey(a.date);
                                        const db_ = parseDateKey(b.date);
                                        return (db_ ? db_.getTime() : 0) - (da ? da.getTime() : 0);
                                    })
                                    .map(ex => (
                                        <tr key={ex.id} style={{ cursor:'pointer' }} onClick={() => onSelectExchange(ex)}>
                                            <td>{ex.date ? parseDateKey(ex.date).toLocaleDateString('pt-BR') : '-'}</td>
                                            <td style={{ fontWeight:'700' }}>{ex.saleNumber}</td>
                                            <td>{ex.customerName}</td>
                                            <td>{ex.salesPerson || '-'}</td>
                                            <td><span style={{ color: ex.difference >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight:'700' }}>{fmt(ex.difference)}</span></td>
                                            <td><span className={`badge badge-${ex.status}`}>{ex.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}</span></td>
                                            <td><button className="btn btn-primary btn-small" onClick={e => { e.stopPropagation(); onSelectExchange(ex); }}>👁️</button></td>
                                        </tr>
                                    ))
                                }
                            </tbody>
                        </table>
                    </div>
                </div>
            )}
            {monthExchanges.length === 0 && (
                <div className="empty-state" style={{ marginTop:'2rem' }}>
                    <div className="empty-state-icon">🗓️</div>
                    <p>Nenhuma troca em {MONTH_NAMES_PT[viewMonth]} {viewYear}</p>
                </div>
            )}
        </div>
    );
}

// ─── HISTÓRICO ────────────────────────────────────────────────────────────────
function HistoryPage({ storeId, exchanges, showToast }) {
    const [historyView, setHistoryView] = useState('calendar');
    const [filter, setFilter] = useState('all');
    const [search, setSearch] = useState('');
    const [selectedExchange, setSelectedExchange] = useState(null);

    const filtered = exchanges.filter(ex => {
        const matchFilter = filter === 'all' || ex.status === filter;
        const s = search.toLowerCase();
        const matchSearch = (ex.saleNumber||'').toLowerCase().includes(s) ||
            (ex.customerName||'').toLowerCase().includes(s) ||
            (ex.salesPerson||'').toLowerCase().includes(s);
        return matchFilter && matchSearch;
    });

    const handleDelete = async (id) => {
        if (!confirm('Excluir esta troca permanentemente?')) return;
        try {
            await window.TrocaDB.deletarTroca(storeId, id);
            showToast('Troca excluída');
        } catch {
            showToast('Erro ao excluir', 'error');
        }
    };

    return (
        <div>
            <div className="header">
                <h1 className="page-title">📋 Histórico de Trocas</h1>
                <p className="page-subtitle">Dados sincronizados em tempo real com Firebase</p>
            </div>
            <div className="view-toggle">
                <button className={`view-toggle-btn ${historyView === 'calendar' ? 'active' : ''}`} onClick={() => setHistoryView('calendar')}>🗓️ Calendário</button>
                <button className={`view-toggle-btn ${historyView === 'list' ? 'active' : ''}`} onClick={() => setHistoryView('list')}>📋 Lista</button>
            </div>
            {historyView === 'calendar' && (
                <div className="card">
                    <CalendarView exchanges={exchanges} onSelectExchange={setSelectedExchange} />
                </div>
            )}
            {historyView === 'list' && (
                <>
                    <div className="card">
                        <div className="filters">
                            <div className="form-group" style={{ flex:1, margin:0 }}>
                                <input type="text" className="form-input" placeholder="🔍 Buscar por nº venda, cliente ou vendedor..."
                                    value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            <select className="form-select" value={filter} onChange={e => setFilter(e.target.value)} style={{ width:'auto' }}>
                                <option value="all">📊 Todas</option>
                                <option value="pending">⏳ Pendentes</option>
                                <option value="confirmed">✅ Confirmadas</option>
                            </select>
                        </div>
                    </div>
                    {filtered.length > 0 ? (
                        <div className="card">
                            <div className="table-container">
                                <table className="table">
                                    <thead><tr><th>Nº Venda</th><th>Data</th><th>Cliente</th><th>Vendedor</th><th>Diferença</th><th>Status</th><th>Ações</th></tr></thead>
                                    <tbody>
                                        {filtered.map(ex => (
                                            <tr key={ex.id}>
                                                <td style={{ fontWeight:'700' }}>{ex.saleNumber}</td>
                                                <td>{ex.date ? new Date(ex.date).toLocaleDateString('pt-BR') : '-'}</td>
                                                <td>{ex.customerName}</td>
                                                <td>{ex.salesPerson || '-'}</td>
                                                <td><span style={{ color: ex.difference >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight:'700' }}>{fmt(ex.difference)}</span></td>
                                                <td><span className={`badge badge-${ex.status}`}>{ex.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}</span></td>
                                                <td>
                                                    <div style={{ display:'flex', gap:'0.5rem' }}>
                                                        <button className="btn btn-primary btn-small" onClick={() => setSelectedExchange(ex)}>👁️</button>
                                                        <button className="btn btn-danger btn-small" onClick={() => handleDelete(ex.id)}>🗑️</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ) : (
                        <div className="card"><div className="empty-state"><div className="empty-state-icon">📭</div><p>Nenhuma troca encontrada</p></div></div>
                    )}
                </>
            )}
            {selectedExchange && (
                <ExchangeModal
                    exchange={selectedExchange}
                    storeId={storeId}
                    onClose={() => setSelectedExchange(null)}
                    onStatusChange={() => { showToast('Status atualizado ✅'); setSelectedExchange(null); }}
                />
            )}
        </div>
    );
}

// ─── ESTOQUE ──────────────────────────────────────────────────────────────────
function InventoryPage({ inventory, onSave, showToast }) {
    const [editingId, setEditingId] = useState(null);
    const [editForm, setEditForm] = useState({});
    const [search, setSearch] = useState('');
    const [newProduct, setNewProduct] = useState({ product:'', barcode:'', group:'', line:'', quantity:'', minQuantity:'', price:'' });

    const filtered = inventory.filter(item => {
        const s = search.toLowerCase();
        return (item.product||'').toLowerCase().includes(s) ||
            (item.barcode||'').toString().includes(s) ||
            (item.group||'').toLowerCase().includes(s) ||
            (item.line||'').toLowerCase().includes(s);
    });

    const getStatus = (q, m) => q === 0 ? 'out-of-stock' : q <= m ? 'low-stock' : 'in-stock';
    const getLabel  = (q, m) => q === 0 ? '❌ Esgotado' : q <= m ? '⚠️ Estoque Baixo' : '✅ Disponível';

    const addProduct = async () => {
        if (!newProduct.product || !newProduct.quantity || !newProduct.price) return;
        const updated = [...inventory, {
            id: Date.now(), product: newProduct.product, barcode: newProduct.barcode,
            group: newProduct.group, line: newProduct.line,
            quantity: parseInt(newProduct.quantity), minQuantity: parseInt(newProduct.minQuantity || 5),
            price: parseFloat(newProduct.price)
        }];
        await onSave(updated);
        setNewProduct({ product:'', barcode:'', group:'', line:'', quantity:'', minQuantity:'', price:'' });
        showToast('Produto adicionado');
    };

    const saveEdit = async () => {
        const updated = inventory.map(i => i.id === editingId ? editForm : i);
        await onSave(updated);
        setEditingId(null);
        showToast('Produto atualizado');
    };

    const deleteProduct = async (id) => {
        if (!confirm('Excluir este produto?')) return;
        await onSave(inventory.filter(i => i.id !== id));
        showToast('Produto removido');
    };

    return (
        <div>
            <div className="header"><h1 className="page-title">📦 Controle de Estoque</h1><p className="page-subtitle">Gerencie o estoque de produtos</p></div>
            <div className="stats-grid">
                <div className="stat-card"><span className="stat-icon">📦</span><span className="stat-value">{inventory.length}</span><span className="stat-label">Total de Produtos</span></div>
                <div className="stat-card"><span className="stat-icon">✅</span><span className="stat-value">{inventory.filter(i => i.quantity > i.minQuantity).length}</span><span className="stat-label">Em Estoque</span></div>
                <div className="stat-card"><span className="stat-icon">⚠️</span><span className="stat-value">{inventory.filter(i => i.quantity > 0 && i.quantity <= i.minQuantity).length}</span><span className="stat-label">Estoque Baixo</span></div>
                <div className="stat-card"><span className="stat-icon">❌</span><span className="stat-value">{inventory.filter(i => i.quantity === 0).length}</span><span className="stat-label">Esgotados</span></div>
            </div>
            <div className="card">
                <h2 className="card-title">➕ Adicionar Produto</h2>
                <div className="form-row">
                    <div className="form-group"><input type="text" className="form-input" placeholder="Código de Barras" value={newProduct.barcode} onChange={e => setNewProduct({...newProduct, barcode: e.target.value})} /></div>
                    <div className="form-group"><input type="text" className="form-input" placeholder="Nome do Produto *" value={newProduct.product} onChange={e => setNewProduct({...newProduct, product: e.target.value})} /></div>
                    <div className="form-group"><input type="text" className="form-input" placeholder="Grupo" value={newProduct.group} onChange={e => setNewProduct({...newProduct, group: e.target.value})} /></div>
                    <div className="form-group"><input type="text" className="form-input" placeholder="Linha" value={newProduct.line} onChange={e => setNewProduct({...newProduct, line: e.target.value})} /></div>
                </div>
                <div className="form-row">
                    <div className="form-group"><input type="number" className="form-input" placeholder="Quantidade *" value={newProduct.quantity} onChange={e => setNewProduct({...newProduct, quantity: e.target.value})} /></div>
                    <div className="form-group"><input type="number" className="form-input" placeholder="Qtd Mínima" value={newProduct.minQuantity} onChange={e => setNewProduct({...newProduct, minQuantity: e.target.value})} /></div>
                    <div className="form-group"><input type="number" step="0.01" className="form-input" placeholder="Preço *" value={newProduct.price} onChange={e => setNewProduct({...newProduct, price: e.target.value})} /></div>
                    <div className="form-group"><button className="btn btn-success" onClick={addProduct} style={{ width:'100%' }}>➕ Adicionar</button></div>
                </div>
            </div>
            <div className="card">
                <div className="form-group" style={{ marginBottom:'1.5rem' }}>
                    <input type="text" className="form-input" placeholder="🔍 Buscar produto, código de barras, grupo ou linha..."
                        value={search} onChange={e => setSearch(e.target.value)} />
                </div>
                <div className="table-container">
                    <table className="table">
                        <thead><tr><th>Cód. Barras</th><th>Produto</th><th>Grupo</th><th>Linha</th><th>Qtd</th><th>Mín.</th><th>Preço</th><th>Status</th><th>Ações</th></tr></thead>
                        <tbody>
                            {filtered.map(item => (
                                <tr key={item.id}>
                                    <td style={{ fontFamily:'monospace', fontSize:'0.9rem' }}>{item.barcode || '-'}</td>
                                    <td>{editingId === item.id ? <input type="text" className="form-input" value={editForm.product} onChange={e => setEditForm({...editForm, product: e.target.value})} /> : <strong>{item.product}</strong>}</td>
                                    <td style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>{item.group || '-'}</td>
                                    <td style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>{item.line || '-'}</td>
                                    <td>{editingId === item.id ? <input type="number" className="form-input" value={editForm.quantity} onChange={e => setEditForm({...editForm, quantity: parseInt(e.target.value)})} /> : <span style={{ fontWeight:'700' }}>{item.quantity}</span>}</td>
                                    <td>{editingId === item.id ? <input type="number" className="form-input" value={editForm.minQuantity} onChange={e => setEditForm({...editForm, minQuantity: parseInt(e.target.value)})} /> : item.minQuantity}</td>
                                    <td>{editingId === item.id ? <input type="number" step="0.01" className="form-input" value={editForm.price} onChange={e => setEditForm({...editForm, price: parseFloat(e.target.value)})} /> : fmt(item.price)}</td>
                                    <td><span className={`stock-badge ${getStatus(item.quantity, item.minQuantity)}`}>{getLabel(item.quantity, item.minQuantity)}</span></td>
                                    <td>
                                        {editingId === item.id ? (
                                            <div style={{ display:'flex', gap:'0.5rem' }}>
                                                <button className="btn btn-success btn-small" onClick={saveEdit}>✅</button>
                                                <button className="btn btn-secondary btn-small" onClick={() => setEditingId(null)}>❌</button>
                                            </div>
                                        ) : (
                                            <div style={{ display:'flex', gap:'0.5rem' }}>
                                                <button className="btn btn-primary btn-small" onClick={() => { setEditingId(item.id); setEditForm(item); }}>✏️</button>
                                                <button className="btn btn-danger btn-small" onClick={() => deleteProduct(item.id)}>🗑️</button>
                                            </div>
                                        )}
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    );
}

// ─── RELATÓRIOS ───────────────────────────────────────────────────────────────
function ReportsPage({ exchanges, storeName }) {
    const totalOut  = exchanges.reduce((s, e) => s + (e.outTotal||0), 0);
    const totalIn   = exchanges.reduce((s, e) => s + (e.inTotal||0), 0);
    const totalDiff = exchanges.reduce((s, e) => s + (e.difference||0), 0);

    const exportExcel = () => {
        if (!exchanges.length) { alert('Não há dados para exportar'); return; }
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
            ['Relatório de Trocas - ' + storeName],
            ['Gerado em:', new Date().toLocaleString('pt-BR')],[''],
            ['Total de Trocas:', exchanges.length],
            ['Pendentes:', exchanges.filter(e => e.status === 'pending').length],
            ['Confirmadas:', exchanges.filter(e => e.status === 'confirmed').length],
        ]), 'Resumo');
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exchanges.map(ex => ({
            'Nº Venda': ex.saleNumber, 'Data': ex.date ? new Date(ex.date).toLocaleDateString('pt-BR') : '-',
            'Cliente': ex.customerName, 'CPF': ex.customerCPF||'', 'Vendedor': ex.salesPerson||'',
            'Valor Saída': ex.outTotal, 'Valor Entrada': ex.inTotal, 'Diferença': ex.difference,
            'Status': ex.status === 'pending' ? 'Pendente' : 'Confirmado', 'Observações': ex.observations||''
        }))), 'Trocas');
        XLSX.writeFile(wb, `trocas-${storeName.replace(/\s/g,'-')}-${new Date().toISOString().split('T')[0]}.xlsx`);
    };

    const topProducts = Object.entries(
        exchanges.reduce((acc, ex) => {
            (ex.incomingItems||[]).forEach(item => {
                if (!acc[item.description]) acc[item.description] = { count:0, total:0 };
                acc[item.description].count++;
                acc[item.description].total += parseFloat(item.value||0);
            });
            return acc;
        }, {})
    ).sort((a,b) => b[1].count - a[1].count).slice(0, 10);

    return (
        <div>
            <div className="header"><h1 className="page-title">📊 Relatórios</h1><p className="page-subtitle">Visualize dados e exporte relatórios</p></div>
            <div className="action-buttons"><button className="btn btn-success" onClick={exportExcel}>📥 Exportar Relatório (Excel)</button></div>
            <div className="stats-grid">
                <div className="stat-card"><span className="stat-icon">📊</span><span className="stat-value">{exchanges.length}</span><span className="stat-label">Total de Trocas</span></div>
                <div className="stat-card"><span className="stat-icon">⏳</span><span className="stat-value">{exchanges.filter(e => e.status==='pending').length}</span><span className="stat-label">Pendentes</span></div>
                <div className="stat-card"><span className="stat-icon">✅</span><span className="stat-value">{exchanges.filter(e => e.status==='confirmed').length}</span><span className="stat-label">Confirmadas</span></div>
                <div className="stat-card"><span className="stat-icon">💰</span><span className="stat-value">{fmt(Math.abs(totalDiff))}</span><span className="stat-label">Diferença Total</span></div>
            </div>
            <div className="card">
                <h2 className="card-title">💵 Valores Movimentados</h2>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px, 1fr))', gap:'2rem' }}>
                    <div><div style={{ fontSize:'0.9rem', color:'var(--text-secondary)', marginBottom:'0.5rem' }}>Total Saída</div><div style={{ fontSize:'2rem', fontWeight:'800', color:'var(--danger)' }}>{fmt(totalOut)}</div></div>
                    <div><div style={{ fontSize:'0.9rem', color:'var(--text-secondary)', marginBottom:'0.5rem' }}>Total Entrada</div><div style={{ fontSize:'2rem', fontWeight:'800', color:'var(--success)' }}>{fmt(totalIn)}</div></div>
                </div>
            </div>
            {topProducts.length > 0 && (
                <div className="card">
                    <h2 className="card-title">🏆 Top 10 Produtos Mais Trocados</h2>
                    <div className="table-container">
                        <table className="table">
                            <thead><tr><th>Produto</th><th>Quantidade</th><th>Valor Total</th></tr></thead>
                            <tbody>
                                {topProducts.map(([product, data], i) => (
                                    <tr key={product}><td><strong>#{i+1}</strong> {product}</td><td><strong>{data.count}x</strong></td><td>{fmt(data.total)}</td></tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            )}
        </div>
    );
}

// ─── MODAL DE TROCA ───────────────────────────────────────────────────────────
function ExchangeModal({ exchange, storeId, onClose, onStatusChange, readOnly }) {
    const [confirming, setConfirming] = useState(false);

    const handleConfirm = async () => {
        if (!confirm('Confirmar que todos os itens foram conferidos?')) return;
        setConfirming(true);
        try {
            await window.TrocaDB.atualizarStatus(storeId, exchange.id, 'confirmed');
            onStatusChange && onStatusChange(exchange.id, 'confirmed');
        } catch {
            alert('Erro ao atualizar status');
        } finally {
            setConfirming(false);
        }
    };

    return (
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content" onClick={e => e.stopPropagation()}>
                <div className="modal-header">
                    <h2 className="modal-title">📋 Detalhes da Troca</h2>
                    <button className="modal-close" onClick={onClose}>×</button>
                </div>
                <div className="modal-body">
                    <div style={{ marginBottom:'1.5rem' }}>
                        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'1rem', alignItems:'center' }}>
                            <div><div style={{ fontSize:'0.85rem', color:'var(--text-secondary)', marginBottom:'0.25rem' }}>VENDA</div><div style={{ fontSize:'1.5rem', fontWeight:'700' }}>{exchange.saleNumber}</div></div>
                            <span className={`badge badge-${exchange.status}`}>{exchange.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}</span>
                        </div>
                        {exchange.storeName && (
                            <div style={{ marginBottom:'1rem' }}>
                                <div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>Loja</div>
                                <div style={{ fontWeight:'600' }}>{exchange.storeName}</div>
                            </div>
                        )}
                        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1rem', marginBottom:'1rem' }}>
                            <div><div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>Cliente</div><div style={{ fontWeight:'600' }}>{exchange.customerName}</div></div>
                            <div><div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>Data</div><div style={{ fontWeight:'600' }}>{exchange.date ? new Date(exchange.date).toLocaleDateString('pt-BR') : '-'}</div></div>
                        </div>
                        {exchange.salesPerson && <div style={{ marginBottom:'1rem' }}><div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>Vendedor</div><div style={{ fontWeight:'600' }}>{exchange.salesPerson}</div></div>}
                        {exchange.observations && <div><div style={{ fontSize:'0.85rem', color:'var(--text-secondary)', marginBottom:'0.5rem' }}>Observações</div><div style={{ padding:'1rem', background:'var(--bg-dark)', borderRadius:'8px' }}>{exchange.observations}</div></div>}
                    </div>
                    <div style={{ borderTop:'1px solid var(--border)', paddingTop:'1.5rem', marginBottom:'1.5rem' }}>
                        <div style={{ fontWeight:'700', marginBottom:'1rem' }}>📤 Itens de Saída</div>
                        {(exchange.outgoingItems||[]).map(item => (
                            <div key={item.id} style={{ padding:'0.75rem', background:'var(--bg-dark)', borderRadius:'8px', marginBottom:'0.5rem' }}>
                                <div style={{ fontWeight:'600' }}>{item.description}</div>
                                <div style={{ color:'var(--accent)', fontWeight:'600' }}>{fmt(parseFloat(item.value))}</div>
                            </div>
                        ))}
                        <div style={{ textAlign:'right', marginTop:'0.5rem', fontWeight:'700' }}>Total: {fmt(exchange.outTotal)}</div>
                    </div>
                    <div style={{ borderTop:'1px solid var(--border)', paddingTop:'1.5rem', marginBottom:'1.5rem' }}>
                        <div style={{ fontWeight:'700', marginBottom:'1rem' }}>📥 Itens de Entrada</div>
                        {(exchange.incomingItems||[]).map(item => (
                            <div key={item.id} style={{ padding:'0.75rem', background:'var(--bg-dark)', borderRadius:'8px', marginBottom:'0.5rem' }}>
                                <div style={{ fontWeight:'600' }}>{item.description}</div>
                                <div style={{ display:'flex', justifyContent:'space-between' }}>
                                    <span style={{ color:'var(--accent)', fontWeight:'600' }}>{fmt(parseFloat(item.value))}</span>
                                    <span style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>{item.condition}</span>
                                </div>
                            </div>
                        ))}
                        <div style={{ textAlign:'right', marginTop:'0.5rem', fontWeight:'700' }}>Total: {fmt(exchange.inTotal)}</div>
                    </div>
                    {exchange.photos && exchange.photos.length > 0 && (
                        <div style={{ borderTop:'1px solid var(--border)', paddingTop:'1.5rem', marginBottom:'1.5rem' }}>
                            <div style={{ fontWeight:'700', marginBottom:'1rem' }}>📸 Fotos</div>
                            <div className="photos-grid">{exchange.photos.map(p => <div key={p.id} className="photo-preview"><img src={p.url} alt="Produto" /></div>)}</div>
                        </div>
                    )}
                    <div style={{ background:'var(--bg-dark)', padding:'1.5rem', borderRadius:'12px', marginBottom:'1.5rem', border:`2px solid ${exchange.difference >= 0 ? 'var(--success)' : 'var(--danger)'}` }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                            <span style={{ fontSize:'1.1rem' }}>💰 Diferença:</span>
                            <div style={{ textAlign:'right' }}>
                                <div style={{ fontSize:'2rem', fontWeight:'800', color: exchange.difference >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(Math.abs(exchange.difference||0))}</div>
                                <div style={{ fontSize:'0.9rem', color:'var(--text-secondary)' }}>
                                    {exchange.difference > 0 && '↗️ Cliente deve pagar'}
                                    {exchange.difference < 0 && '↙️ Cliente deve receber'}
                                    {exchange.difference === 0 && '✅ Troca equilibrada'}
                                </div>
                            </div>
                        </div>
                    </div>
                    {!readOnly && exchange.status === 'pending' && (
                        <button className="btn btn-success" style={{ width:'100%' }} onClick={handleConfirm} disabled={confirming}>
                            {confirming ? '⏳ Confirmando…' : '✅ Confirmar Conferência'}
                        </button>
                    )}
                </div>
            </div>
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
