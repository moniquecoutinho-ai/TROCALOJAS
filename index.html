<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Trocas - Multi Lojas</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --secondary: #004E89;
            --secondary-light: #1A6BA8;
            --accent: #F7B32B;
            --success: #06D6A0;
            --danger: #EF476F;
            --warning: #FFD23F;
            --bg-dark: #0F1419;
            --bg-card: #1A2332;
            --bg-hover: #252F3F;
            --text-primary: #FFFFFF;
            --text-secondary: #A0AEC0;
            --text-muted: #718096;
            --border: #2D3748;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1f2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        #root { min-height: 100vh; }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px var(--shadow);
        }

        .login-logo {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .app-container { display: flex; min-height: 100vh; }

        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 2rem 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            padding: 0 2rem 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .store-info {
            padding: 0 2rem 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .store-name { font-weight: 600; color: var(--text-primary); margin-bottom: 0.25rem; }
        .user-name { font-size: 0.9rem; color: var(--text-secondary); }

        .nav-menu { list-style: none; padding: 0 1rem; }
        .nav-item { margin-bottom: 0.5rem; }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 1rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s ease;
            font-weight: 500;
            cursor: pointer;
            gap: 0.75rem;
        }

        .nav-link:hover { background: var(--bg-hover); color: var(--text-primary); transform: translateX(4px); }

        .nav-link.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .nav-icon { font-size: 1.25rem; }

        .logout-btn {
            margin: 1rem;
            padding: 1rem;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            width: calc(100% - 2rem);
        }

        .logout-btn:hover { background: #d63961; transform: translateY(-2px); }

        .main-content { flex: 1; margin-left: 280px; padding: 2rem; max-width: 100%; }

        .header { margin-bottom: 2.5rem; animation: slideDown 0.6s ease; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .page-subtitle { color: var(--text-secondary); font-size: 1.1rem; }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px var(--shadow);
            animation: fadeIn 0.6s ease;
            animation-fill-mode: both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-primary); font-size: 0.95rem; }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s ease;
            font-family: 'Work Sans', sans-serif;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .form-textarea { resize: vertical; min-height: 100px; }

        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }

        .btn {
            padding: 0.875rem 1.75rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Work Sans', sans-serif;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
        .btn:active { transform: translateY(0); }

        .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: var(--bg-dark); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-primary); }
        .btn-small { padding: 0.5rem 1rem; font-size: 0.9rem; }
        .btn-icon { padding: 0.75rem; aspect-ratio: 1; }

        .item-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem; }

        .item-card {
            background: var(--bg-dark);
            padding: 1.25rem;
            border-radius: 12px;
            border: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .item-card:hover { border-color: var(--primary); transform: translateX(4px); }
        .item-info { flex: 1; }
        .item-description { font-weight: 600; margin-bottom: 0.25rem; font-size: 1.05rem; }
        .item-value { color: var(--accent); font-weight: 700; font-size: 1.1rem; }
        .item-condition { font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .item-actions { display: flex; gap: 0.5rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }

        .stat-card {
            background: var(--bg-card);
            padding: 1.75rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); }
        .stat-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
        .stat-value { font-size: 2.25rem; font-weight: 800; font-family: 'Syne', sans-serif; margin-bottom: 0.5rem; display: block; }
        .stat-label { color: var(--text-secondary); font-size: 0.95rem; }

        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }

        .table { width: 100%; border-collapse: collapse; }
        .table thead { background: var(--bg-dark); }
        .table th { padding: 1rem; text-align: left; font-weight: 700; color: var(--text-primary); border-bottom: 2px solid var(--border); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .table td { padding: 1rem; border-bottom: 1px solid var(--border); }
        .table tbody tr { transition: background 0.2s ease; }
        .table tbody tr:hover { background: var(--bg-hover); }
        .table tbody tr:last-child td { border-bottom: none; }

        .badge { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; }
        .badge-pending { background: rgba(255, 210, 63, 0.2); color: var(--warning); }
        .badge-confirmed { background: rgba(6, 214, 160, 0.2); color: var(--success); }
        .badge-danger { background: rgba(239, 71, 111, 0.2); color: var(--danger); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; padding: 2rem;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px var(--shadow);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header { padding: 2rem 2rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-family: 'Syne', sans-serif; font-size: 1.75rem; font-weight: 700; }
        .modal-close { background: none; border: none; color: var(--text-secondary); font-size: 2rem; cursor: pointer; padding: 0; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: all 0.2s; }
        .modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }
        .modal-body { padding: 2rem; }

        .photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
        .photo-preview { position: relative; aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 2px solid var(--border); transition: all 0.2s; }
        .photo-preview:hover { border-color: var(--primary); transform: scale(1.05); }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .photo-remove { position: absolute; top: 0.5rem; right: 0.5rem; background: var(--danger); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.2s; }
        .photo-remove:hover { transform: scale(1.1); }

        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-secondary); }
        .empty-state-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }

        .action-buttons { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .filters { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }

        .stock-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; }
        .stock-badge.in-stock { background: rgba(6, 214, 160, 0.2); color: var(--success); }
        .stock-badge.low-stock { background: rgba(255, 210, 63, 0.2); color: var(--warning); }
        .stock-badge.out-of-stock { background: rgba(239, 71, 111, 0.2); color: var(--danger); }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .page-title { font-size: 2rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const STORES = [
            { id: 'mooca', name: 'Shopping Mooca', password: 'mooca123' },
            { id: 'lorena', name: 'Alameda Lorena', password: 'lorena123' },
            { id: 'leopoldina', name: 'Leopoldina', password: 'leopoldina123' },
            { id: 'perdizes', name: 'Perdizes', password: 'perdizes123' },
            { id: 'ibirapuera', name: 'Ibirapuera', password: 'ibirapuera123' },
            { id: 'santana', name: 'Santana', password: 'santana123' },
            { id: 'pinheiros', name: 'Alto de Pinheiros', password: 'pinheiros123' }
        ];

        const ADMIN = { id: 'admin', name: 'Administrador', password: 'admin2025' };

        const PRODUCTS_DATABASE = [{"id": 1, "barcode": "7899891315385", "product": "ACUCAR EM OLEO CACAU E UCUUBA 500 G", "group": "CACAU & UCUUBA", "line": "LINHA RESERVA", "price": 192.0, "quantity": 0, "minQuantity": 5}, {"id": 2, "barcode": "7899891315804", "product": "ACUCAR EM OLEO COPAIBA & ANDIROBA 500 G - SERIE 1", "group": "COPAIBA & ANDIROBA", "line": "LINHA RESERVA", "price": 157.0, "quantity": 0, "minQuantity": 5}, {"id": 3, "barcode": "7899891302132", "product": "ACUCAR EM OLEO COPAIBA E ANDIROBA 500 G", "group": "COPAIBA & ANDIROBA", "line": "LINHA RESERVA", "price": 157.0, "quantity": 0, "minQuantity": 5}, {"id": 4, "barcode": "7899891300435", "product": "ACUCAR EM OLEO CUPUACU & CASTANHA DO BRASIL 500 G", "group": "CUPUACU & CASTANHA DO BRASIL", "line": "LINHA RESERVA", "price": 157.0, "quantity": 0, "minQuantity": 5}, {"id": 5, "barcode": "7899891315798", "product": "ACUCAR EM OLEO CUPUACU E CASTANHA DO BRASIL 500 G - SERIE 1", "group": "CUPUACU & CASTANHA DO BRASIL", "line": "LINHA RESERVA", "price": 157.0, "quantity": 0, "minQuantity": 5}, {"id": 6, "barcode": "7898464620345", "product": "AGUA PERFUMADA PARA ROUPAS ALECRIM & CAPIM LIMAO 1000 ML", "group": "ALECRIM & CAPIM LIMAO", "line": "LINHA TATO & OLFATO", "price": 39.0, "quantity": 0, "minQuantity": 5}, {"id": 7, "barcode": "7898464620444", "product": "AGUA PERFUMADA PARA ROUPAS ALECRIM 1100 ML", "group": "ALECRIM", "line": "LINHA CLASSICOS", "price": 48.0, "quantity": 0, "minQuantity": 5}, {"id": 8, "barcode": "7898464621991", "product": "AGUA PERFUMADA PARA ROUPAS AMBAR 1100 ML", "group": "AMBAR", "line": "LINHA CLASSICOS", "price": 48.0, "quantity": 0, "minQuantity": 5}, {"id": 9, "barcode": "7898464625739", "product": "AGUA PERFUMADA PARA ROUPAS AMORA & PITANGA 1000 ML", "group": "AMORA & PITANGA", "line": "LINHA TATO & OLFATO", "price": 39.0, "quantity": 0, "minQuantity": 5}, {"id": 10, "barcode": "7899891308844", "product": "AGUA PERFUMADA PARA ROUPAS BAMBU 1100 ML", "group": "BAMBU", "line": "LINHA CLASSICOS", "price": 48.0, "quantity": 0, "minQuantity": 5}, {"id": 11, "barcode": "7898464622028", "product": "AGUA PERFUMADA PARA ROUPAS CASCAS & FOLHAS 1100 ML", "group": "CASCAS & FOLHAS", "line": "LINHA CLASSICOS", "price": 48.0, "quantity": 0, "minQuantity": 5}, {"id": 12, "barcode": "7898464622066", "product": "AGUA PERFUMADA PARA ROUPAS CURUMIM 1100 ML", "group": "CURUMIM", "line": "LINHA CLASSICOS", "price": 48.0, "quantity": 0, "minQuantity": 5}, {"id": 13, "barcode": "7898464622080", "product": "AGUA PERFUMADA PARA ROUPAS FLOR DE ALGODAO 1100 ML", "group": "FLOR DE ALGODAO", "line": "LINHA CLASSICOS", "price": 48.0, "quantity": 0, "minQuantity": 5}, {"id": 14, "barcode": "7898464620451", "product": "AGUA PERFUMADA PARA ROUPAS MARRUA 1100 ML", "group": "MARRUA", "line": "LINHA CLASSICOS", "price": 48.0, "quantity": 0, "minQuantity": 5}, {"id": 15, "barcode": "7898464622257", "product": "AGUA PERFUMADA PARA ROUPAS PITANGA 1100 ML", "group": "PITANGA", "line": "LINHA CLASSICOS", "price": 48.0, "quantity": 0, "minQuantity": 5}, {"id": 16, "barcode": "7898464622264", "product": "AGUA PERFUMADA PARA ROUPAS PROVENCE 1100 ML", "group": "PROVENCE", "line": "LINHA CLASSICOS", "price": 48.0, "quantity": 0, "minQuantity": 5}, {"id": 17, "barcode": "7899891307922", "product": "AGUA REFRESC COCO & ROMA 200 ML SENSORE", "group": "SENSORE", "line": "SENSORE", "price": 38.0, "quantity": 0, "minQuantity": 5}, {"id": 18, "barcode": "7899891315279", "product": "AGUA REFRESC COCO & ROMA 260 ML SENSORE", "group": "SENSORE", "line": "SENSORE", "price": 62.0, "quantity": 0, "minQuantity": 5}, {"id": 19, "barcode": "7899891307953", "product": "AGUA REFRESC ROSAS & DAMASCO 200 ML SENSORE", "group": "SENSORE", "line": "SENSORE", "price": 38.0, "quantity": 0, "minQuantity": 5}, {"id": 20, "barcode": "7899891315262", "product": "AGUA REFRESC ROSAS & DAMASCO 260 ML SENSORE", "group": "SENSORE", "line": "SENSORE", "price": 62.0, "quantity": 0, "minQuantity": 5}];

        const INITIAL_INVENTORY = PRODUCTS_DATABASE;

        const StorageHelper = {
            getExchanges: (storeId) => {
                const data = localStorage.getItem(`exchanges_${storeId}`);
                return data ? JSON.parse(data) : [];
            },
            saveExchanges: (storeId, exchanges) => {
                localStorage.setItem(`exchanges_${storeId}`, JSON.stringify(exchanges));
                if (window.TrocaCloud && exchanges.length > 0) {
                    window.TrocaCloud.salvarTrocaFirestore(storeId, exchanges[0]).catch(e => console.warn('Firebase offline:', e));
                }
            },
            getInventory: (storeId) => {
                const data = localStorage.getItem(`inventory_${storeId}`);
                return data ? JSON.parse(data) : INITIAL_INVENTORY;
            },
            saveInventory: (storeId, inventory) => {
                localStorage.setItem(`inventory_${storeId}`, JSON.stringify(inventory));
            }
        };

        const ExportHelper = {
            exportToExcel: (exchanges, storeName) => {
                const wb = XLSX.utils.book_new();
                const summaryData = [
                    ['Relatório de Trocas - ' + storeName],
                    ['Data de Geração:', new Date().toLocaleString('pt-BR')],
                    [''],
                    ['Total de Trocas:', exchanges.length],
                    ['Trocas Pendentes:', exchanges.filter(e => e.status === 'pending').length],
                    ['Trocas Confirmadas:', exchanges.filter(e => e.status === 'confirmed').length],
                ];
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryData), 'Resumo');
                const exchangesData = exchanges.map(ex => ({
                    'Nº Venda': ex.saleNumber,
                    'Data': new Date(ex.date).toLocaleDateString('pt-BR'),
                    'Cliente': ex.customerName,
                    'CPF': ex.customerCPF || '',
                    'Vendedor': ex.salesPerson || '',
                    'Valor Saída': ex.outTotal,
                    'Valor Entrada': ex.inTotal,
                    'Diferença': ex.difference,
                    'Status': ex.status === 'pending' ? 'Pendente' : 'Confirmado',
                    'Observações': ex.observations || ''
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exchangesData), 'Trocas');
                XLSX.writeFile(wb, `relatorio-trocas-${storeName.replace(/\s/g, '-')}-${new Date().toISOString().split('T')[0]}.xlsx`);
            }
        };

        function LoginScreen({ onLogin }) {
            const [selectedStore, setSelectedStore] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if (selectedStore === 'admin') {
                    if (password !== ADMIN.password) { setError('Senha incorreta'); return; }
                    onLogin({ ...ADMIN, isAdmin: true });
                    return;
                }
                const store = STORES.find(s => s.id === selectedStore);
                if (!store) { setError('Selecione uma loja'); return; }
                if (password !== store.password) { setError('Senha incorreta'); return; }
                onLogin({ ...store, isAdmin: false });
            };

            return (
                <div className="login-container">
                    <div className="login-card">
                        <div className="login-logo">🔄 TrocaFácil</div>
                        <div className="login-subtitle">Sistema de Gestão de Trocas</div>
                        <form onSubmit={handleLogin}>
                            <div className="form-group">
                                <label className="form-label">Selecione a Loja</label>
                                <select className="form-select" value={selectedStore} onChange={(e) => { setSelectedStore(e.target.value); setError(''); }} required>
                                    <option value="">Escolha uma loja...</option>
                                    <option value="admin">👨‍💼 Administrador</option>
                                    <option disabled>──────────</option>
                                    {STORES.map(store => (<option key={store.id} value={store.id}>{store.name}</option>))}
                                </select>
                            </div>
                            <div className="form-group">
                                <label className="form-label">Senha</label>
                                <input type="password" className="form-input" value={password} onChange={(e) => { setPassword(e.target.value); setError(''); }} placeholder="Digite a senha" required />
                            </div>
                            {error && (<div style={{ padding: '1rem', background: 'rgba(239, 71, 111, 0.2)', color: 'var(--danger)', borderRadius: '12px', marginBottom: '1rem', textAlign: 'center' }}>{error}</div>)}
                            <button type="submit" className="btn btn-primary" style={{ width: '100%' }}>🔐 Entrar</button>
                        </form>
                    </div>
                </div>
            );
        }

        function App() {
            const [currentStore, setCurrentStore] = useState(null);
            const [currentPage, setCurrentPage] = useState('new-exchange');
            const [exchanges, setExchanges] = useState([]);
            const [inventory, setInventory] = useState([]);

            useEffect(() => {
                if (currentStore && !currentStore.isAdmin) {
                    setExchanges(StorageHelper.getExchanges(currentStore.id));
                    setInventory(StorageHelper.getInventory(currentStore.id));
                }
            }, [currentStore]);

            useEffect(() => {
                if (currentStore && !currentStore.isAdmin) {
                    StorageHelper.saveExchanges(currentStore.id, exchanges);
                }
            }, [exchanges, currentStore]);

            useEffect(() => {
                if (currentStore && !currentStore.isAdmin && inventory.length > 0) {
                    StorageHelper.saveInventory(currentStore.id, inventory);
                }
            }, [inventory, currentStore]);

            const handleLogout = () => {
                if (confirm('Tem certeza que deseja sair?')) { setCurrentStore(null); setCurrentPage('new-exchange'); }
            };

            if (!currentStore) return <LoginScreen onLogin={setCurrentStore} />;
            if (currentStore.isAdmin) return <AdminView onLogout={handleLogout} />;

            return (
                <div className="app-container">
                    <aside className="sidebar">
                        <div className="logo">🔄 TrocaFácil</div>
                        <div className="store-info">
                            <div className="store-name">📍 {currentStore.name}</div>
                            <div className="user-name">Sistema Ativo</div>
                        </div>
                        <nav>
                            <ul className="nav-menu">
                                <li className="nav-item"><div className={`nav-link ${currentPage === 'new-exchange' ? 'active' : ''}`} onClick={() => setCurrentPage('new-exchange')}><span className="nav-icon">➕</span>Nova Troca</div></li>
                                <li className="nav-item"><div className={`nav-link ${currentPage === 'history' ? 'active' : ''}`} onClick={() => setCurrentPage('history')}><span className="nav-icon">📋</span>Histórico</div></li>
                                <li className="nav-item"><div className={`nav-link ${currentPage === 'inventory' ? 'active' : ''}`} onClick={() => setCurrentPage('inventory')}><span className="nav-icon">📦</span>Estoque</div></li>
                                <li className="nav-item"><div className={`nav-link ${currentPage === 'reports' ? 'active' : ''}`} onClick={() => setCurrentPage('reports')}><span className="nav-icon">📊</span>Relatórios</div></li>
                            </ul>
                        </nav>
                        <button className="logout-btn" onClick={handleLogout}>🚪 Sair</button>
                    </aside>
                    <main className="main-content">
                        {currentPage === 'new-exchange' && <NewExchangePage exchanges={exchanges} setExchanges={setExchanges} inventory={inventory} />}
                        {currentPage === 'history' && <HistoryPage exchanges={exchanges} setExchanges={setExchanges} />}
                        {currentPage === 'inventory' && <InventoryPage inventory={inventory} setInventory={setInventory} />}
                        {currentPage === 'reports' && <ReportsPage exchanges={exchanges} storeName={currentStore.name} />}
                    </main>
                </div>
            );
        }

        function AdminView({ onLogout }) {
            const [selectedStore, setSelectedStore] = useState('all');
            const [allExchanges, setAllExchanges] = useState([]);
            const [selectedExchange, setSelectedExchange] = useState(null);

            useEffect(() => {
                const allData = [];
                STORES.forEach(store => {
                    StorageHelper.getExchanges(store.id).forEach(ex => {
                        allData.push({ ...ex, storeName: store.name, storeId: store.id });
                    });
                });
                setAllExchanges(allData.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
            }, []);

            const filteredExchanges = selectedStore === 'all' ? allExchanges : allExchanges.filter(ex => ex.storeId === selectedStore);
            const totalExchanges = allExchanges.length;
            const totalPending = allExchanges.filter(ex => ex.status === 'pending').length;
            const totalConfirmed = allExchanges.filter(ex => ex.status === 'confirmed').length;
            const totalDifference = allExchanges.reduce((sum, ex) => sum + ex.difference, 0);
            const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

            const handleExportAll = () => {
                if (allExchanges.length === 0) { alert('Não há dados para exportar'); return; }
                const wb = XLSX.utils.book_new();
                const summaryData = [
                    ['Relatório Consolidado - Todas as Lojas'],
                    ['Data de Geração:', new Date().toLocaleString('pt-BR')],
                    [''],
                    ['Total de Trocas:', totalExchanges],
                    ['Pendentes:', totalPending],
                    ['Confirmadas:', totalConfirmed],
                    ['Diferença Total:', totalDifference],
                ];
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryData), 'Resumo Geral');
                const exchangesData = allExchanges.map(ex => ({
                    'Loja': ex.storeName, 'Nº Venda': ex.saleNumber,
                    'Data': new Date(ex.date).toLocaleDateString('pt-BR'),
                    'Cliente': ex.customerName, 'CPF': ex.customerCPF || '',
                    'Vendedor': ex.salesPerson || '', 'Valor Saída': ex.outTotal,
                    'Valor Entrada': ex.inTotal, 'Diferença': ex.difference,
                    'Status': ex.status === 'pending' ? 'Pendente' : 'Confirmado'
                }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exchangesData), 'Todas as Trocas');
                XLSX.writeFile(wb, `relatorio-consolidado-${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            return (
                <div className="app-container">
                    <aside className="sidebar">
                        <div className="logo">🔄 TrocaFácil</div>
                        <div className="store-info">
                            <div className="store-name">👨‍💼 Administrador</div>
                            <div className="user-name">Visão Geral</div>
                        </div>
                        <nav><ul className="nav-menu"><li className="nav-item"><div className="nav-link active"><span className="nav-icon">📊</span>Dashboard Geral</div></li></ul></nav>
                        <button className="logout-btn" onClick={onLogout}>🚪 Sair</button>
                    </aside>
                    <main className="main-content">
                        <div className="header">
                            <h1 className="page-title">👨‍💼 Painel do Administrador</h1>
                            <p className="page-subtitle">Visão consolidada de todas as lojas</p>
                        </div>
                        <div className="action-buttons">
                            <button className="btn btn-success" onClick={handleExportAll}>📥 Exportar Relatório Consolidado</button>
                        </div>
                        <div className="stats-grid">
                            <div className="stat-card"><span className="stat-icon">🏪</span><span className="stat-value">{STORES.length}</span><span className="stat-label">Lojas Ativas</span></div>
                            <div className="stat-card"><span className="stat-icon">📊</span><span className="stat-value">{totalExchanges}</span><span className="stat-label">Total de Trocas</span></div>
                            <div className="stat-card"><span className="stat-icon">⏳</span><span className="stat-value">{totalPending}</span><span className="stat-label">Pendentes</span></div>
                            <div className="stat-card"><span className="stat-icon">✅</span><span className="stat-value">{totalConfirmed}</span><span className="stat-label">Confirmadas</span></div>
                        </div>
                        <div className="card">
                            <h2 className="card-title">💰 Diferença Total Consolidada</h2>
                            <div style={{ textAlign: 'center', padding: '2rem' }}>
                                <div style={{ fontSize: '3rem', fontWeight: '800', fontFamily: 'Syne, sans-serif', color: totalDifference >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(Math.abs(totalDifference))}</div>
                            </div>
                        </div>
                        <div className="card">
                            <h2 className="card-title">📊 Desempenho por Loja</h2>
                            <div className="table-container">
                                <table className="table">
                                    <thead><tr><th>Loja</th><th>Total Trocas</th><th>Pendentes</th><th>Confirmadas</th><th>Diferença Total</th></tr></thead>
                                    <tbody>
                                        {STORES.map(store => {
                                            const se = allExchanges.filter(ex => ex.storeId === store.id);
                                            const sd = se.reduce((s, ex) => s + ex.difference, 0);
                                            return (
                                                <tr key={store.id}>
                                                    <td><strong>{store.name}</strong></td>
                                                    <td style={{ fontWeight: '700' }}>{se.length}</td>
                                                    <td><span className="badge badge-pending">{se.filter(ex => ex.status === 'pending').length}</span></td>
                                                    <td><span className="badge badge-confirmed">{se.filter(ex => ex.status === 'confirmed').length}</span></td>
                                                    <td style={{ color: sd >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight: '700' }}>{fmt(sd)}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div className="card">
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                                <h2 className="card-title" style={{ margin: 0 }}>📋 Todas as Trocas</h2>
                                <select className="form-select" value={selectedStore} onChange={(e) => setSelectedStore(e.target.value)} style={{ width: 'auto' }}>
                                    <option value="all">🏪 Todas as Lojas</option>
                                    {STORES.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>
                            </div>
                            {filteredExchanges.length > 0 ? (
                                <div className="table-container">
                                    <table className="table">
                                        <thead><tr><th>Loja</th><th>Nº Venda</th><th>Data</th><th>Cliente</th><th>Vendedor</th><th>Diferença</th><th>Status</th><th>Ações</th></tr></thead>
                                        <tbody>
                                            {filteredExchanges.map(exchange => (
                                                <tr key={`${exchange.storeId}-${exchange.id}`}>
                                                    <td style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>{exchange.storeName}</td>
                                                    <td style={{ fontWeight: '700' }}>{exchange.saleNumber}</td>
                                                    <td>{new Date(exchange.date).toLocaleDateString('pt-BR')}</td>
                                                    <td>{exchange.customerName}</td>
                                                    <td>{exchange.salesPerson || '-'}</td>
                                                    <td><span style={{ color: exchange.difference >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight: '700' }}>{fmt(exchange.difference)}</span></td>
                                                    <td><span className={`badge badge-${exchange.status}`}>{exchange.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}</span></td>
                                                    <td><button className="btn btn-primary btn-small" onClick={() => setSelectedExchange(exchange)}>👁️</button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            ) : (
                                <div className="empty-state"><div className="empty-state-icon">📭</div><p>Nenhuma troca encontrada</p></div>
                            )}
                        </div>
                        {selectedExchange && <ExchangeModal exchange={selectedExchange} onClose={() => setSelectedExchange(null)} updateStatus={() => {}} />}
                    </main>
                </div>
            );
        }

        function NewExchangePage({ exchanges, setExchanges, inventory }) {
            const [saleNumber, setSaleNumber] = useState('');
            const [customerName, setCustomerName] = useState('');
            const [customerCPF, setCustomerCPF] = useState('');
            const [salesPerson, setSalesPerson] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [observations, setObservations] = useState('');
            const [outgoingItems, setOutgoingItems] = useState([]);
            const [incomingItems, setIncomingItems] = useState([]);
            const [photos, setPhotos] = useState([]);
            const [newOutItem, setNewOutItem] = useState({ description: '', value: '' });
            const [newInItem, setNewInItem] = useState({ description: '', value: '', condition: 'Novo' });

            const addOutgoingItem = () => {
                if (newOutItem.description && newOutItem.value) {
                    setOutgoingItems([...outgoingItems, { id: Date.now(), description: newOutItem.description, value: parseFloat(newOutItem.value) }]);
                    setNewOutItem({ description: '', value: '' });
                }
            };

            const addIncomingItem = () => {
                if (newInItem.description && newInItem.value) {
                    setIncomingItems([...incomingItems, { id: Date.now(), description: newInItem.description, value: parseFloat(newInItem.value), condition: newInItem.condition }]);
                    setNewInItem({ description: '', value: '', condition: 'Novo' });
                }
            };

            const handlePhotoUpload = (e) => {
                Array.from(e.target.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (ev) => setPhotos(prev => [...prev, { id: Date.now() + Math.random(), url: ev.target.result }]);
                    reader.readAsDataURL(file);
                });
            };

            const outTotal = outgoingItems.reduce((sum, item) => sum + parseFloat(item.value), 0);
            const inTotal = incomingItems.reduce((sum, item) => sum + parseFloat(item.value), 0);
            const difference = outTotal - inTotal;
            const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!saleNumber || !customerName || !salesPerson) { alert('Por favor, preencha todos os campos obrigatórios'); return; }
                if (outgoingItems.length === 0 || incomingItems.length === 0) { alert('Adicione pelo menos um item de saída e um de entrada'); return; }
                const newExchange = { id: Date.now(), saleNumber, customerName, customerCPF, salesPerson, date, observations, outgoingItems, incomingItems, photos, outTotal, inTotal, difference, status: 'pending', createdAt: new Date().toISOString() };
                setExchanges([newExchange, ...exchanges]);
                setSaleNumber(''); setCustomerName(''); setCustomerCPF(''); setSalesPerson('');
                setDate(new Date().toISOString().split('T')[0]); setObservations('');
                setOutgoingItems([]); setIncomingItems([]); setPhotos([]);
                alert('✅ Troca registrada com sucesso!');
            };

            return (
                <div>
                    <div className="header"><h1 className="page-title">➕ Nova Troca</h1><p className="page-subtitle">Registre uma nova troca de produtos</p></div>
                    <form onSubmit={handleSubmit}>
                        <div className="card">
                            <h2 className="card-title">📝 Informações da Venda</h2>
                            <div className="form-row">
                                <div className="form-group"><label className="form-label">Nº da Venda *</label><input type="text" className="form-input" value={saleNumber} onChange={(e) => setSaleNumber(e.target.value)} placeholder="Ex: 12345" required /></div>
                                <div className="form-group"><label className="form-label">Nome do Cliente *</label><input type="text" className="form-input" value={customerName} onChange={(e) => setCustomerName(e.target.value)} placeholder="Nome completo" required /></div>
                            </div>
                            <div className="form-row">
                                <div className="form-group"><label className="form-label">CPF</label><input type="text" className="form-input" value={customerCPF} onChange={(e) => setCustomerCPF(e.target.value)} placeholder="000.000.000-00" /></div>
                                <div className="form-group"><label className="form-label">Vendedor *</label><input type="text" className="form-input" value={salesPerson} onChange={(e) => setSalesPerson(e.target.value)} placeholder="Nome do vendedor" required /></div>
                                <div className="form-group"><label className="form-label">Data *</label><input type="date" className="form-input" value={date} onChange={(e) => setDate(e.target.value)} required /></div>
                            </div>
                            <div className="form-group"><label className="form-label">Observações</label><textarea className="form-textarea" value={observations} onChange={(e) => setObservations(e.target.value)} placeholder="Observações adicionais..." /></div>
                        </div>
                        <div className="card">
                            <h2 className="card-title">📤 Produtos de Saída</h2>
                            <div className="form-row">
                                <div className="form-group"><label className="form-label">Descrição</label><input type="text" className="form-input" value={newOutItem.description} onChange={(e) => setNewOutItem({...newOutItem, description: e.target.value})} placeholder="Ex: Camiseta Azul M" list="inventory-list" /></div>
                                <div className="form-group"><label className="form-label">Valor (R$)</label><input type="number" step="0.01" className="form-input" value={newOutItem.value} onChange={(e) => setNewOutItem({...newOutItem, value: e.target.value})} placeholder="0.00" /></div>
                                <div className="form-group" style={{ display: 'flex', alignItems: 'flex-end' }}><button type="button" className="btn btn-primary" onClick={addOutgoingItem} style={{ width: '100%' }}>➕ Adicionar</button></div>
                            </div>
                            <datalist id="inventory-list">{inventory.map(item => <option key={item.id} value={item.product} />)}</datalist>
                            {outgoingItems.length > 0 && (
                                <div className="item-list">
                                    {outgoingItems.map(item => (
                                        <div key={item.id} className="item-card">
                                            <div className="item-info"><div className="item-description">{item.description}</div><div className="item-value">{fmt(item.value)}</div></div>
                                            <button type="button" className="btn btn-danger btn-small" onClick={() => setOutgoingItems(outgoingItems.filter(i => i.id !== item.id))}>🗑️</button>
                                        </div>
                                    ))}
                                    <div style={{ textAlign: 'right', fontSize: '1.25rem', fontWeight: '700', marginTop: '1rem', padding: '1rem', background: 'var(--bg-dark)', borderRadius: '12px' }}>
                                        Total de Saída: <span style={{ color: 'var(--accent)' }}>{fmt(outTotal)}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="card">
                            <h2 className="card-title">📥 Produtos de Entrada</h2>
                            <div className="form-row">
                                <div className="form-group"><label className="form-label">Descrição</label><input type="text" className="form-input" value={newInItem.description} onChange={(e) => setNewInItem({...newInItem, description: e.target.value})} placeholder="Ex: Calça Preta 38" list="inventory-list" /></div>
                                <div className="form-group"><label className="form-label">Valor (R$)</label><input type="number" step="0.01" className="form-input" value={newInItem.value} onChange={(e) => setNewInItem({...newInItem, value: e.target.value})} placeholder="0.00" /></div>
                                <div className="form-group"><label className="form-label">Condição</label><select className="form-select" value={newInItem.condition} onChange={(e) => setNewInItem({...newInItem, condition: e.target.value})}><option>Novo</option><option>Usado - Ótimo</option><option>Usado - Bom</option><option>Usado - Regular</option><option>Danificado</option></select></div>
                                <div className="form-group" style={{ display: 'flex', alignItems: 'flex-end' }}><button type="button" className="btn btn-primary" onClick={addIncomingItem} style={{ width: '100%' }}>➕ Adicionar</button></div>
                            </div>
                            {incomingItems.length > 0 && (
                                <div className="item-list">
                                    {incomingItems.map(item => (
                                        <div key={item.id} className="item-card">
                                            <div className="item-info"><div className="item-description">{item.description}</div><div className="item-value">{fmt(item.value)}</div><div className="item-condition">Condição: {item.condition}</div></div>
                                            <button type="button" className="btn btn-danger btn-small" onClick={() => setIncomingItems(incomingItems.filter(i => i.id !== item.id))}>🗑️</button>
                                        </div>
                                    ))}
                                    <div style={{ textAlign: 'right', fontSize: '1.25rem', fontWeight: '700', marginTop: '1rem', padding: '1rem', background: 'var(--bg-dark)', borderRadius: '12px' }}>
                                        Total de Entrada: <span style={{ color: 'var(--success)' }}>{fmt(inTotal)}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="card">
                            <h2 className="card-title">📸 Fotos dos Produtos</h2>
                            <div className="form-group">
                                <input type="file" accept="image/*" multiple onChange={handlePhotoUpload} style={{ display: 'none' }} id="photo-upload" />
                                <label htmlFor="photo-upload" className="btn btn-secondary">📷 Adicionar Fotos</label>
                            </div>
                            {photos.length > 0 && (
                                <div className="photos-grid">
                                    {photos.map(photo => (
                                        <div key={photo.id} className="photo-preview">
                                            <img src={photo.url} alt="Produto" />
                                            <button type="button" className="photo-remove" onClick={() => setPhotos(photos.filter(p => p.id !== photo.id))}>×</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        {(outgoingItems.length > 0 && incomingItems.length > 0) && (
                            <div className="card" style={{ background: difference >= 0 ? 'rgba(6, 214, 160, 0.1)' : 'rgba(239, 71, 111, 0.1)', border: `2px solid ${difference >= 0 ? 'var(--success)' : 'var(--danger)'}` }}>
                                <div style={{ textAlign: 'center' }}>
                                    <div style={{ fontSize: '1.1rem', marginBottom: '1rem', color: 'var(--text-secondary)' }}>💰 Diferença da Troca</div>
                                    <div style={{ fontSize: '3rem', fontWeight: '800', fontFamily: 'Syne, sans-serif', color: difference >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(Math.abs(difference))}</div>
                                    <div style={{ fontSize: '1.1rem', color: 'var(--text-secondary)', marginTop: '0.5rem' }}>
                                        {difference > 0 && '↗️ Cliente deve pagar'}{difference < 0 && '↙️ Cliente deve receber'}{difference === 0 && '✅ Troca equilibrada'}
                                    </div>
                                </div>
                            </div>
                        )}
                        <button type="submit" className="btn btn-success" style={{ width: '100%' }}>✅ Registrar Troca</button>
                    </form>
                </div>
            );
        }

        function HistoryPage({ exchanges, setExchanges }) {
            const [filter, setFilter] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedExchange, setSelectedExchange] = useState(null);
            const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

            const filteredExchanges = exchanges.filter(ex => {
                const matchesFilter = filter === 'all' || ex.status === filter;
                const matchesSearch = ex.saleNumber.toLowerCase().includes(searchTerm.toLowerCase()) || ex.customerName.toLowerCase().includes(searchTerm.toLowerCase()) || (ex.salesPerson && ex.salesPerson.toLowerCase().includes(searchTerm.toLowerCase()));
                return matchesFilter && matchesSearch;
            });

            const updateStatus = (id, newStatus) => setExchanges(exchanges.map(ex => ex.id === id ? { ...ex, status: newStatus } : ex));
            const deleteExchange = (id) => { if (confirm('Excluir esta troca?')) setExchanges(exchanges.filter(ex => ex.id !== id)); };

            return (
                <div>
                    <div className="header"><h1 className="page-title">📋 Histórico de Trocas</h1><p className="page-subtitle">Consulte e gerencie todas as trocas realizadas</p></div>
                    <div className="card">
                        <div className="filters">
                            <div className="form-group" style={{ flex: 1, margin: 0 }}><input type="text" className="form-input" placeholder="🔍 Buscar por nº venda, cliente ou vendedor..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div>
                            <select className="form-select" value={filter} onChange={(e) => setFilter(e.target.value)} style={{ width: 'auto' }}>
                                <option value="all">📊 Todas</option><option value="pending">⏳ Pendentes</option><option value="confirmed">✅ Confirmadas</option>
                            </select>
                        </div>
                    </div>
                    {filteredExchanges.length > 0 ? (
                        <div className="card">
                            <div className="table-container">
                                <table className="table">
                                    <thead><tr><th>Nº Venda</th><th>Data</th><th>Cliente</th><th>Vendedor</th><th>Diferença</th><th>Status</th><th>Ações</th></tr></thead>
                                    <tbody>
                                        {filteredExchanges.map(exchange => (
                                            <tr key={exchange.id}>
                                                <td style={{ fontWeight: '700' }}>{exchange.saleNumber}</td>
                                                <td>{new Date(exchange.date).toLocaleDateString('pt-BR')}</td>
                                                <td>{exchange.customerName}</td>
                                                <td>{exchange.salesPerson || '-'}</td>
                                                <td><span style={{ color: exchange.difference >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight: '700' }}>{fmt(exchange.difference)}</span></td>
                                                <td><span className={`badge badge-${exchange.status}`}>{exchange.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}</span></td>
                                                <td>
                                                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                                                        <button className="btn btn-primary btn-small" onClick={() => setSelectedExchange(exchange)}>👁️</button>
                                                        <button className="btn btn-danger btn-small" onClick={() => deleteExchange(exchange.id)}>🗑️</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ) : (
                        <div className="card"><div className="empty-state"><div className="empty-state-icon">📭</div><p>Nenhuma troca encontrada</p></div></div>
                    )}
                    {selectedExchange && <ExchangeModal exchange={selectedExchange} onClose={() => setSelectedExchange(null)} updateStatus={updateStatus} />}
                </div>
            );
        }

        function InventoryPage({ inventory, setInventory }) {
            const [editingId, setEditingId] = useState(null);
            const [editForm, setEditForm] = useState({});
            const [searchTerm, setSearchTerm] = useState('');
            const [newProduct, setNewProduct] = useState({ product: '', barcode: '', group: '', line: '', quantity: '', minQuantity: '', price: '' });

            const filteredInventory = inventory.filter(item => {
                const s = searchTerm.toLowerCase();
                return item.product.toLowerCase().includes(s) || (item.barcode && item.barcode.toString().includes(s)) || (item.group && item.group.toLowerCase().includes(s)) || (item.line && item.line.toLowerCase().includes(s));
            });

            const getStockStatus = (q, m) => q === 0 ? 'out-of-stock' : q <= m ? 'low-stock' : 'in-stock';
            const getStockLabel = (q, m) => q === 0 ? '❌ Esgotado' : q <= m ? '⚠️ Estoque Baixo' : '✅ Disponível';
            const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

            const addProduct = () => {
                if (newProduct.product && newProduct.quantity && newProduct.price) {
                    setInventory([...inventory, { id: Date.now(), product: newProduct.product, barcode: newProduct.barcode, group: newProduct.group, line: newProduct.line, quantity: parseInt(newProduct.quantity), minQuantity: parseInt(newProduct.minQuantity || 5), price: parseFloat(newProduct.price) }]);
                    setNewProduct({ product: '', barcode: '', group: '', line: '', quantity: '', minQuantity: '', price: '' });
                }
            };

            return (
                <div>
                    <div className="header"><h1 className="page-title">📦 Controle de Estoque</h1><p className="page-subtitle">Gerencie o estoque de produtos</p></div>
                    <div className="stats-grid">
                        <div className="stat-card"><span className="stat-icon">📦</span><span className="stat-value">{inventory.length}</span><span className="stat-label">Total de Produtos</span></div>
                        <div className="stat-card"><span className="stat-icon">✅</span><span className="stat-value">{inventory.filter(i => i.quantity > i.minQuantity).length}</span><span className="stat-label">Em Estoque</span></div>
                        <div className="stat-card"><span className="stat-icon">⚠️</span><span className="stat-value">{inventory.filter(i => i.quantity > 0 && i.quantity <= i.minQuantity).length}</span><span className="stat-label">Estoque Baixo</span></div>
                        <div className="stat-card"><span className="stat-icon">❌</span><span className="stat-value">{inventory.filter(i => i.quantity === 0).length}</span><span className="stat-label">Esgotados</span></div>
                    </div>
                    <div className="card">
                        <h2 className="card-title">➕ Adicionar Produto</h2>
                        <div className="form-row">
                            <div className="form-group"><input type="text" className="form-input" placeholder="Código de Barras" value={newProduct.barcode} onChange={(e) => setNewProduct({...newProduct, barcode: e.target.value})} /></div>
                            <div className="form-group"><input type="text" className="form-input" placeholder="Nome do Produto *" value={newProduct.product} onChange={(e) => setNewProduct({...newProduct, product: e.target.value})} /></div>
                            <div className="form-group"><input type="text" className="form-input" placeholder="Grupo" value={newProduct.group} onChange={(e) => setNewProduct({...newProduct, group: e.target.value})} /></div>
                            <div className="form-group"><input type="text" className="form-input" placeholder="Linha" value={newProduct.line} onChange={(e) => setNewProduct({...newProduct, line: e.target.value})} /></div>
                        </div>
                        <div className="form-row">
                            <div className="form-group"><input type="number" className="form-input" placeholder="Quantidade *" value={newProduct.quantity} onChange={(e) => setNewProduct({...newProduct, quantity: e.target.value})} /></div>
                            <div className="form-group"><input type="number" className="form-input" placeholder="Qtd Mínima" value={newProduct.minQuantity} onChange={(e) => setNewProduct({...newProduct, minQuantity: e.target.value})} /></div>
                            <div className="form-group"><input type="number" step="0.01" className="form-input" placeholder="Preço *" value={newProduct.price} onChange={(e) => setNewProduct({...newProduct, price: e.target.value})} /></div>
                            <div className="form-group"><button className="btn btn-success" onClick={addProduct} style={{ width: '100%' }}>➕ Adicionar</button></div>
                        </div>
                    </div>
                    <div className="card">
                        <div className="form-group" style={{ marginBottom: '1.5rem' }}><input type="text" className="form-input" placeholder="🔍 Buscar produto, código de barras, grupo ou linha..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /></div>
                        <div className="table-container">
                            <table className="table">
                                <thead><tr><th>Cód. Barras</th><th>Produto</th><th>Grupo</th><th>Linha</th><th>Qtd</th><th>Mín.</th><th>Preço</th><th>Status</th><th>Ações</th></tr></thead>
                                <tbody>
                                    {filteredInventory.map(item => (
                                        <tr key={item.id}>
                                            <td style={{ fontFamily: 'monospace', fontSize: '0.9rem' }}>{item.barcode || '-'}</td>
                                            <td>{editingId === item.id ? <input type="text" className="form-input" value={editForm.product} onChange={(e) => setEditForm({...editForm, product: e.target.value})} /> : <strong>{item.product}</strong>}</td>
                                            <td style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>{item.group || '-'}</td>
                                            <td style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>{item.line || '-'}</td>
                                            <td>{editingId === item.id ? <input type="number" className="form-input" value={editForm.quantity} onChange={(e) => setEditForm({...editForm, quantity: parseInt(e.target.value)})} /> : <span style={{ fontWeight: '700' }}>{item.quantity}</span>}</td>
                                            <td>{editingId === item.id ? <input type="number" className="form-input" value={editForm.minQuantity} onChange={(e) => setEditForm({...editForm, minQuantity: parseInt(e.target.value)})} /> : item.minQuantity}</td>
                                            <td>{editingId === item.id ? <input type="number" step="0.01" className="form-input" value={editForm.price} onChange={(e) => setEditForm({...editForm, price: parseFloat(e.target.value)})} /> : fmt(item.price)}</td>
                                            <td><span className={`stock-badge ${getStockStatus(item.quantity, item.minQuantity)}`}>{getStockLabel(item.quantity, item.minQuantity)}</span></td>
                                            <td>
                                                {editingId === item.id ? (
                                                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                                                        <button className="btn btn-success btn-small" onClick={() => { setInventory(inventory.map(i => i.id === editingId ? editForm : i)); setEditingId(null); }}>✅</button>
                                                        <button className="btn btn-secondary btn-small" onClick={() => setEditingId(null)}>❌</button>
                                                    </div>
                                                ) : (
                                                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                                                        <button className="btn btn-primary btn-small" onClick={() => { setEditingId(item.id); setEditForm(item); }}>✏️</button>
                                                        <button className="btn btn-danger btn-small" onClick={() => { if (confirm('Excluir?')) setInventory(inventory.filter(i => i.id !== item.id)); }}>🗑️</button>
                                                    </div>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function ReportsPage({ exchanges, storeName }) {
            const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v);
            const fmt2 = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
            const totalOut = exchanges.reduce((sum, ex) => sum + ex.outTotal, 0);
            const totalIn = exchanges.reduce((sum, ex) => sum + ex.inTotal, 0);
            const totalDifference = exchanges.reduce((sum, ex) => sum + ex.difference, 0);

            return (
                <div>
                    <div className="header"><h1 className="page-title">📊 Relatórios e Estatísticas</h1><p className="page-subtitle">Visualize dados e exporte relatórios</p></div>
                    <div className="action-buttons"><button className="btn btn-success" onClick={() => { if (exchanges.length === 0) { alert('Não há dados para exportar'); return; } ExportHelper.exportToExcel(exchanges, storeName); }}>📥 Exportar Relatório (Excel)</button></div>
                    <div className="stats-grid">
                        <div className="stat-card"><span className="stat-icon">📊</span><span className="stat-value">{exchanges.length}</span><span className="stat-label">Total de Trocas</span></div>
                        <div className="stat-card"><span className="stat-icon">⏳</span><span className="stat-value">{exchanges.filter(e => e.status === 'pending').length}</span><span className="stat-label">Pendentes</span></div>
                        <div className="stat-card"><span className="stat-icon">✅</span><span className="stat-value">{exchanges.filter(e => e.status === 'confirmed').length}</span><span className="stat-label">Confirmadas</span></div>
                        <div className="stat-card"><span className="stat-icon">💰</span><span className="stat-value">{fmt(Math.abs(totalDifference))}</span><span className="stat-label">Diferença Total</span></div>
                    </div>
                    <div className="card">
                        <h2 className="card-title">💵 Valores Movimentados</h2>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '2rem' }}>
                            <div><div style={{ fontSize: '0.9rem', color: 'var(--text-secondary)', marginBottom: '0.5rem' }}>Total Saída</div><div style={{ fontSize: '2rem', fontWeight: '800', color: 'var(--danger)' }}>{fmt2(totalOut)}</div></div>
                            <div><div style={{ fontSize: '0.9rem', color: 'var(--text-secondary)', marginBottom: '0.5rem' }}>Total Entrada</div><div style={{ fontSize: '2rem', fontWeight: '800', color: 'var(--success)' }}>{fmt2(totalIn)}</div></div>
                        </div>
                    </div>
                    {exchanges.length > 0 && (
                        <div className="card">
                            <h2 className="card-title">🏆 Top 10 Produtos Mais Trocados</h2>
                            <div className="table-container">
                                <table className="table">
                                    <thead><tr><th>Produto</th><th>Quantidade</th><th>Valor Total</th></tr></thead>
                                    <tbody>
                                        {Object.entries(exchanges.reduce((acc, exchange) => {
                                            exchange.incomingItems.forEach(item => {
                                                if (!acc[item.description]) acc[item.description] = { count: 0, total: 0 };
                                                acc[item.description].count++;
                                                acc[item.description].total += parseFloat(item.value || 0);
                                            });
                                            return acc;
                                        }, {})).sort((a, b) => b[1].count - a[1].count).slice(0, 10).map(([product, data], index) => (
                                            <tr key={product}><td><strong>#{index + 1}</strong> {product}</td><td><strong>{data.count}x</strong></td><td>{fmt2(data.total)}</td></tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ExchangeModal({ exchange, onClose, updateStatus }) {
            const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">📋 Detalhes da Troca</h2>
                            <button className="modal-close" onClick={onClose}>×</button>
                        </div>
                        <div className="modal-body">
                            <div style={{ marginBottom: '1.5rem' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1rem', alignItems: 'center' }}>
                                    <div><div style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', marginBottom: '0.25rem' }}>VENDA</div><div style={{ fontSize: '1.5rem', fontWeight: '700' }}>{exchange.saleNumber}</div></div>
                                    <span className={`badge badge-${exchange.status}`}>{exchange.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}</span>
                                </div>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', marginBottom: '1rem' }}>
                                    <div><div style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Cliente</div><div style={{ fontWeight: '600' }}>{exchange.customerName}</div></div>
                                    <div><div style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Data</div><div style={{ fontWeight: '600' }}>{new Date(exchange.date).toLocaleDateString('pt-BR')}</div></div>
                                </div>
                                {exchange.salesPerson && <div style={{ marginBottom: '1rem' }}><div style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Vendedor</div><div style={{ fontWeight: '600' }}>{exchange.salesPerson}</div></div>}
                                {exchange.observations && <div><div style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', marginBottom: '0.5rem' }}>Observações</div><div style={{ padding: '1rem', background: 'var(--bg-dark)', borderRadius: '8px' }}>{exchange.observations}</div></div>}
                            </div>
                            <div style={{ borderTop: '1px solid var(--border)', paddingTop: '1.5rem', marginBottom: '1.5rem' }}>
                                <div style={{ fontWeight: '700', marginBottom: '1rem' }}>📤 Itens de Saída</div>
                                {exchange.outgoingItems.map(item => (<div key={item.id} style={{ padding: '0.75rem', background: 'var(--bg-dark)', borderRadius: '8px', marginBottom: '0.5rem' }}><div style={{ fontWeight: '600' }}>{item.description}</div><div style={{ color: 'var(--accent)', fontWeight: '600' }}>{fmt(parseFloat(item.value))}</div></div>))}
                                <div style={{ textAlign: 'right', marginTop: '0.5rem', fontWeight: '700' }}>Total: {fmt(exchange.outTotal)}</div>
                            </div>
                            <div style={{ borderTop: '1px solid var(--border)', paddingTop: '1.5rem', marginBottom: '1.5rem' }}>
                                <div style={{ fontWeight: '700', marginBottom: '1rem' }}>📥 Itens de Entrada</div>
                                {exchange.incomingItems.map(item => (<div key={item.id} style={{ padding: '0.75rem', background: 'var(--bg-dark)', borderRadius: '8px', marginBottom: '0.5rem' }}><div style={{ fontWeight: '600' }}>{item.description}</div><div style={{ display: 'flex', justifyContent: 'space-between' }}><span style={{ color: 'var(--accent)', fontWeight: '600' }}>{fmt(parseFloat(item.value))}</span><span style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>{item.condition}</span></div></div>))}
                                <div style={{ textAlign: 'right', marginTop: '0.5rem', fontWeight: '700' }}>Total: {fmt(exchange.inTotal)}</div>
                            </div>
                            {exchange.photos && exchange.photos.length > 0 && (
                                <div style={{ borderTop: '1px solid var(--border)', paddingTop: '1.5rem', marginBottom: '1.5rem' }}>
                                    <div style={{ fontWeight: '700', marginBottom: '1rem' }}>📸 Fotos</div>
                                    <div className="photos-grid">{exchange.photos.map(photo => (<div key={photo.id} className="photo-preview"><img src={photo.url} alt="Produto" /></div>))}</div>
                                </div>
                            )}
                            <div style={{ background: 'var(--bg-dark)', padding: '1.5rem', borderRadius: '12px', marginBottom: '1.5rem', border: `2px solid ${exchange.difference >= 0 ? 'var(--success)' : 'var(--danger)'}` }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <span style={{ fontSize: '1.1rem' }}>💰 Diferença:</span>
                                    <div style={{ textAlign: 'right' }}>
                                        <div style={{ fontSize: '2rem', fontWeight: '800', color: exchange.difference >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(Math.abs(exchange.difference))}</div>
                                        <div style={{ fontSize: '0.9rem', color: 'var(--text-secondary)' }}>{exchange.difference > 0 && '↗️ Cliente deve pagar'}{exchange.difference < 0 && '↙️ Cliente deve receber'}{exchange.difference === 0 && '✅ Troca equilibrada'}</div>
                                    </div>
                                </div>
                            </div>
                            {exchange.status === 'pending' && (
                                <button className="btn btn-success" style={{ width: '100%' }} onClick={() => { if (confirm('Confirmar que todos os itens foram conferidos?')) { updateStatus(exchange.id, 'confirmed'); onClose(); } }}>✅ Confirmar Conferência</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>

    <!-- ✅ FIREBASE - BLOCO ÚNICO E CORRETO -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQ7NBVpgYbPimjYqHwDsoTRv-FQH9zIpA",
            authDomain: "troca-facil-2ef86.firebaseapp.com",
            projectId: "troca-facil-2ef86",
            storageBucket: "troca-facil-2ef86.firebasestorage.app",
            messagingSenderId: "1070189120274",
            appId: "1:1070189120274:web:f0d995fa8426f5a4df41cb",
            measurementId: "G-WH0WZ40TRN"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        async function login(email, senha) {
            return signInWithEmailAndPassword(auth, email, senha);
        }

        async function sair() {
            return signOut(auth);
        }

        async function salvarTrocaFirestore(storeId, troca) {
            const ref = collection(db, "stores", storeId, "exchanges");
            await addDoc(ref, {
                ...troca,
                createdAt: serverTimestamp(),
                createdBy: auth.currentUser?.uid || null
            });
            console.log("✅ Troca salva no Firebase:", storeId);
        }

        async function listarTrocas(storeId) {
            const ref  = collection(db, "stores", storeId, "exchanges");
            const snap = await getDocs(query(ref));
            return snap.docs.map(d => ({ id: d.id, ...d.data() }));
        }

        onAuthStateChanged(auth, (user) => {
            if (user) console.log("🔥 Firebase: Logado como", user.email);
            else      console.log("🔥 Firebase: Deslogado");
        });

        window.TrocaCloud = { login, sair, salvarTrocaFirestore, listarTrocas };
        console.log("🔥 Firebase inicializado com sucesso!");
    </script>
</body>
</html>
