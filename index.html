<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Troca Fácil - Multi Lojas</title>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase (CDN) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 🔥 NOVO FIREBASE CONFIG – PROJETO troca-facil-2ef86
    const firebaseConfig = {
      apiKey: "AIzaSyAQ7NBVpgYbPimjYqHwDsoTRv-FQH9zIpA",
      authDomain: "troca-facil-2ef86.firebaseapp.com",
      projectId: "troca-facil-2ef86",
      storageBucket: "troca-facil-2ef86.firebasestorage.app",
      messagingSenderId: "1070189120274",
      appId: "1:1070189120274:web:f0d995fa8426f5a4df41cb",
      measurementId: "G-WH0WZ40TRN"
    };

    // Inicializa Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ---------------------
    // 🔐 FUNÇÃO LOGIN
    // ---------------------
    async function login(email, senha) {
      return await signInWithEmailAndPassword(auth, email, senha);
    }

    // 🔓 Logout
    async function sair() {
      return await signOut(auth);
    }

    // 💾 Salvar troca
    async function salvarTrocaFirestore(storeId, troca) {
      const ref = collection(db, "stores", storeId, "exchanges");
      await addDoc(ref, {
        ...troca,
        createdAt: serverTimestamp(),
        createdBy: auth.currentUser?.email || "desconhecido"
      });
      console.log("✔ Troca salva na loja:", storeId);
    }

    // 📄 Listar trocas
    async function listarTrocas(storeId) {
      const ref = collection(db, "stores", storeId, "exchanges");
      const snap = await getDocs(query(ref));
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    // Sessão
    onAuthStateChanged(auth, (user) => {
      if (user) console.log("🔓 Logado:", user.email);
      else console.log("🔒 Deslogado");
    });

    // Expor
    window.TrocaCloud = { login, sair, salvarTrocaFirestore, listarTrocas, auth };
  </script>

  <style>
    body {
      background: #111; 
      color: #fff; 
      font-family: Arial, sans-serif;
    }

    .login-box {
      width: 340px;
      margin: 80px auto;
      background: #222;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
    }

    select, input, button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #ff6b35;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #e85a29;
    }
  </style>
</head>

<body>
  <!-- 🔐 TELA DE LOGIN -->
  <div id="loginScreen" class="login-box">
    <h2>Troca Fácil</h2>
    <p>Selecione a loja e faça login</p>

    <select id="lojaSelect">
      <option value="">Selecione...</option>
      <option value="mooca">Shopping Mooca</option>
      <option value="lorena">Alameda Lorena</option>
      <option value="perdizes">Perdizes</option>
      <option value="pinheiros">Alto de Pinheiros</option>
      <option value="santana">Santana</option>
      <option value="ibirapuera">Ibirapuera</option>
      <option value="leopoldina">Leopoldina</option>
    </select>

    <input type="password" id="senhaInput" placeholder="Senha da loja" />

    <button id="btnEntrar">Entrar</button>
  </div>

  <!-- 🔧 APP PRINCIPAL (carrega após login) -->
  <div id="root" style="display:none;"></div>

  <!-- Script para o botão ENTRAR -->
  <script>
    document.querySelector("#btnEntrar").addEventListener("click", async () => {
      const storeId = document.querySelector("#lojaSelect").value;
      const senha = document.querySelector("#senhaInput").value;

      if (!storeId) {
        alert("Selecione a loja");
        return;
      }

      if (!senha) {
        alert("Digite a senha");
        return;
      }

      const email = `${storeId}@manjos.com.br`;

      try {
        await TrocaCloud.login(email, senha);

        alert("Login realizado com sucesso!");

        document.querySelector("#loginScreen").style.display = "none";
        document.querySelector("#root").style.display = "block";

        window.currentStoreId = storeId;

      } catch (e) {
        console.error(e);
        alert("Erro no login: verifique loja e senha.");
      }
    });
  </script>
</body>
</html>
