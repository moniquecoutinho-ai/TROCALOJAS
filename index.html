<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrocaFácil - Sistema de Gestão de Trocas</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- ✅ FIREBASE COMPAT (sem ESM/import, compatível com Babel) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35; --primary-dark: #E55A2B; --secondary: #004E89;
            --secondary-light: #1A6BA8; --accent: #F7B32B; --success: #06D6A0;
            --danger: #EF476F; --warning: #FFD23F; --bg-dark: #0F1419;
            --bg-card: #1A2332; --bg-hover: #252F3F; --text-primary: #FFFFFF;
            --text-secondary: #A0AEC0; --text-muted: #718096; --border: #2D3748;
            --shadow: rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Work Sans', sans-serif; background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1f2e 100%); color: var(--text-primary); min-height: 100vh; line-height: 1.6; }
        #root { min-height: 100vh; }

        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
        .login-card { background: var(--bg-card); border-radius: 20px; padding: 3rem; width: 100%; max-width: 450px; border: 1px solid var(--border); box-shadow: 0 10px 40px var(--shadow); }
        .login-logo { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; text-align: center; margin-bottom: 1rem; background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .login-subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 2rem; font-size: 1.1rem; }

        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 2rem 0; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; transition: transform 0.3s ease; }
        .logo { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; padding: 0 2rem 1rem; background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.5px; }
        .store-info { padding: 0 2rem 2rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
        .store-name { font-weight: 600; color: var(--text-primary); margin-bottom: 0.25rem; }
        .user-name { font-size: 0.9rem; color: var(--text-secondary); }
        .sync-status { font-size: 0.8rem; margin-top: 0.5rem; display: flex; align-items: center; gap: 0.4rem; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .sync-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
        .sync-dot.offline { background: var(--danger); }
        .sync-dot.loading { background: var(--warning); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        .nav-menu { list-style: none; padding: 0 1rem; }
        .nav-item { margin-bottom: 0.5rem; }
        .nav-link { display: flex; align-items: center; padding: 1rem; color: var(--text-secondary); text-decoration: none; border-radius: 12px; transition: all 0.2s ease; font-weight: 500; cursor: pointer; gap: 0.75rem; }
        .nav-link:hover { background: var(--bg-hover); color: var(--text-primary); transform: translateX(4px); }
        .nav-link.active { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; box-shadow: 0 4px 12px rgba(255,107,53,0.3); }
        .nav-icon { font-size: 1.25rem; }
        .logout-btn { margin: 1rem; padding: 1rem; background: var(--danger); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; width: calc(100% - 2rem); }
        .logout-btn:hover { background: #d63961; transform: translateY(-2px); }
        .main-content { flex: 1; margin-left: 280px; padding: 2rem; max-width: 100%; }

        .header { margin-bottom: 2.5rem; animation: slideDown 0.6s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .page-title { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -1px; }
        .page-subtitle { color: var(--text-secondary); font-size: 1.1rem; }

        .card { background: var(--bg-card); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; border: 1px solid var(--border); box-shadow: 0 4px 20px var(--shadow); animation: fadeIn 0.6s ease; animation-fill-mode: both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-title { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }

        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-primary); font-size: 0.95rem; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 0.875rem 1rem; background: var(--bg-dark); border: 2px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; transition: all 0.2s ease; font-family: 'Work Sans', sans-serif; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        .form-textarea { resize: vertical; min-height: 100px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }

        .btn { padding: 0.875rem 1.75rem; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-size: 1rem; display: inline-flex; align-items: center; gap: 0.5rem; font-family: 'Work Sans', sans-serif; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: var(--bg-dark); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-primary); }
        .btn-small { padding: 0.5rem 1rem; font-size: 0.9rem; }

        .item-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem; }
        .item-card { background: var(--bg-dark); padding: 1.25rem; border-radius: 12px; border: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease; }
        .item-card:hover { border-color: var(--primary); transform: translateX(4px); }
        .item-info { flex: 1; }
        .item-description { font-weight: 600; margin-bottom: 0.25rem; font-size: 1.05rem; }
        .item-value { color: var(--accent); font-weight: 700; font-size: 1.1rem; }
        .item-condition { font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .item-actions { display: flex; gap: 0.5rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-card); padding: 1.75rem; border-radius: 16px; border: 1px solid var(--border); transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); }
        .stat-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
        .stat-value { font-size: 2.25rem; font-weight: 800; font-family: 'Syne', sans-serif; margin-bottom: 0.5rem; display: block; }
        .stat-label { color: var(--text-secondary); font-size: 0.95rem; }

        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
        .table { width: 100%; border-collapse: collapse; }
        .table thead { background: var(--bg-dark); }
        .table th { padding: 1rem; text-align: left; font-weight: 700; color: var(--text-primary); border-bottom: 2px solid var(--border); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .table td { padding: 1rem; border-bottom: 1px solid var(--border); }
        .table tbody tr { transition: background 0.2s ease; }
        .table tbody tr:hover { background: var(--bg-hover); }
        .table tbody tr:last-child td { border-bottom: none; }

        .badge { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; }
        .badge-pending { background: rgba(255,210,63,0.2); color: var(--warning); }
        .badge-confirmed { background: rgba(6,214,160,0.2); color: var(--success); }
        .badge-danger { background: rgba(239,71,111,0.2); color: var(--danger); }
        .stock-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; }
        .stock-badge.in-stock { background: rgba(6,214,160,0.2); color: var(--success); }
        .stock-badge.low-stock { background: rgba(255,210,63,0.2); color: var(--warning); }
        .stock-badge.out-of-stock { background: rgba(239,71,111,0.2); color: var(--danger); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 2rem; backdrop-filter: blur(4px); }
        .modal-content { background: var(--bg-card); border-radius: 20px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); box-shadow: 0 20px 60px var(--shadow); animation: modalSlideIn 0.3s ease; }
        @keyframes modalSlideIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-header { padding: 2rem 2rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-family: 'Syne', sans-serif; font-size: 1.75rem; font-weight: 700; }
        .modal-close { background: none; border: none; color: var(--text-secondary); font-size: 2rem; cursor: pointer; padding: 0; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: all 0.2s; }
        .modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }
        .modal-body { padding: 2rem; }

        .photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
        .photo-preview { position: relative; aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 2px solid var(--border); transition: all 0.2s; }
        .photo-preview:hover { border-color: var(--primary); transform: scale(1.05); }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .photo-remove { position: absolute; top: 0.5rem; right: 0.5rem; background: var(--danger); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.2s; }

        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-secondary); }
        .empty-state-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
        .action-buttons { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .filters { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }

        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,20,25,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .loading-spinner { width: 60px; height: 60px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-family: 'Syne', sans-serif; font-size: 1.2rem; color: var(--text-secondary); }

        .toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 9998; display: flex; flex-direction: column; gap: 0.75rem; }
        .toast { padding: 1rem 1.5rem; border-radius: 12px; font-weight: 600; box-shadow: 0 8px 24px var(--shadow); animation: toastIn 0.3s ease; display: flex; align-items: center; gap: 0.75rem; min-width: 280px; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        .toast-success { background: var(--success); color: white; }
        .toast-error { background: var(--danger); color: white; }
        .toast-info { background: var(--secondary); color: white; }

        .view-toggle { display: flex; gap: 0.5rem; background: var(--bg-dark); border-radius: 12px; padding: 0.4rem; margin-bottom: 1.5rem; }
        .view-toggle-btn { flex: 1; padding: 0.6rem 1rem; border: none; border-radius: 8px; font-family: 'Work Sans', sans-serif; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); background: transparent; }
        .view-toggle-btn.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 3px 10px rgba(255,107,53,0.35); }

        .calendar-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .calendar-month-label { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
        .calendar-nav-btn { background: var(--bg-dark); border: 2px solid var(--border); color: var(--text-primary); border-radius: 10px; width: 40px; height: 40px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .calendar-nav-btn:hover { border-color: var(--primary); color: var(--primary); transform: scale(1.05); }

        .calendar-summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .cal-summary-item { background: var(--bg-dark); border-radius: 12px; padding: 1rem 1.25rem; border: 1px solid var(--border); text-align: center; }
        .cal-summary-value { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; display: block; }
        .cal-summary-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-weekday { text-align: center; padding: 0.6rem 0; font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .calendar-day { background: var(--bg-dark); border-radius: 10px; min-height: 90px; padding: 0.5rem; border: 2px solid transparent; transition: all 0.2s; position: relative; cursor: default; }
        .calendar-day.has-exchanges { border-color: rgba(255,107,53,0.4); cursor: pointer; }
        .calendar-day.has-exchanges:hover { border-color: var(--primary); background: var(--bg-hover); transform: scale(1.02); }
        .calendar-day.today { border-color: var(--accent) !important; }
        .calendar-day.other-month { opacity: 0.3; }
        .calendar-day.selected { border-color: var(--primary) !important; background: rgba(255,107,53,0.12) !important; }
        .day-number { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.35rem; }
        .day-today-dot { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-left: 4px; vertical-align: middle; }
        .day-exchange-pill { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-radius: 6px; padding: 0.15rem 0.4rem; font-size: 0.72rem; font-weight: 700; margin-bottom: 0.2rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .day-exchange-pill.confirmed { background: linear-gradient(135deg, var(--success), #04b887); }
        .day-more-pill { background: var(--border); color: var(--text-secondary); border-radius: 6px; padding: 0.15rem 0.4rem; font-size: 0.7rem; font-weight: 600; display: inline-block; }

        .cal-day-detail { margin-top: 1.5rem; background: var(--bg-dark); border-radius: 14px; padding: 1.25rem; border: 1px solid var(--border); animation: fadeIn 0.3s ease; }
        .cal-day-detail-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
        .cal-day-detail-close { background: none; border: none; color: var(--text-secondary); font-size: 1.4rem; cursor: pointer; padding: 0; line-height: 1; }
        .cal-exchange-row { padding: 0.75rem 1rem; border-radius: 10px; background: var(--bg-card); border: 1px solid var(--border); margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: border-color 0.2s; }
        .cal-exchange-row:hover { border-color: var(--primary); }
        .month-exchange-list { margin-top: 2rem; }
        .month-list-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-secondary); }

        .admin-cal-store-tag { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.12rem 0.45rem; border-radius: 5px; font-size: 0.68rem; font-weight: 700; margin-bottom: 0.18rem; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .store-color-0 { background: rgba(255,107,53,0.25); color: #FF6B35; }
        .store-color-1 { background: rgba(6,214,160,0.25); color: #06D6A0; }
        .store-color-2 { background: rgba(247,179,43,0.25); color: #F7B32B; }
        .store-color-3 { background: rgba(0,78,137,0.4); color: #5bc0eb; }
        .store-color-4 { background: rgba(239,71,111,0.25); color: #EF476F; }
        .store-color-5 { background: rgba(160,110,230,0.25); color: #a06ee6; }
        .store-color-6 { background: rgba(45,200,180,0.25); color: #2dc8b4; }

        .admin-month-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .admin-month-tab { padding: 0.5rem 1.1rem; border-radius: 10px; background: var(--bg-dark); border: 2px solid var(--border); color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
        .admin-month-tab:hover { border-color: var(--primary); color: var(--primary); }
        .admin-month-tab.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-color: var(--primary); color: white; box-shadow: 0 3px 10px rgba(255,107,53,0.3); }

        .store-legend { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 1.5rem; }
        .store-legend-item { display: flex; align-items: center; gap: 0.4rem; padding: 0.35rem 0.75rem; border-radius: 8px; background: var(--bg-dark); border: 1px solid var(--border); font-size: 0.82rem; font-weight: 600; }
        .store-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        .admin-cal-filter-bar { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
        .admin-cal-filter-btn { padding: 0.4rem 0.9rem; border-radius: 8px; border: 2px solid var(--border); background: var(--bg-dark); color: var(--text-secondary); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .admin-cal-filter-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(255,107,53,0.1); }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .page-title { font-size: 2rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .calendar-grid { gap: 2px; }
            .calendar-day { min-height: 64px; padding: 0.35rem; }
            .calendar-summary-bar { grid-template-columns: 1fr; }
        }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        @media print {
            body * { visibility: hidden; }
            #print-receipt, #print-receipt * { visibility: visible; }
            #print-receipt { position: fixed; top: 0; left: 0; width: 100%; background: white; color: black; padding: 0; margin: 0; }
        }
        .receipt-wrap { font-family: 'Courier New', monospace; background: white; color: #111; padding: 2rem; max-width: 420px; margin: 0 auto; }
        .receipt-logo { text-align: center; font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; margin-bottom: 0.25rem; }
        .receipt-sub { text-align: center; font-size: 0.8rem; color: #555; margin-bottom: 1rem; }
        .receipt-divider { border: none; border-top: 1px dashed #999; margin: 0.75rem 0; }
        .receipt-row { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 0.2rem; }
        .receipt-section-title { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin: 0.5rem 0 0.3rem; }
        .receipt-item { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 0.15rem 0; }
        .receipt-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 0.9rem; border-top: 1px solid #ccc; padding-top: 0.4rem; margin-top: 0.3rem; }

    async function salvarTroca(storeId, troca) {
        const { photos, ...trocaSemFotos } = troca;
        const ref = db.collection("stores").doc(storeId).collection("exchanges");
        const docRef = await ref.add({
            ...trocaSemFotos,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        if (photos && photos.length > 0) {
            const fotos = JSON.parse(localStorage.getItem("photos_" + storeId) || "{}");
            fotos[docRef.id] = photos;
            localStorage.setItem("photos_" + storeId, JSON.stringify(fotos));
        }
        return docRef.id;
    }

    async function atualizarStatus(storeId, trocaId, novoStatus) {
        const ref = db.collection("stores").doc(storeId).collection("exchanges").doc(trocaId);
        await ref.update({ status: novoStatus, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    }

    async function atualizarTroca(storeId, trocaId, dados) {
        const { photos, ...dadosSemFotos } = dados;
        const ref = db.collection("stores").doc(storeId).collection("exchanges").doc(trocaId);
        await ref.update({ ...dadosSemFotos, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        if (photos !== undefined) {
            const fotos = JSON.parse(localStorage.getItem("photos_" + storeId) || "{}");
            fotos[trocaId] = photos;
            localStorage.setItem("photos_" + storeId, JSON.stringify(fotos));
        }
    }

    async function deletarTroca(storeId, trocaId) {
        const ref = db.collection("stores").doc(storeId).collection("exchanges").doc(trocaId);
        await ref.delete();
        const fotos = JSON.parse(localStorage.getItem("photos_" + storeId) || "{}");
        delete fotos[trocaId];
        localStorage.setItem("photos_" + storeId, JSON.stringify(fotos));
    }

    function ouvirTrocas(storeId, callback) {
        const ref = db.collection("stores").doc(storeId).collection("exchanges").orderBy("createdAt", "desc");
        return ref.onSnapshot(function(snap) {
            const fotos = JSON.parse(localStorage.getItem("photos_" + storeId) || "{}");
            const trocas = snap.docs.map(function(d) {
                return { ...d.data(), id: d.id, photos: fotos[d.id] || [] };
            });
            callback(trocas);
        }, function(err) {
            console.error("Firebase onSnapshot erro:", err);
            callback([]);
        });
    }

    function ouvirTodasLojas(lojas, callback) {
        const unsubscribes = lojas.map(function(loja) {
            const ref = db.collection("stores").doc(loja.id).collection("exchanges").orderBy("createdAt", "desc");
            return ref.onSnapshot(function(snap) {
                const trocas = snap.docs.map(function(d) {
                    return { ...d.data(), id: d.id, storeId: loja.id, storeName: loja.name };
                });
                callback(loja.id, trocas);
            }, function(err) {
                console.error("Firebase erro loja " + loja.id + ":", err);
            });
        });
        return function() { unsubscribes.forEach(function(u) { u && u(); }); };
    }

    async function salvarEstoque(storeId, inventory) {
        const ref = db.collection("stores").doc(storeId).collection("config").doc("inventory");
        await ref.set({ items: inventory, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    }

    function ouvirEstoque(storeId, initialInventory, callback) {
        const ref = db.collection("stores").doc(storeId).collection("config").doc("inventory");
        return ref.onSnapshot(function(snap) {
            if (snap.exists) {
                callback(snap.data().items || initialInventory);
            } else {
                callback(initialInventory);
            }
        }, function() { callback(initialInventory); });
    }

    async function seedInventoryAllStores(storeIds, inventory) {
        const results = [];
        for (const storeId of storeIds) {
            const ref = db.collection("stores").doc(storeId).collection("config").doc("inventory");
            await ref.set({ items: inventory, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
            results.push(storeId);
        }
        return results;
    }

    window.TrocaDB = {
        salvarTroca, atualizarStatus, atualizarTroca, deletarTroca,
        ouvirTrocas, ouvirTodasLojas, salvarEstoque, ouvirEstoque,
        seedInventoryAllStores
    };

    console.log("Firebase TrocaDB pronto (compat mode)!");
    } catch (err) {
        console.error("Erro Firebase:", err);
        window.__FIREBASE_ERROR__ = err.message;
    }
</script>

function parseDateKey(dateStr) {
    if (!dateStr) return null;
    try {
        const parts = dateStr.split('-');
        if (parts.length === 3) {
            return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        }
        return new Date(dateStr);
    } catch { return null; }
}

function dateKey(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

function useToast() {
    const [toasts, setToasts] = useState([]);
    const show = useCallback((message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
    }, []);
    return { toasts, show };
}

function ToastContainer({ toasts }) {
    return (
        <div className="toast-container">

}

            'Valor Saida': ex.outTotal, 'Valor Entrada': ex.inTotal, 'Diferenca': ex.difference,
            'Status': ex.status === 'pending' ? 'Pendente' : 'Confirmado'
        }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), 'Todas as Trocas');
        XLSX.writeFile(wb, 'relatorio-consolidado-' + new Date().toISOString().split('T')[0] + '.xlsx');
    };

    return (

function AdminGlobalCalendar({ allExchanges }) {
    const today = new Date();
    const [viewYear, setViewYear] = useState(today.getFullYear());
    const [viewMonth, setViewMonth] = useState(today.getMonth());
    const [selectedDay, setSelectedDay] = useState(null);
    const [filterStore, setFilterStore] = useState('all');
    const [selectedExchange, setSelectedExchange] = useState(null);

    const displayExchanges = useMemo(() => {
        if (filterStore === 'all') return allExchanges;
        return allExchanges.filter(ex => ex.storeId === filterStore);
    }, [allExchanges, filterStore]);

    const exchangesByDay = useMemo(() => {
        const map = {};
        displayExchanges.forEach(ex => {
            if (!ex.date) return;
            const d = parseDateKey(ex.date);
            if (!d) return;
            const k = dateKey(d);
            if (!map[k]) map[k] = [];
            map[k].push(ex);
        });
        return map;
    }, [displayExchanges]);

    const monthExchanges = useMemo(() => {
        return displayExchanges.filter(ex => {
            if (!ex.date) return false;
            const d = parseDateKey(ex.date);
            return d && d.getFullYear() === viewYear && d.getMonth() === viewMonth;
        });
    }, [displayExchanges, viewYear, viewMonth]);

    const calendarDays = useMemo(() => {
        const firstDay = new Date(viewYear, viewMonth, 1);
        const lastDay = new Date(viewYear, viewMonth + 1, 0);
        const days = [];
        for (let i = firstDay.getDay() - 1; i >= 0; i--) days.push({ date: new Date(viewYear, viewMonth, -i), otherMonth: true });
        for (let i = 1; i <= lastDay.getDate(); i++) days.push({ date: new Date(viewYear, viewMonth, i), otherMonth: false });
        const rem = 7 - (days.length % 7);
        if (rem < 7) for (let i = 1; i <= rem; i++) days.push({ date: new Date(viewYear, viewMonth + 1, i), otherMonth: true });
        return days;
    }, [viewYear, viewMonth]);

    const prevMonth = () => { if (viewMonth === 0) { setViewYear(y => y-1); setViewMonth(11); } else setViewMonth(m => m-1); setSelectedDay(null); };
    const nextMonth = () => { if (viewMonth === 11) { setViewYear(y => y+1); setViewMonth(0); } else setViewMonth(m => m+1); setSelectedDay(null); };

    const todayKey = dateKey(today);
    const selectedKey = selectedDay ? dateKey(selectedDay) : null;
    const selectedDayExchanges = selectedKey ? (exchangesByDay[selectedKey] || []) : [];
    const monthDiff = monthExchanges.reduce((s, e) => s + (e.difference || 0), 0);

    return (
        <div>
            <div className="admin-cal-filter-bar">
                <span style={{ fontSize:'0.85rem', color:'var(--text-secondary)', fontWeight:'600' }}>Filtrar:</span>
                <button className={`admin-cal-filter-btn ${filterStore === 'all' ? 'active' : ''}`} onClick={() => setFilterStore('all')}>Todas</button>
                {STORES.map((s, i) => (
                    <button key={s.id} className={`admin-cal-filter-btn ${filterStore === s.id ? 'active' : ''}`} onClick={() => setFilterStore(s.id)}>{s.name}</button>
                ))}
            </div>
            <div className="calendar-nav">
                <div style={{ display:'flex', gap:'0.5rem' }}>
                    <button className="calendar-nav-btn" onClick={prevMonth}>‹</button>
                    <button className="calendar-nav-btn" onClick={nextMonth}>›</button>
                </div>
                <div className="calendar-month-label">{MONTH_NAMES_PT[viewMonth]} {viewYear}</div>
                <div style={{ fontSize:'0.9rem', color:'var(--text-secondary)' }}>{monthExchanges.length} trocas</div>
            </div>
            <div className="calendar-summary-bar">
                <div className="cal-summary-item"><span className="cal-summary-value">{monthExchanges.length}</span><div className="cal-summary-label">Total</div></div>
                <div className="cal-summary-item"><span className="cal-summary-value" style={{ color:'var(--warning)' }}>{monthExchanges.filter(e=>e.status==='pending').length}</span><div className="cal-summary-label">Pendentes</div></div>
                <div className="cal-summary-item"><span className="cal-summary-value" style={{ color: monthDiff >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(Math.abs(monthDiff))}</span><div className="cal-summary-label">Diferença</div></div>
            </div>
            <div className="calendar-grid">
                {DAY_NAMES_PT.map(d => <div key={d} className="calendar-weekday">{d}</div>)}
                {calendarDays.map(({ date, otherMonth }, idx) => {
                    const k = dateKey(date);
                    const exs = exchangesByDay[k] || [];
                    const isToday = k === todayKey;
                    const isSel = k === selectedKey && !otherMonth;
                    let cls = 'calendar-day';
                    if (otherMonth) cls += ' other-month';
                    if (exs.length > 0 && !otherMonth) cls += ' has-exchanges';
                    if (isToday) cls += ' today';
                    if (isSel) cls += ' selected';
                    return (
                        <div key={idx} className={cls} onClick={() => { if (!otherMonth && exs.length > 0) setSelectedDay(isSel ? null : date); }}>
                            <div className="day-number">{date.getDate()}{isToday && <span className="day-today-dot"></span>}</div>
                            {!otherMonth && exs.slice(0, 2).map(ex => {
                                const stIdx = STORES.findIndex(s => s.id === ex.storeId);
                                const color = STORE_COLORS[stIdx % STORE_COLORS.length];
                                return <span key={ex.id} className={`admin-cal-store-tag ${color.cls}`}>{ex.storeName.split(' ')[0]} #{ex.saleNumber}</span>;
                            })}
                            {!otherMonth && exs.length > 2 && <span className="day-more-pill">+{exs.length - 2}</span>}
                        </div>
                    );
                })}
            </div>
            {selectedDay && selectedDayExchanges.length > 0 && (
                <div className="cal-day-detail">
                    <div className="cal-day-detail-title">
                        <span>📅 {selectedDay.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' })} — {selectedDayExchanges.length} trocas</span>
                        <button className="cal-day-detail-close" onClick={() => setSelectedDay(null)}>×</button>
                    </div>
                    {selectedDayExchanges.map(ex => (
                        <div key={ex.storeId+'-'+ex.id} className="cal-exchange-row" onClick={() => setSelectedExchange(ex)}>
                            <div>
                                <div style={{ fontWeight:'700' }}>#{ex.saleNumber} — {ex.customerName}</div>
                                <div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>{ex.storeName}</div>
                            </div>
                            <div style={{ textAlign:'right' }}>
                                <div style={{ fontWeight:'700', color: ex.difference >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(ex.difference)}</div>
                                <span className={`badge badge-${ex.status}`} style={{ padding:'0.2rem 0.6rem', fontSize:'0.75rem' }}>{ex.status === 'pending' ? '⏳' : '✅'}</span>
                            </div>
                        </div>
                    ))}
                </div>
            )}
            {monthExchanges.length > 0 && (
                <div className="month-exchange-list">
                    <div className="month-list-title">📋 Trocas de {MONTH_NAMES_PT[viewMonth]} {viewYear}</div>
                    <div className="table-container">
                        <table className="table">
                            <thead><tr><th>Loja</th><th>Data</th><th>No Venda</th><th>Cliente</th><th>Diferença</th><th>Status</th></tr></thead>
                            <tbody>
                                {monthExchanges.slice().sort((a,b) => { const da = parseDateKey(a.date); const db2 = parseDateKey(b.date); return (db2?db2.getTime():0)-(da?da.getTime():0); }).map(ex => (
                                    <tr key={ex.storeId+'-'+ex.id} style={{ cursor:'pointer' }} onClick={() => setSelectedExchange(ex)}>
                                        <td style={{ fontSize:'0.85rem' }}>{ex.storeName}</td>
                                        <td>{ex.date ? parseDateKey(ex.date).toLocaleDateString('pt-BR') : '-'}</td>
                                        <td style={{ fontWeight:'700' }}>{ex.saleNumber}</td>
                                        <td>{ex.customerName}</td>
                                        <td><span style={{ color: ex.difference >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight:'700' }}>{fmt(ex.difference)}</span></td>
                                        <td><span className={`badge badge-${ex.status}`}>{ex.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}</span></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            )}
            {selectedExchange && <ExchangeModal exchange={selectedExchange} storeId={selectedExchange.storeId} onClose={() => setSelectedExchange(null)} readOnly={true} />}
        </div>
    );
}

function NewExchangePage({ storeId, inventory, showToast }) {
    const [form, setForm] = useState({ saleNumber: '', customerName: '', customerCPF: '', salesPerson: '', date: new Date().toISOString().split('T')[0], observations: '' });
    const [outgoingItems, setOutgoingItems] = useState([]);
    const [incomingItems, setIncomingItems] = useState([]);
    const [photos, setPhotos] = useState([]);
    const [newOut, setNewOut] = useState({ description: '', value: '' });
    const [newIn, setNewIn] = useState({ description: '', value: '', condition: 'Novo' });
    const [saving, setSaving] = useState(false);

    const outTotal = outgoingItems.reduce((s, i) => s + parseFloat(i.value), 0);
    const inTotal = incomingItems.reduce((s, i) => s + parseFloat(i.value), 0);
    const difference = outTotal - inTotal;

    const addOut = () => {
        if (!newOut.description || !newOut.value) return;
        setOutgoingItems(prev => [...prev, { id: Date.now(), description: newOut.description, value: parseFloat(newOut.value) }]);
        setNewOut({ description: '', value: '' });
    };
    const addIn = () => {
        if (!newIn.description || !newIn.value) return;
        setIncomingItems(prev => [...prev, { id: Date.now(), description: newIn.description, value: parseFloat(newIn.value), condition: newIn.condition }]);
        setNewIn({ description: '', value: '', condition: 'Novo' });
    };
    const handlePhoto = (e) => {
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => setPhotos(prev => [...prev, { id: Date.now() + Math.random(), url: ev.target.result }]);
            reader.readAsDataURL(file);
        });
    };

    const handleSubmit = async (e) => {
        e.preventDefault();
        if (!form.saleNumber || !form.customerName || !form.salesPerson) { showToast('Preencha todos os campos obrigatorios', 'error'); return; }
        if (outgoingItems.length === 0 || incomingItems.length === 0) { showToast('Adicione itens de saida e entrada', 'error'); return; }
        setSaving(true);
        try {
            await window.TrocaDB.salvarTroca(storeId, { ...form, outgoingItems, incomingItems, photos, outTotal, inTotal, difference, status: 'pending' });
            setForm({ saleNumber: '', customerName: '', customerCPF: '', salesPerson: '', date: new Date().toISOString().split('T')[0], observations: '' });
            setOutgoingItems([]); setIncomingItems([]); setPhotos([]);
            showToast('Troca registrada com sucesso! 🎉');
        } catch (err) {
            console.error(err);
            showToast('Erro ao salvar. Tente novamente.', 'error');
        } finally { setSaving(false); }
    };

    const setF = (k, v) => setForm(prev => ({ ...prev, [k]: v }));

    return (
        <div>
            <div className="header"><h1 className="page-title">➕ Nova Troca</h1><p className="page-subtitle">Registre uma nova troca de produtos</p></div>
            <form onSubmit={handleSubmit}>
                <div className="card">
                    <h2 className="card-title">📝 Informações da Venda</h2>
                    <div className="form-row">
                        <div className="form-group"><label className="form-label">No da Venda *</label><input type="text" className="form-input" value={form.saleNumber} onChange={e => setF('saleNumber', e.target.value)} placeholder="Ex: 12345" required /></div>
                        <div className="form-group"><label className="form-label">Nome do Cliente *</label><input type="text" className="form-input" value={form.customerName} onChange={e => setF('customerName', e.target.value)} placeholder="Nome completo" required /></div>
                    </div>
                    <div className="form-row">
                        <div className="form-group"><label className="form-label">CPF</label><input type="text" className="form-input" value={form.customerCPF} onChange={e => setF('customerCPF', e.target.value)} placeholder="000.000.000-00" /></div>
                        <div className="form-group"><label className="form-label">Vendedor *</label><input type="text" className="form-input" value={form.salesPerson} onChange={e => setF('salesPerson', e.target.value)} placeholder="Nome do vendedor" required /></div>
                        <div className="form-group"><label className="form-label">Data *</label><input type="date" className="form-input" value={form.date} onChange={e => setF('date', e.target.value)} required /></div>
                    </div>
                    <div className="form-group"><label className="form-label">Observacoes</label><textarea className="form-textarea" value={form.observations} onChange={e => setF('observations', e.target.value)} placeholder="Observacoes adicionais..." /></div>
                </div>
                <div className="card">
                    <h2 className="card-title">📤 Produtos de Saida</h2>
                    <div className="form-row">
                        <div className="form-group"><label className="form-label">Descricao</label><input type="text" className="form-input" value={newOut.description} onChange={e => setNewOut({...newOut, description: e.target.value})} placeholder="Nome do produto" list="inv-list" /></div>
                        <div className="form-group"><label className="form-label">Valor (R$)</label><input type="number" step="0.01" className="form-input" value={newOut.value} onChange={e => setNewOut({...newOut, value: e.target.value})} placeholder="0.00" /></div>
                        <div className="form-group" style={{ display:'flex', alignItems:'flex-end' }}><button type="button" className="btn btn-primary" onClick={addOut} style={{ width:'100%' }}>➕ Adicionar</button></div>
                    </div>
                    <datalist id="inv-list">{inventory.map(i => <option key={i.id} value={i.product} />)}</datalist>
                    {outgoingItems.length > 0 && (
                        <div className="item-list">
                            {outgoingItems.map(item => (
                                <div key={item.id} className="item-card">
                                    <div className="item-info"><div className="item-description">{item.description}</div><div className="item-value">{fmt(item.value)}</div></div>
                                    <button type="button" className="btn btn-danger btn-small" onClick={() => setOutgoingItems(prev => prev.filter(i => i.id !== item.id))}>🗑️</button>
                                </div>
                            ))}
                            <div style={{ textAlign:'right', fontWeight:'700', padding:'1rem', background:'var(--bg-dark)', borderRadius:'12px' }}>Total Saida: <span style={{ color:'var(--accent)' }}>{fmt(outTotal)}</span></div>
                        </div>
                    )}
                </div>
                <div className="card">
                    <h2 className="card-title">📥 Produtos de Entrada</h2>
                    <div className="form-row">
                        <div className="form-group"><label className="form-label">Descricao</label><input type="text" className="form-input" value={newIn.description} onChange={e => setNewIn({...newIn, description: e.target.value})} placeholder="Nome do produto" list="inv-list" /></div>
                        <div className="form-group"><label className="form-label">Valor (R$)</label><input type="number" step="0.01" className="form-input" value={newIn.value} onChange={e => setNewIn({...newIn, value: e.target.value})} placeholder="0.00" /></div>
                        <div className="form-group"><label className="form-label">Condicao</label>
                            <select className="form-select" value={newIn.condition} onChange={e => setNewIn({...newIn, condition: e.target.value})}>
                                <option>Novo</option><option>Usado - Otimo</option><option>Usado - Bom</option><option>Usado - Regular</option><option>Danificado</option>
                            </select>
                        </div>
                        <div className="form-group" style={{ display:'flex', alignItems:'flex-end' }}><button type="button" className="btn btn-primary" onClick={addIn} style={{ width:'100%' }}>➕ Adicionar</button></div>
                    </div>
                    {incomingItems.length > 0 && (
                        <div className="item-list">
                            {incomingItems.map(item => (
                                <div key={item.id} className="item-card">
                                    <div className="item-info"><div className="item-description">{item.description}</div><div className="item-value">{fmt(item.value)}</div><div className="item-condition">{item.condition}</div></div>
                                    <button type="button" className="btn btn-danger btn-small" onClick={() => setIncomingItems(prev => prev.filter(i => i.id !== item.id))}>🗑️</button>
                                </div>
                            ))}
                            <div style={{ textAlign:'right', fontWeight:'700', padding:'1rem', background:'var(--bg-dark)', borderRadius:'12px' }}>Total Entrada: <span style={{ color:'var(--success)' }}>{fmt(inTotal)}</span></div>
                        </div>
                    )}
                </div>
                <div className="card">
                    <h2 className="card-title">📸 Fotos dos Produtos</h2>
                    <input type="file" accept="image/*" multiple onChange={handlePhoto} style={{ display:'none' }} id="photo-upload" />
                    <label htmlFor="photo-upload" className="btn btn-secondary">📷 Adicionar Fotos</label>
                    {photos.length > 0 && (
                        <div className="photos-grid" style={{ marginTop:'1rem' }}>
                            {photos.map(photo => (
                                <div key={photo.id} className="photo-preview">
                                    <img src={photo.url} alt="Produto" />
                                    <button type="button" className="photo-remove" onClick={() => setPhotos(prev => prev.filter(p => p.id !== photo.id))}>×</button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
                {outgoingItems.length > 0 && incomingItems.length > 0 && (
                    <div className="card" style={{ background: difference >= 0 ? 'rgba(6,214,160,0.1)' : 'rgba(239,71,111,0.1)', border:`2px solid ${difference >= 0 ? 'var(--success)' : 'var(--danger)'}` }}>
                        <div style={{ textAlign:'center' }}>
                            <div style={{ fontSize:'3rem', fontWeight:'800', fontFamily:'Syne,sans-serif', color: difference >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(Math.abs(difference))}</div>
                            <div style={{ color:'var(--text-secondary)', marginTop:'0.5rem' }}>
                                {difference > 0 && '↗️ Cliente deve pagar'}
                                {difference < 0 && '↙️ Cliente deve receber'}
                                {difference === 0 && '✅ Troca equilibrada'}
                            </div>
                        </div>
                    </div>
                )}
                <button type="submit" className="btn btn-success" style={{ width:'100%' }} disabled={saving}>
                    {saving ? '⏳ Salvando...' : '✅ Registrar Troca'}
                </button>
            </form>
        </div>
    );
}

function CalendarView({ exchanges, onSelectExchange }) {
    const today = new Date();
    const [viewYear, setViewYear] = useState(today.getFullYear());
    const [viewMonth, setViewMonth] = useState(today.getMonth());
    const [selectedDay, setSelectedDay] = useState(null);

    const exchangesByDay = useMemo(() => {
        const map = {};
        exchanges.forEach(ex => {
            if (!ex.date) return;
            const d = parseDateKey(ex.date);
            if (!d) return;
            const k = dateKey(d);
            if (!map[k]) map[k] = [];
            map[k].push(ex);
        });
        return map;
    }, [exchanges]);

    const monthExchanges = useMemo(() => exchanges.filter(ex => {
        if (!ex.date) return false;
        const d = parseDateKey(ex.date);
        return d && d.getFullYear() === viewYear && d.getMonth() === viewMonth;
    }), [exchanges, viewYear, viewMonth]);

    const calendarDays = useMemo(() => {
        const firstDay = new Date(viewYear, viewMonth, 1);
        const lastDay = new Date(viewYear, viewMonth + 1, 0);
        const days = [];
        for (let i = firstDay.getDay() - 1; i >= 0; i--) days.push({ date: new Date(viewYear, viewMonth, -i), otherMonth: true });
        for (let i = 1; i <= lastDay.getDate(); i++) days.push({ date: new Date(viewYear, viewMonth, i), otherMonth: false });
        const rem = 7 - (days.length % 7);
        if (rem < 7) for (let i = 1; i <= rem; i++) days.push({ date: new Date(viewYear, viewMonth + 1, i), otherMonth: true });
        return days;
    }, [viewYear, viewMonth]);

    const prevMonth = () => { if (viewMonth === 0) { setViewYear(y => y-1); setViewMonth(11); } else setViewMonth(m => m-1); setSelectedDay(null); };
    const nextMonth = () => { if (viewMonth === 11) { setViewYear(y => y+1); setViewMonth(0); } else setViewMonth(m => m+1); setSelectedDay(null); };

    const todayKey = dateKey(today);
    const selectedKey = selectedDay ? dateKey(selectedDay) : null;
    const selectedDayExchanges = selectedKey ? (exchangesByDay[selectedKey] || []) : [];
    const monthDiff = monthExchanges.reduce((s, e) => s + (e.difference || 0), 0);

    return (
        <div>
            <div className="calendar-nav">
                <div style={{ display:'flex', gap:'0.5rem' }}>
                    <button className="calendar-nav-btn" onClick={prevMonth}>‹</button>
                    <button className="calendar-nav-btn" onClick={nextMonth}>›</button>
                </div>
                <div className="calendar-month-label">{MONTH_NAMES_PT[viewMonth]} {viewYear}</div>
                <div style={{ fontSize:'0.9rem', color:'var(--text-secondary)' }}>{monthExchanges.length} trocas</div>
            </div>
            <div className="calendar-summary-bar">
                <div className="cal-summary-item"><span className="cal-summary-value">{monthExchanges.length}</span><div className="cal-summary-label">Total</div></div>
                <div className="cal-summary-item"><span className="cal-summary-value" style={{ color:'var(--warning)' }}>{monthExchanges.filter(e=>e.status==='pending').length}</span><div className="cal-summary-label">Pendentes</div></div>
                <div className="cal-summary-item"><span className="cal-summary-value" style={{ color: monthDiff >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(Math.abs(monthDiff))}</span><div className="cal-summary-label">Diferença</div></div>
            </div>
            <div className="calendar-grid">
                {DAY_NAMES_PT.map(d => <div key={d} className="calendar-weekday">{d}</div>)}
                {calendarDays.map(({ date, otherMonth }, idx) => {
                    const k = dateKey(date);
                    const exs = exchangesByDay[k] || [];
                    const isToday = k === todayKey;
                    const isSel = k === selectedKey && !otherMonth;
                    let cls = 'calendar-day';
                    if (otherMonth) cls += ' other-month';
                    if (exs.length > 0 && !otherMonth) cls += ' has-exchanges';
                    if (isToday) cls += ' today';
                    if (isSel) cls += ' selected';
                    return (
                        <div key={idx} className={cls} onClick={() => { if (!otherMonth && exs.length > 0) setSelectedDay(isSel ? null : date); }}>
                            <div className="day-number">{date.getDate()}{isToday && <span className="day-today-dot"></span>}</div>
                            {!otherMonth && exs.slice(0,2).map(ex => <span key={ex.id} className={`day-exchange-pill ${ex.status}`}>{ex.saleNumber}</span>)}
                            {!otherMonth && exs.length > 2 && <span className="day-more-pill">+{exs.length-2}</span>}
                        </div>
                    );
                })}
            </div>
            {selectedDay && selectedDayExchanges.length > 0 && (
                <div className="cal-day-detail">
                    <div className="cal-day-detail-title">
                        <span>📅 {selectedDay.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' })}</span>
                        <button className="cal-day-detail-close" onClick={() => setSelectedDay(null)}>×</button>
                    </div>
                    {selectedDayExchanges.map(ex => (
                        <div key={ex.id} className="cal-exchange-row" onClick={() => onSelectExchange(ex)}>
                            <div><div style={{ fontWeight:'700' }}>#{ex.saleNumber} — {ex.customerName}</div><div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>{ex.salesPerson}</div></div>
                            <div style={{ textAlign:'right' }}>
                                <div style={{ fontWeight:'700', color: ex.difference >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(ex.difference)}</div>
                                <span className={`badge badge-${ex.status}`} style={{ padding:'0.2rem 0.6rem', fontSize:'0.75rem' }}>{ex.status === 'pending' ? '⏳' : '✅'}</span>
                            </div>
                        </div>
                    ))}
                </div>
            )}
            {monthExchanges.length > 0 && (
                <div className="month-exchange-list">
                    <div className="month-list-title">📋 Trocas de {MONTH_NAMES_PT[viewMonth]}</div>
                    <div className="table-container">
                        <table className="table">
                            <thead><tr><th>Data</th><th>No Venda</th><th>Cliente</th><th>Vendedor</th><th>Diferença</th><th>Status</th><th></th></tr></thead>
                            <tbody>
                                {monthExchanges.slice().sort((a,b) => { const da=parseDateKey(a.date); const db2=parseDateKey(b.date); return (db2?db2.getTime():0)-(da?da.getTime():0); }).map(ex => (
                                    <tr key={ex.id} style={{ cursor:'pointer' }} onClick={() => onSelectExchange(ex)}>
                                        <td>{ex.date ? parseDateKey(ex.date).toLocaleDateString('pt-BR') : '-'}</td>
                                        <td style={{ fontWeight:'700' }}>{ex.saleNumber}</td>
                                        <td>{ex.customerName}</td>
                                        <td>{ex.salesPerson || '-'}</td>
                                        <td><span style={{ color: ex.difference >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight:'700' }}>{fmt(ex.difference)}</span></td>
                                        <td><span className={`badge badge-${ex.status}`}>{ex.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}</span></td>
                                        <td><button className="btn btn-primary btn-small" onClick={e => { e.stopPropagation(); onSelectExchange(ex); }}>👁️</button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            )}
        </div>
    );
}

function InventoryPage({ inventory, onSave, showToast }) {
    const [editingId, setEditingId] = useState(null);
    const [editForm, setEditForm] = useState({});
    const [search, setSearch] = useState('');
    const [newProduct, setNewProduct] = useState({ product:'', barcode:'', group:'', quantity:'', minQuantity:'', price:'' });

    const filtered = inventory.filter(item => {
        const s = search.toLowerCase();
        return (item.product||'').toLowerCase().includes(s) || (item.barcode||'').toString().includes(s) || (item.group||'').toLowerCase().includes(s);
    });

    const getStatus = (q, m) => q === 0 ? 'out-of-stock' : q <= m ? 'low-stock' : 'in-stock';
    const getLabel  = (q, m) => q === 0 ? '❌ Esgotado' : q <= m ? '⚠️ Baixo' : '✅ OK';

    const addProduct = async () => {
        if (!newProduct.product) return;
        const updated = [...inventory, { id: Date.now(), product: newProduct.product, barcode: newProduct.barcode, group: newProduct.group, quantity: parseInt(newProduct.quantity||0), minQuantity: parseInt(newProduct.minQuantity||3), price: parseFloat(newProduct.price||0) }];
        await onSave(updated);
        setNewProduct({ product:'', barcode:'', group:'', quantity:'', minQuantity:'', price:'' });
        showToast('Produto adicionado');
    };

    const saveEdit = async () => {
        await onSave(inventory.map(i => i.id === editingId ? editForm : i));
        setEditingId(null);
        showToast('Produto atualizado');
    };

    const deleteProduct = async (id) => {
        if (!confirm('Excluir este produto?')) return;
        await onSave(inventory.filter(i => i.id !== id));
        showToast('Produto removido');
    };

    return (
        <div>
            <div className="header"><h1 className="page-title">📦 Controle de Estoque</h1><p className="page-subtitle">Gerencie o estoque de produtos</p></div>
            <div className="stats-grid">
                <div className="stat-card"><span className="stat-icon">📦</span><span className="stat-value">{inventory.length}</span><span className="stat-label">Total</span></div>
                <div className="stat-card"><span className="stat-icon">✅</span><span className="stat-value">{inventory.filter(i => i.quantity > i.minQuantity).length}</span><span className="stat-label">Em Estoque</span></div>
                <div className="stat-card"><span className="stat-icon">⚠️</span><span className="stat-value">{inventory.filter(i => i.quantity > 0 && i.quantity <= i.minQuantity).length}</span><span className="stat-label">Estoque Baixo</span></div>
                <div className="stat-card"><span className="stat-icon">❌</span><span className="stat-value">{inventory.filter(i => i.quantity === 0).length}</span><span className="stat-label">Esgotados</span></div>
            </div>
            <div className="card">
                <h2 className="card-title">➕ Adicionar Produto</h2>
                <div className="form-row">
                    <div className="form-group"><input type="text" className="form-input" placeholder="Codigo de Barras" value={newProduct.barcode} onChange={e => setNewProduct({...newProduct, barcode: e.target.value})} /></div>
                    <div className="form-group"><input type="text" className="form-input" placeholder="Nome do Produto *" value={newProduct.product} onChange={e => setNewProduct({...newProduct, product: e.target.value})} /></div>
                    <div className="form-group"><input type="text" className="form-input" placeholder="Grupo" value={newProduct.group} onChange={e => setNewProduct({...newProduct, group: e.target.value})} /></div>
                    <div className="form-group"><input type="number" className="form-input" placeholder="Quantidade" value={newProduct.quantity} onChange={e => setNewProduct({...newProduct, quantity: e.target.value})} /></div>
                    <div className="form-group"><input type="number" step="0.01" className="form-input" placeholder="Preco" value={newProduct.price} onChange={e => setNewProduct({...newProduct, price: e.target.value})} /></div>
                    <div className="form-group"><button className="btn btn-success" onClick={addProduct} style={{ width:'100%' }}>➕ Adicionar</button></div>
                </div>
            </div>
            <div className="card">
                <div className="form-group" style={{ marginBottom:'1.5rem' }}>
                    <input type="text" className="form-input" placeholder="🔍 Buscar produto..." value={search} onChange={e => setSearch(e.target.value)} />
                </div>
                <div className="table-container">
                    <table className="table">
                        <thead><tr><th>Produto</th><th>Grupo</th><th>Qtd</th><th>Preco</th><th>Status</th><th>Acoes</th></tr></thead>
                        <tbody>
                            {filtered.map(item => (
                                <tr key={item.id}>
                                    <td>{editingId === item.id ? <input type="text" className="form-input" value={editForm.product} onChange={e => setEditForm({...editForm, product: e.target.value})} /> : <strong>{item.product}</strong>}</td>
                                    <td style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>{item.group || '-'}</td>
                                    <td>{editingId === item.id ? <input type="number" className="form-input" value={editForm.quantity} onChange={e => setEditForm({...editForm, quantity: parseInt(e.target.value)})} style={{ width:'80px' }} /> : <span style={{ fontWeight:'700' }}>{item.quantity}</span>}</td>
                                    <td>{editingId === item.id ? <input type="number" step="0.01" className="form-input" value={editForm.price} onChange={e => setEditForm({...editForm, price: parseFloat(e.target.value)})} style={{ width:'100px' }} /> : fmt(item.price)}</td>
                                    <td><span className={`stock-badge ${getStatus(item.quantity, item.minQuantity)}`}>{getLabel(item.quantity, item.minQuantity)}</span></td>
                                    <td>
                                        {editingId === item.id ? (
                                            <div style={{ display:'flex', gap:'0.5rem' }}>
                                                <button className="btn btn-success btn-small" onClick={saveEdit}>✅</button>
                                                <button className="btn btn-secondary btn-small" onClick={() => setEditingId(null)}>❌</button>
                                            </div>
                                        ) : (
                                            <div style={{ display:'flex', gap:'0.5rem' }}>
                                                <button className="btn btn-primary btn-small" onClick={() => { setEditingId(item.id); setEditForm(item); }}>✏️</button>
                                                <button className="btn btn-danger btn-small" onClick={() => deleteProduct(item.id)}>🗑️</button>
                                            </div>
                                        )}
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    );
}

        if (!exchanges.length) { alert('Nao ha dados para exportar'); return; }
        const wb = XLSX.utils.book_new();

            'Status': ex.status === 'pending' ? 'Pendente' : 'Confirmado'
        }))), 'Trocas');
        XLSX.writeFile(wb, 'trocas-' + storeName.replace(/\s/g,'-') + '-' + new Date().toISOString().split('T')[0] + '.xlsx');

                <div className="stat-card"><span className="stat-icon">⏳</span><span className="stat-value">{exchanges.filter(e=>e.status==='pending').length}</span><span className="stat-label">Pendentes</span></div>

function ExchangeModal({ exchange, storeId, onClose, onStatusChange, readOnly, onEdit }) {
    const [confirming, setConfirming] = useState(false);
    const [showReceipt, setShowReceipt] = useState(false);

    const handlePrint = () => {
        setShowReceipt(true);
        setTimeout(() => { window.print(); setTimeout(() => setShowReceipt(false), 500); }, 300);
    };

    const handleConfirm = async () => {
        if (!confirm('Confirmar que todos os itens foram conferidos?')) return;
        setConfirming(true);
        try {
            await window.TrocaDB.atualizarStatus(storeId, exchange.id, 'confirmed');
            onStatusChange && onStatusChange(exchange.id, 'confirmed');
        } catch { alert('Erro ao atualizar status'); }
        finally { setConfirming(false); }
    };

    return (
        <>
        {showReceipt && <PrintReceipt exchange={exchange} storeName={exchange.storeName} />}
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content" onClick={e => e.stopPropagation()}>
                <div className="modal-header">
                    <h2 className="modal-title">📋 Detalhes da Troca</h2>
                    <button className="modal-close" onClick={onClose}>×</button>
                </div>
                <div className="modal-body">
                    <div style={{ marginBottom:'1.5rem' }}>
                        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'1rem', alignItems:'center' }}>
                            <div><div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>VENDA</div><div style={{ fontSize:'1.5rem', fontWeight:'700' }}>{exchange.saleNumber}</div></div>
                            <span className={`badge badge-${exchange.status}`}>{exchange.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}</span>
                        </div>
                        {exchange.storeName && <div style={{ marginBottom:'1rem' }}><div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>Loja</div><div style={{ fontWeight:'600' }}>{exchange.storeName}</div></div>}
                        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1rem', marginBottom:'1rem' }}>
                            <div><div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>Cliente</div><div style={{ fontWeight:'600' }}>{exchange.customerName}</div></div>
                            <div><div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>Data</div><div style={{ fontWeight:'600' }}>{exchange.date ? new Date(exchange.date).toLocaleDateString('pt-BR') : '-'}</div></div>
                        </div>
                        {exchange.salesPerson && <div style={{ marginBottom:'1rem' }}><div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>Vendedor</div><div style={{ fontWeight:'600' }}>{exchange.salesPerson}</div></div>}
                        {exchange.observations && <div><div style={{ fontSize:'0.85rem', color:'var(--text-secondary)', marginBottom:'0.5rem' }}>Observacoes</div><div style={{ padding:'1rem', background:'var(--bg-dark)', borderRadius:'8px' }}>{exchange.observations}</div></div>}
                    </div>
                    <div style={{ borderTop:'1px solid var(--border)', paddingTop:'1.5rem', marginBottom:'1.5rem' }}>
                        <div style={{ fontWeight:'700', marginBottom:'1rem' }}>📤 Itens de Saida</div>
                        {(exchange.outgoingItems||[]).map(item => (
                            <div key={item.id} style={{ padding:'0.75rem', background:'var(--bg-dark)', borderRadius:'8px', marginBottom:'0.5rem' }}>
                                <div style={{ fontWeight:'600' }}>{item.description}</div>
                                <div style={{ color:'var(--accent)', fontWeight:'600' }}>{fmt(parseFloat(item.value))}</div>
                            </div>
                        ))}
                        <div style={{ textAlign:'right', marginTop:'0.5rem', fontWeight:'700' }}>Total: {fmt(exchange.outTotal)}</div>
                    </div>
                    <div style={{ borderTop:'1px solid var(--border)', paddingTop:'1.5rem', marginBottom:'1.5rem' }}>
                        <div style={{ fontWeight:'700', marginBottom:'1rem' }}>📥 Itens de Entrada</div>
                        {(exchange.incomingItems||[]).map(item => (
                            <div key={item.id} style={{ padding:'0.75rem', background:'var(--bg-dark)', borderRadius:'8px', marginBottom:'0.5rem' }}>
                                <div style={{ fontWeight:'600' }}>{item.description}</div>
                                <div style={{ display:'flex', justifyContent:'space-between' }}>
                                    <span style={{ color:'var(--accent)', fontWeight:'600' }}>{fmt(parseFloat(item.value))}</span>
                                    <span style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>{item.condition}</span>
                                </div>
                            </div>
                        ))}
                        <div style={{ textAlign:'right', marginTop:'0.5rem', fontWeight:'700' }}>Total: {fmt(exchange.inTotal)}</div>
                    </div>
                    <div style={{ background:'var(--bg-dark)', padding:'1.5rem', borderRadius:'12px', marginBottom:'1.5rem', border:`2px solid ${exchange.difference >= 0 ? 'var(--success)' : 'var(--danger)'}` }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                            <span>💰 Diferença:</span>
                            <div style={{ textAlign:'right' }}>
                                <div style={{ fontSize:'2rem', fontWeight:'800', color: exchange.difference >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(Math.abs(exchange.difference||0))}</div>
                                <div style={{ fontSize:'0.9rem', color:'var(--text-secondary)' }}>
                                    {exchange.difference > 0 && '↗️ Cliente deve pagar'}
                                    {exchange.difference < 0 && '↙️ Cliente deve receber'}
                                    {exchange.difference === 0 && '✅ Equilibrada'}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div style={{ display:'flex', gap:'1rem', marginTop:'1rem' }}>
                        <button className="btn btn-secondary" style={{ flex:1 }} onClick={handlePrint}>🖨️ Imprimir</button>
                        {!readOnly && onEdit && <button className="btn btn-warning" style={{ flex:1 }} onClick={() => onEdit(exchange)}>✏️ Editar</button>}
                    </div>
                    {!readOnly && exchange.status === 'pending' && (
                        <button className="btn btn-success" style={{ width:'100%', marginTop:'1rem' }} onClick={handleConfirm} disabled={confirming}>
                            {confirming ? '⏳ Confirmando...' : '✅ Confirmar Conferencia'}
                        </button>
                    )}
                </div>
            </div>
        </div>
        </>
    );
}
