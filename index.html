<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrocaFácil - Sistema de Gestão de Trocas</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35; --primary-dark: #E55A2B; --secondary: #004E89;
            --secondary-light: #1A6BA8; --accent: #F7B32B; --success: #06D6A0;
            --danger: #EF476F; --warning: #FFD23F; --bg-dark: #0F1419;
            --bg-card: #1A2332; --bg-hover: #252F3F; --text-primary: #FFFFFF;
            --text-secondary: #A0AEC0; --text-muted: #718096; --border: #2D3748;
            --shadow: rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Work Sans', sans-serif; background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1f2e 100%); color: var(--text-primary); min-height: 100vh; line-height: 1.6; }
        #root { min-height: 100vh; }

        /* LOGIN */
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
        .login-card { background: var(--bg-card); border-radius: 20px; padding: 3rem; width: 100%; max-width: 450px; border: 1px solid var(--border); box-shadow: 0 10px 40px var(--shadow); }
        .login-logo { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; text-align: center; margin-bottom: 1rem; background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .login-subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 2rem; font-size: 1.1rem; }

        /* LAYOUT */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 2rem 0; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; transition: transform 0.3s ease; }
        .logo { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; padding: 0 2rem 1rem; background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.5px; }
        .store-info { padding: 0 2rem 2rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
        .store-name { font-weight: 600; color: var(--text-primary); margin-bottom: 0.25rem; }
        .user-name { font-size: 0.9rem; color: var(--text-secondary); }
        .sync-status { font-size: 0.8rem; margin-top: 0.5rem; display: flex; align-items: center; gap: 0.4rem; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .sync-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
        .sync-dot.offline { background: var(--danger); }
        .sync-dot.loading { background: var(--warning); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        .nav-menu { list-style: none; padding: 0 1rem; }
        .nav-item { margin-bottom: 0.5rem; }
        .nav-link { display: flex; align-items: center; padding: 1rem; color: var(--text-secondary); text-decoration: none; border-radius: 12px; transition: all 0.2s ease; font-weight: 500; cursor: pointer; gap: 0.75rem; }
        .nav-link:hover { background: var(--bg-hover); color: var(--text-primary); transform: translateX(4px); }
        .nav-link.active { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; box-shadow: 0 4px 12px rgba(255,107,53,0.3); }
        .nav-icon { font-size: 1.25rem; }
        .logout-btn { margin: 1rem; padding: 1rem; background: var(--danger); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; width: calc(100% - 2rem); }
        .logout-btn:hover { background: #d63961; transform: translateY(-2px); }
        .main-content { flex: 1; margin-left: 280px; padding: 2rem; max-width: 100%; }

        /* HEADER */
        .header { margin-bottom: 2.5rem; animation: slideDown 0.6s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .page-title { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -1px; }
        .page-subtitle { color: var(--text-secondary); font-size: 1.1rem; }

        /* CARDS */
        .card { background: var(--bg-card); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; border: 1px solid var(--border); box-shadow: 0 4px 20px var(--shadow); animation: fadeIn 0.6s ease; animation-fill-mode: both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-title { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }

        /* FORMS */
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-primary); font-size: 0.95rem; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 0.875rem 1rem; background: var(--bg-dark); border: 2px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; transition: all 0.2s ease; font-family: 'Work Sans', sans-serif; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        .form-textarea { resize: vertical; min-height: 100px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }

        /* BUTTONS */
        .btn { padding: 0.875rem 1.75rem; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-size: 1rem; display: inline-flex; align-items: center; gap: 0.5rem; font-family: 'Work Sans', sans-serif; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-primary { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: var(--bg-dark); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-primary); }
        .btn-small { padding: 0.5rem 1rem; font-size: 0.9rem; }

        /* ITEMS */
        .item-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem; }
        .item-card { background: var(--bg-dark); padding: 1.25rem; border-radius: 12px; border: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease; }
        .item-card:hover { border-color: var(--primary); transform: translateX(4px); }
        .item-info { flex: 1; }
        .item-description { font-weight: 600; margin-bottom: 0.25rem; font-size: 1.05rem; }
        .item-value { color: var(--accent); font-weight: 700; font-size: 1.1rem; }
        .item-condition { font-size: 0.9rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .item-actions { display: flex; gap: 0.5rem; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-card); padding: 1.75rem; border-radius: 16px; border: 1px solid var(--border); transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); }
        .stat-icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
        .stat-value { font-size: 2.25rem; font-weight: 800; font-family: 'Syne', sans-serif; margin-bottom: 0.5rem; display: block; }
        .stat-label { color: var(--text-secondary); font-size: 0.95rem; }

        /* TABLE */
        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
        .table { width: 100%; border-collapse: collapse; }
        .table thead { background: var(--bg-dark); }
        .table th { padding: 1rem; text-align: left; font-weight: 700; color: var(--text-primary); border-bottom: 2px solid var(--border); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .table td { padding: 1rem; border-bottom: 1px solid var(--border); }
        .table tbody tr { transition: background 0.2s ease; }
        .table tbody tr:hover { background: var(--bg-hover); }
        .table tbody tr:last-child td { border-bottom: none; }

        /* BADGES */
        .badge { display: inline-block; padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; }
        .badge-pending { background: rgba(255,210,63,0.2); color: var(--warning); }
        .badge-confirmed { background: rgba(6,214,160,0.2); color: var(--success); }
        .badge-danger { background: rgba(239,71,111,0.2); color: var(--danger); }
        .stock-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; }
        .stock-badge.in-stock { background: rgba(6,214,160,0.2); color: var(--success); }
        .stock-badge.low-stock { background: rgba(255,210,63,0.2); color: var(--warning); }
        .stock-badge.out-of-stock { background: rgba(239,71,111,0.2); color: var(--danger); }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 2rem; backdrop-filter: blur(4px); }
        .modal-content { background: var(--bg-card); border-radius: 20px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); box-shadow: 0 20px 60px var(--shadow); animation: modalSlideIn 0.3s ease; }
        @keyframes modalSlideIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .modal-header { padding: 2rem 2rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-family: 'Syne', sans-serif; font-size: 1.75rem; font-weight: 700; }
        .modal-close { background: none; border: none; color: var(--text-secondary); font-size: 2rem; cursor: pointer; padding: 0; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: all 0.2s; }
        .modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }
        .modal-body { padding: 2rem; }

        /* PHOTOS */
        .photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
        .photo-preview { position: relative; aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 2px solid var(--border); transition: all 0.2s; }
        .photo-preview:hover { border-color: var(--primary); transform: scale(1.05); }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .photo-remove { position: absolute; top: 0.5rem; right: 0.5rem; background: var(--danger); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.2s; }

        /* MISC */
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-secondary); }
        .empty-state-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
        .action-buttons { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .filters { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }

        /* LOADING */
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,20,25,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .loading-spinner { width: 60px; height: 60px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-family: 'Syne', sans-serif; font-size: 1.2rem; color: var(--text-secondary); }

        /* TOAST */
        .toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 9998; display: flex; flex-direction: column; gap: 0.75rem; }
        .toast { padding: 1rem 1.5rem; border-radius: 12px; font-weight: 600; box-shadow: 0 8px 24px var(--shadow); animation: toastIn 0.3s ease; display: flex; align-items: center; gap: 0.75rem; min-width: 280px; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        .toast-success { background: var(--success); color: white; }
        .toast-error { background: var(--danger); color: white; }
        .toast-info { background: var(--secondary); color: white; }

        /* ── CALENDÁRIO ──────────────────────────────────────────────────────── */
        .view-toggle { display: flex; gap: 0.5rem; background: var(--bg-dark); border-radius: 12px; padding: 0.4rem; margin-bottom: 1.5rem; }
        .view-toggle-btn { flex: 1; padding: 0.6rem 1rem; border: none; border-radius: 8px; font-family: 'Work Sans', sans-serif; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; color: var(--text-secondary); background: transparent; }
        .view-toggle-btn.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 3px 10px rgba(255,107,53,0.35); }

        .calendar-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
        .calendar-month-label { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
        .calendar-nav-btn { background: var(--bg-dark); border: 2px solid var(--border); color: var(--text-primary); border-radius: 10px; width: 40px; height: 40px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .calendar-nav-btn:hover { border-color: var(--primary); color: var(--primary); transform: scale(1.05); }

        .calendar-summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .cal-summary-item { background: var(--bg-dark); border-radius: 12px; padding: 1rem 1.25rem; border: 1px solid var(--border); text-align: center; }
        .cal-summary-value { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; display: block; }
        .cal-summary-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-weekday { text-align: center; padding: 0.6rem 0; font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .calendar-day { background: var(--bg-dark); border-radius: 10px; min-height: 90px; padding: 0.5rem; border: 2px solid transparent; transition: all 0.2s; position: relative; cursor: default; }
        .calendar-day.has-exchanges { border-color: rgba(255,107,53,0.4); cursor: pointer; }
        .calendar-day.has-exchanges:hover { border-color: var(--primary); background: var(--bg-hover); transform: scale(1.02); }
        .calendar-day.today { border-color: var(--accent) !important; }
        .calendar-day.other-month { opacity: 0.3; }
        .calendar-day.selected { border-color: var(--primary) !important; background: rgba(255,107,53,0.12) !important; }
        .day-number { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.35rem; }
        .day-today-dot { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-left: 4px; vertical-align: middle; }
        .day-exchange-pill { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-radius: 6px; padding: 0.15rem 0.4rem; font-size: 0.72rem; font-weight: 700; margin-bottom: 0.2rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity 0.15s; }
        .day-exchange-pill.confirmed { background: linear-gradient(135deg, var(--success), #04b887); }
        .day-more-pill { background: var(--border); color: var(--text-secondary); border-radius: 6px; padding: 0.15rem 0.4rem; font-size: 0.7rem; font-weight: 600; display: inline-block; }

        .cal-day-detail { margin-top: 1.5rem; background: var(--bg-dark); border-radius: 14px; padding: 1.25rem; border: 1px solid var(--border); animation: fadeIn 0.3s ease; }
        .cal-day-detail-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
        .cal-day-detail-close { background: none; border: none; color: var(--text-secondary); font-size: 1.4rem; cursor: pointer; padding: 0; line-height: 1; }
        .cal-exchange-row { padding: 0.75rem 1rem; border-radius: 10px; background: var(--bg-card); border: 1px solid var(--border); margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: border-color 0.2s; }
        .cal-exchange-row:hover { border-color: var(--primary); }

        /* Month list below calendar */
        .month-exchange-list { margin-top: 2rem; }
        .month-list-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-secondary); }

        /* ── CALENDÁRIO GLOBAL ADMIN ─────────────────────────────────────────── */
        .admin-cal-store-tag {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.12rem 0.45rem; border-radius: 5px;
            font-size: 0.68rem; font-weight: 700;
            margin-bottom: 0.18rem; width: 100%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .store-color-0  { background: rgba(255,107,53,0.25); color: #FF6B35; }
        .store-color-1  { background: rgba(6,214,160,0.25);  color: #06D6A0; }
        .store-color-2  { background: rgba(247,179,43,0.25); color: #F7B32B; }
        .store-color-3  { background: rgba(0,78,137,0.4);    color: #5bc0eb; }
        .store-color-4  { background: rgba(239,71,111,0.25); color: #EF476F; }
        .store-color-5  { background: rgba(160,110,230,0.25);color: #a06ee6; }
        .store-color-6  { background: rgba(45,200,180,0.25); color: #2dc8b4; }

        .admin-month-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .admin-month-tab { padding: 0.5rem 1.1rem; border-radius: 10px; background: var(--bg-dark); border: 2px solid var(--border); color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
        .admin-month-tab:hover { border-color: var(--primary); color: var(--primary); }
        .admin-month-tab.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-color: var(--primary); color: white; box-shadow: 0 3px 10px rgba(255,107,53,0.3); }

        .store-legend { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 1.5rem; }
        .store-legend-item { display: flex; align-items: center; gap: 0.4rem; padding: 0.35rem 0.75rem; border-radius: 8px; background: var(--bg-dark); border: 1px solid var(--border); font-size: 0.82rem; font-weight: 600; }
        .store-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        .admin-cal-day-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 2rem; backdrop-filter: blur(4px); }
        .admin-cal-day-modal-content { background: var(--bg-card); border-radius: 20px; max-width: 750px; width: 100%; max-height: 88vh; overflow-y: auto; border: 1px solid var(--border); box-shadow: 0 20px 60px var(--shadow); animation: modalSlideIn 0.3s ease; }

        .admin-cal-filter-bar { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
        .admin-cal-filter-btn { padding: 0.4rem 0.9rem; border-radius: 8px; border: 2px solid var(--border); background: var(--bg-dark); color: var(--text-secondary); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .admin-cal-filter-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(255,107,53,0.1); }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .page-title { font-size: 2rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .calendar-grid { gap: 2px; }
            .calendar-day { min-height: 64px; padding: 0.35rem; }
            .calendar-summary-bar { grid-template-columns: 1fr; }
        }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>

        messagingSenderId: "1070189120274",
        appId: "1:1070189120274:web:f0d995fa8426f5a4df41cb"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    async function salvarTroca(storeId, troca) {
        const { photos, ...trocaSemFotos } = troca;
        const ref = collection(db, "stores", storeId, "exchanges");
        const docRef = await addDoc(ref, {
            ...trocaSemFotos,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
        });
        if (photos && photos.length > 0) {
            const fotos = JSON.parse(localStorage.getItem(`photos_${storeId}`) || '{}');
            fotos[docRef.id] = photos;
            localStorage.setItem(`photos_${storeId}`, JSON.stringify(fotos));
        }
        return docRef.id;
    }

    async function atualizarStatus(storeId, trocaId, novoStatus) {
        const ref = doc(db, "stores", storeId, "exchanges", trocaId);
        await updateDoc(ref, { status: novoStatus, updatedAt: serverTimestamp() });
    }

    async function deletarTroca(storeId, trocaId) {
        const ref = doc(db, "stores", storeId, "exchanges", trocaId);
        await deleteDoc(ref);
        const fotos = JSON.parse(localStorage.getItem(`photos_${storeId}`) || '{}');
        delete fotos[trocaId];
        localStorage.setItem(`photos_${storeId}`, JSON.stringify(fotos));
    }

    function ouvirTrocas(storeId, callback) {
        const ref = query(
            collection(db, "stores", storeId, "exchanges"),
            orderBy("createdAt", "desc")
        );
        return onSnapshot(ref, (snap) => {
            const fotos = JSON.parse(localStorage.getItem(`photos_${storeId}`) || '{}');
            const trocas = snap.docs.map(d => ({
                ...d.data(),
                id: d.id,
                photos: fotos[d.id] || []
            }));
            callback(trocas);
        }, (err) => {
            console.error("Firebase onSnapshot erro:", err);
            callback([]);
        });
    }

    function ouvirTodasLojas(lojas, callback) {
        const unsubscribes = lojas.map(loja => {
            const ref = query(
                collection(db, "stores", loja.id, "exchanges"),
                orderBy("createdAt", "desc")
            );
            return onSnapshot(ref, (snap) => {
                const trocas = snap.docs.map(d => ({
                    ...d.data(),
                    id: d.id,
                    storeId: loja.id,
                    storeName: loja.name
                }));
                callback(loja.id, trocas);
            }, (err) => {
                console.error(`Firebase erro loja ${loja.id}:`, err);
            });
        });
        return () => unsubscribes.forEach(u => u());
    }

    async function salvarEstoque(storeId, inventory) {
        const ref = doc(db, "stores", storeId, "config", "inventory");
        await setDoc(ref, { items: inventory, updatedAt: serverTimestamp() });
    }

    function ouvirEstoque(storeId, initialInventory, callback) {
        const ref = doc(db, "stores", storeId, "config", "inventory");
        return onSnapshot(ref, (snap) => {
            if (snap.exists()) {
                callback(snap.data().items || initialInventory);
            } else {
                callback(initialInventory);
            }
        }, () => callback(initialInventory));
    }

    window.TrocaDB = {
        salvarTroca, atualizarStatus, deletarTroca,
        ouvirTrocas, ouvirTodasLojas, salvarEstoque, ouvirEstoque
    };

    console.log("🔥 Firebase TrocaDB pronto!");
</script>

// ─── HELPERS DE DATA ──────────────────────────────────────────────────────────
function parseDateKey(dateStr) {
    if (!dateStr) return null;
    try {
        const parts = dateStr.split('-');
        if (parts.length === 3) {
            return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        }
        return new Date(dateStr);
    } catch { return null; }
}

function dateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ─── TOAST HOOK ───────────────────────────────────────────────────────────────
function useToast() {
    const [toasts, setToasts] = useState([]);
    const show = useCallback((message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
    }, []);
    return { toasts, show };
}

function ToastContainer({ toasts }) {
    return (
        <div className="toast-container">
            {toasts.map(t => (
                <div key={t.id} className={`toast toast-${t.type}`}>
                    {t.type === 'success' ? '✅' : t.type === 'error' ? '❌' : 'ℹ️'}
                    {t.message}
                </div>
            ))}
        </div>
    );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
    const [selectedStore, setSelectedStore] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');

    const handleLogin = (e) => {
        e.preventDefault();
        if (selectedStore === 'admin') {
            if (password !== ADMIN.password) { setError('Senha incorreta'); return; }
            onLogin({ ...ADMIN, isAdmin: true });
            return;
        }
        const store = STORES.find(s => s.id === selectedStore);
        if (!store) { setError('Selecione uma loja'); return; }
        if (password !== store.password) { setError('Senha incorreta'); return; }
        onLogin({ ...store, isAdmin: false });
    };

    return (
        <div className="login-container">
            <div className="login-card">
                <div className="login-logo">🔄 TrocaFácil</div>
                <div className="login-subtitle">Sistema de Gestão de Trocas</div>
                <form onSubmit={handleLogin}>
                    <div className="form-group">
                        <label className="form-label">Selecione a Loja</label>
                        <select className="form-select" value={selectedStore}
                            onChange={(e) => { setSelectedStore(e.target.value); setError(''); }} required>
                            <option value="">Escolha uma loja...</option>
                            <option value="admin">👨‍💼 Administrador</option>
                            <option disabled>──────────</option>
                            {STORES.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                        </select>
                    </div>
                    <div className="form-group">
                        <label className="form-label">Senha</label>
                        <input type="password" className="form-input" value={password}
                            onChange={(e) => { setPassword(e.target.value); setError(''); }}
                            placeholder="Digite a senha" required />
                    </div>
                    {error && (
                        <div style={{ padding: '1rem', background: 'rgba(239,71,111,0.2)', color: 'var(--danger)', borderRadius: '12px', marginBottom: '1rem', textAlign: 'center' }}>
                            {error}
                        </div>
                    )}
                    <button type="submit" className="btn btn-primary" style={{ width: '100%' }}>
                        🔐 Entrar
                    </button>
                </form>
            </div>
        </div>
    );
}

    const [exchanges, setExchanges] = useState([]);
    const [inventory, setInventory] = useState(INITIAL_INVENTORY);
    const [syncStatus, setSyncStatus] = useState('loading');
    const [loading, setLoading] = useState(false);
    const unsubscribeRef = useRef([]);
    const { toasts, show: showToast } = useToast();

    const waitForDB = () => new Promise(resolve => {
        const check = () => window.TrocaDB ? resolve() : setTimeout(check, 100);
        check();
    });

    useEffect(() => {
        if (!currentStore || currentStore.isAdmin) return;
        let unsubExchanges = null;
        let unsubInventory = null;
        (async () => {
            setLoading(true);
            await waitForDB();
            unsubExchanges = window.TrocaDB.ouvirTrocas(currentStore.id, (trocas) => {
                setExchanges(trocas);
                setSyncStatus('online');
                setLoading(false);
            });
            unsubInventory = window.TrocaDB.ouvirEstoque(
                currentStore.id, INITIAL_INVENTORY, (inv) => setInventory(inv)
            );
            unsubscribeRef.current = [unsubExchanges, unsubInventory];
        })().catch(() => { setSyncStatus('offline'); setLoading(false); });
        return () => unsubscribeRef.current.forEach(u => u && u());
    }, [currentStore]);

    const handleLogout = () => {
        if (confirm('Tem certeza que deseja sair?')) {
            unsubscribeRef.current.forEach(u => u && u());
            setCurrentStore(null); setCurrentPage('new-exchange'); setExchanges([]);
        }
    };

    const handleSaveInventory = async (newInventory) => {
        setInventory(newInventory);
        try {
            await waitForDB();
            await window.TrocaDB.salvarEstoque(currentStore.id, newInventory);
        } catch (e) { console.warn('Erro ao salvar estoque:', e); }
    };

    if (!currentStore) return <LoginScreen onLogin={setCurrentStore} />;
    if (currentStore.isAdmin) return <AdminView onLogout={handleLogout} showToast={showToast} />;
    if (loading) return (
        <div className="loading-overlay">
            <div className="loading-spinner"></div>
            <div className="loading-text">Conectando ao Firebase…</div>
        </div>
    );

    return (
        <div className="app-container">
            <ToastContainer toasts={toasts} />
            <aside className="sidebar">
                <div className="logo">🔄 TrocaFácil</div>
                <div className="store-info">
                    <div className="store-name">📍 {currentStore.name}</div>
                    <div className="sync-status">
                        <span className={`sync-dot ${syncStatus}`}></span>
                        <span style={{ color: syncStatus === 'online' ? 'var(--success)' : syncStatus === 'offline' ? 'var(--danger)' : 'var(--warning)' }}>
                            {syncStatus === 'online' ? 'Sincronizado' : syncStatus === 'offline' ? 'Offline' : 'Conectando…'}
                        </span>
                    </div>
                </div>
                <nav>
                    <ul className="nav-menu">
                        {[
                            { id: 'new-exchange', icon: '➕', label: 'Nova Troca' },
                            { id: 'history',      icon: '📋', label: 'Histórico' },
                            { id: 'inventory',    icon: '📦', label: 'Estoque' },
                            { id: 'reports',      icon: '📊', label: 'Relatórios' },
                        ].map(item => (
                            <li key={item.id} className="nav-item">
                                <div className={`nav-link ${currentPage === item.id ? 'active' : ''}`}
                                    onClick={() => setCurrentPage(item.id)}>
                                    <span className="nav-icon">{item.icon}</span>{item.label}
                                </div>
                            </li>
                        ))}
                    </ul>
                </nav>
                <button className="logout-btn" onClick={handleLogout}>🚪 Sair</button>
            </aside>
            <main className="main-content">
                {currentPage === 'new-exchange' &&
                    <NewExchangePage storeId={currentStore.id} inventory={inventory} showToast={showToast} />}
                {currentPage === 'history' &&
                    <HistoryPage storeId={currentStore.id} exchanges={exchanges} showToast={showToast} />}
                {currentPage === 'inventory' &&
                    <InventoryPage inventory={inventory} onSave={handleSaveInventory} showToast={showToast} />}
                {currentPage === 'reports' &&
                    <ReportsPage exchanges={exchanges} storeName={currentStore.name} />}
            </main>
        </div>
    );
}

// ─── CALENDÁRIO GLOBAL ADMIN ──────────────────────────────────────────────────
function AdminGlobalCalendar({ allExchanges, storeExchanges }) {
    const today = new Date();
    const [viewYear,  setViewYear]  = useState(today.getFullYear());
    const [viewMonth, setViewMonth] = useState(today.getMonth());
    const [selectedDay, setSelectedDay] = useState(null);
    const [filterStore, setFilterStore] = useState('all');
    const [selectedExchange, setSelectedExchange] = useState(null);

    // Build storeIndex map for coloring
    const storeIndexMap = useMemo(() => {
        const m = {};
        STORES.forEach((s, i) => { m[s.id] = i; });
        return m;
    }, []);

    const displayExchanges = useMemo(() => {
        if (filterStore === 'all') return allExchanges;
        return allExchanges.filter(ex => ex.storeId === filterStore);
    }, [allExchanges, filterStore]);

    // Map date → exchanges
    const exchangesByDay = useMemo(() => {
        const map = {};
        displayExchanges.forEach(ex => {
            if (!ex.date) return;
            const d = parseDateKey(ex.date);
            if (!d) return;
            const k = dateKey(d);
            if (!map[k]) map[k] = [];
            map[k].push(ex);
        });
        return map;
    }, [displayExchanges]);

    // Month exchanges
    const monthExchanges = useMemo(() => {
        return displayExchanges.filter(ex => {
            if (!ex.date) return false;
            const d = parseDateKey(ex.date);
            if (!d) return false;
            return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
        });
    }, [displayExchanges, viewYear, viewMonth]);

    // Available months (that have exchanges)
    const availableMonths = useMemo(() => {
        const set = new Set();
        allExchanges.forEach(ex => {
            if (!ex.date) return;
            const d = parseDateKey(ex.date);
            if (d) set.add(`${d.getFullYear()}-${d.getMonth()}`);
        });
        return Array.from(set).map(k => {
            const [y, m] = k.split('-').map(Number);
            return { year: y, month: m, key: k };
        }).sort((a,b) => b.year - a.year || b.month - a.month);
    }, [allExchanges]);

    // Calendar grid cells
    const calendarDays = useMemo(() => {
        const firstDay = new Date(viewYear, viewMonth, 1);
        const lastDay  = new Date(viewYear, viewMonth + 1, 0);
        const startWd  = firstDay.getDay();
        const days = [];
        for (let i = startWd - 1; i >= 0; i--) {
            days.push({ date: new Date(viewYear, viewMonth, -i), otherMonth: true });
        }
        for (let i = 1; i <= lastDay.getDate(); i++) {
            days.push({ date: new Date(viewYear, viewMonth, i), otherMonth: false });
        }
        const remaining = 7 - (days.length % 7);
        if (remaining < 7) {
            for (let i = 1; i <= remaining; i++) {
                days.push({ date: new Date(viewYear, viewMonth + 1, i), otherMonth: true });
            }
        }
        return days;
    }, [viewYear, viewMonth]);

    const prevMonth = () => {
        if (viewMonth === 0) { setViewYear(y => y - 1); setViewMonth(11); }
        else setViewMonth(m => m - 1);
        setSelectedDay(null);
    };
    const nextMonth = () => {
        if (viewMonth === 11) { setViewYear(y => y + 1); setViewMonth(0); }
        else setViewMonth(m => m + 1);
        setSelectedDay(null);
    };
    const goToday = () => { setViewYear(today.getFullYear()); setViewMonth(today.getMonth()); setSelectedDay(null); };

    const todayKey = dateKey(today);
    const selectedKey = selectedDay ? dateKey(selectedDay) : null;
    const selectedDayExchanges = selectedKey ? (exchangesByDay[selectedKey] || []) : [];

    const monthPending   = monthExchanges.filter(e => e.status === 'pending').length;
    const monthConfirmed = monthExchanges.filter(e => e.status === 'confirmed').length;
    const monthDiff      = monthExchanges.reduce((s, e) => s + (e.difference || 0), 0);

    // Stores that actually have exchanges this month
    const activeStoresThisMonth = useMemo(() => {
        const ids = new Set(monthExchanges.map(e => e.storeId));
        return STORES.filter(s => ids.has(s.id));
    }, [monthExchanges]);

    return (
        <div>
            {/* Month quick-jump tabs */}
            {availableMonths.length > 0 && (
                <div className="admin-month-tabs">
                    {availableMonths.slice(0, 12).map(({ year, month, key }) => (
                        <button
                            key={key}
                            className={`admin-month-tab ${viewYear === year && viewMonth === month ? 'active' : ''}`}
                            onClick={() => { setViewYear(year); setViewMonth(month); setSelectedDay(null); }}>
                            {MONTH_NAMES_PT[month].slice(0,3)} {year}
                        </button>
                    ))}
                </div>
            )}

            {/* Store filter */}
            <div className="admin-cal-filter-bar">
                <span style={{ fontSize:'0.85rem', color:'var(--text-secondary)', fontWeight:'600' }}>Filtrar loja:</span>
                <button className={`admin-cal-filter-btn ${filterStore === 'all' ? 'active' : ''}`} onClick={() => setFilterStore('all')}>🏪 Todas</button>
                {STORES.map((s, i) => (
                    <button key={s.id}
                        className={`admin-cal-filter-btn ${filterStore === s.id ? 'active' : ''}`}
                        style={ filterStore === s.id ? { borderColor: STORE_COLORS[i % STORE_COLORS.length].dot, color: STORE_COLORS[i % STORE_COLORS.length].dot, background: `${STORE_COLORS[i % STORE_COLORS.length].dot}18` } : {} }
                        onClick={() => setFilterStore(s.id)}>
                        {s.name}
                    </button>
                ))}
            </div>

            {/* Navigation */}
            <div className="calendar-nav">
                <div style={{ display:'flex', gap:'0.5rem', alignItems:'center' }}>
                    <button className="calendar-nav-btn" onClick={prevMonth}>‹</button>
                    <button className="calendar-nav-btn" onClick={nextMonth}>›</button>
                    <button className="btn btn-outline btn-small" style={{ marginLeft:'0.5rem' }} onClick={goToday}>Hoje</button>
                </div>
                <div className="calendar-month-label">
                    {MONTH_NAMES_PT[viewMonth]} {viewYear}
                </div>
                <div style={{ fontSize:'0.9rem', color:'var(--text-secondary)' }}>
                    {monthExchanges.length} troca{monthExchanges.length !== 1 ? 's' : ''} no mês
                </div>
            </div>

            {/* Summary bar */}
            <div className="calendar-summary-bar">
                <div className="cal-summary-item">
                    <span className="cal-summary-value" style={{ color:'var(--text-primary)' }}>{monthExchanges.length}</span>
                    <div className="cal-summary-label">Total do Mês</div>
                </div>
                <div className="cal-summary-item">
                    <span className="cal-summary-value" style={{ color:'var(--warning)' }}>{monthPending}</span>
                    <div className="cal-summary-label">⏳ Pendentes</div>
                </div>
                <div className="cal-summary-item">
                    <span className="cal-summary-value" style={{ color: monthDiff >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(Math.abs(monthDiff))}</span>
                    <div className="cal-summary-label">{monthDiff >= 0 ? '↗️ A receber' : '↙️ A devolver'}</div>
                </div>
            </div>

            {/* Legend – only stores present this month */}
            {activeStoresThisMonth.length > 0 && (
                <div className="store-legend">
                    {activeStoresThisMonth.map(s => {
                        const idx = STORES.findIndex(st => st.id === s.id);
                        const color = STORE_COLORS[idx % STORE_COLORS.length];
                        return (
                            <div key={s.id} className="store-legend-item">
                                <span className="store-legend-dot" style={{ background: color.dot }}></span>
                                {s.name}
                            </div>
                        );
                    })}
                </div>
            )}

            {/* Calendar grid */}
            <div className="calendar-grid">
                {DAY_NAMES_PT.map(d => <div key={d} className="calendar-weekday">{d}</div>)}
                {calendarDays.map(({ date, otherMonth }, idx) => {
                    const k   = dateKey(date);
                    const exs = exchangesByDay[k] || [];
                    const isToday = k === todayKey;
                    const isSel   = k === selectedKey && !otherMonth;

                    let cls = 'calendar-day';
                    if (otherMonth) cls += ' other-month';
                    if (exs.length > 0 && !otherMonth) cls += ' has-exchanges';
                    if (isToday) cls += ' today';
                    if (isSel) cls += ' selected';

                    const handleClick = () => {
                        if (otherMonth || exs.length === 0) return;
                        setSelectedDay(isSel ? null : date);
                    };

                    const MAX_PILLS = 3;
                    return (
                        <div key={idx} className={cls} onClick={handleClick}>
                            <div className="day-number">
                                {date.getDate()}
                                {isToday && <span className="day-today-dot" title="Hoje"></span>}
                            </div>
                            {!otherMonth && exs.slice(0, MAX_PILLS).map(ex => {
                                const stIdx = STORES.findIndex(s => s.id === ex.storeId);
                                const color = STORE_COLORS[stIdx % STORE_COLORS.length];
                                return (
                                    <span key={ex.id} className={`admin-cal-store-tag ${color.cls}`}
                                        title={`${ex.storeName} — #${ex.saleNumber} — ${ex.customerName}`}>
                                        {ex.storeName.split(' ')[0]} #{ex.saleNumber}
                                    </span>
                                );
                            })}
                            {!otherMonth && exs.length > MAX_PILLS && (
                                <span className="day-more-pill">+{exs.length - MAX_PILLS}</span>
                            )}
                        </div>
                    );
                })}
            </div>

            {/* Day detail panel */}
            {selectedDay && selectedDayExchanges.length > 0 && (
                <div className="cal-day-detail">
                    <div className="cal-day-detail-title">
                        <span>
                            📅 {selectedDay.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' })}
                            <span style={{ marginLeft:'0.75rem', fontSize:'0.9rem', color:'var(--text-secondary)', fontWeight:'400' }}>
                                {selectedDayExchanges.length} troca{selectedDayExchanges.length > 1 ? 's' : ''}
                            </span>
                        </span>
                        <button className="cal-day-detail-close" onClick={() => setSelectedDay(null)}>×</button>
                    </div>
                    {selectedDayExchanges.map(ex => {
                        const stIdx = STORES.findIndex(s => s.id === ex.storeId);
                        const color = STORE_COLORS[stIdx % STORE_COLORS.length];
                        return (
                            <div key={`${ex.storeId}-${ex.id}`} className="cal-exchange-row"
                                onClick={() => setSelectedExchange(ex)}>
                                <div>
                                    <div style={{ display:'flex', alignItems:'center', gap:'0.5rem', marginBottom:'0.2rem' }}>
                                        <span className={`admin-cal-store-tag ${color.cls}`} style={{ width:'auto', padding:'0.15rem 0.5rem', fontSize:'0.75rem' }}>
                                            {ex.storeName}
                                        </span>
                                    </div>
                                    <div style={{ fontWeight:'700' }}>#{ex.saleNumber} — {ex.customerName}</div>
                                    <div style={{ fontSize:'0.85rem', color:'var(--text-secondary)' }}>Vendedor: {ex.salesPerson || '-'}</div>
                                </div>
                                <div style={{ textAlign:'right' }}>
                                    <div style={{ fontWeight:'700', color: ex.difference >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(ex.difference)}</div>
                                    <span className={`badge badge-${ex.status}`} style={{ padding:'0.2rem 0.6rem', fontSize:'0.75rem' }}>
                                        {ex.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}
                                    </span>
                                </div>
                            </div>
                        );
                    })}
                </div>
            )}

            {/* Month list table */}
            {monthExchanges.length > 0 && (
                <div className="month-exchange-list">
                    <div className="month-list-title">📋 Todas as trocas de {MONTH_NAMES_PT[viewMonth]} {viewYear}</div>
                    <div className="table-container">
                        <table className="table">
                            <thead>
                                <tr>
                                    <th>Loja</th>
                                    <th>Data</th>
                                    <th>Nº Venda</th>
                                    <th>Cliente</th>
                                    <th>Vendedor</th>
                                    <th>Diferença</th>
                                    <th>Status</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                {monthExchanges
                                    .slice()
                                    .sort((a,b) => {
                                        const da = parseDateKey(a.date);
                                        const db_ = parseDateKey(b.date);
                                        return (db_ ? db_.getTime() : 0) - (da ? da.getTime() : 0);
                                    })
                                    .map(ex => {
                                        const stIdx = STORES.findIndex(s => s.id === ex.storeId);
                                        const color = STORE_COLORS[stIdx % STORE_COLORS.length];
                                        return (
                                            <tr key={`${ex.storeId}-${ex.id}`} style={{ cursor:'pointer' }}
                                                onClick={() => setSelectedExchange(ex)}>
                                                <td>
                                                    <span className={`admin-cal-store-tag ${color.cls}`} style={{ width:'auto', display:'inline-flex' }}>
                                                        {ex.storeName}
                                                    </span>
                                                </td>
                                                <td>{ex.date ? parseDateKey(ex.date).toLocaleDateString('pt-BR') : '-'}</td>
                                                <td style={{ fontWeight:'700' }}>{ex.saleNumber}</td>
                                                <td>{ex.customerName}</td>
                                                <td>{ex.salesPerson || '-'}</td>
                                                <td><span style={{ color: ex.difference >= 0 ? 'var(--success)' : 'var(--danger)', fontWeight:'700' }}>{fmt(ex.difference)}</span></td>
                                                <td><span className={`badge badge-${ex.status}`}>{ex.status === 'pending' ? '⏳ Pendente' : '✅ Confirmada'}</span></td>
                                                <td><button className="btn btn-primary btn-small" onClick={e => { e.stopPropagation(); setSelectedExchange(ex); }}>👁️</button></td>
                                            </tr>
                                        );
                                    })
                                }
                            </tbody>
                        </table>
                    </div>
                </div>
            )}

            {monthExchanges.length === 0 && (
                <div className="empty-state" style={{ marginTop:'2rem' }}>
                    <div className="empty-state-icon">🗓️</div>
                    <p>Nenhuma troca em {MONTH_NAMES_PT[viewMonth]} {viewYear}</p>
                </div>
            )}

            {selectedExchange && (
                <ExchangeModal
                    exchange={selectedExchange}
                    storeId={selectedExchange.storeId}
                    onClose={() => setSelectedExchange(null)}
                    readOnly={true}
                />
            )}
        </div>
    );
}

// ─── ADMIN VIEW ───────────────────────────────────────────────────────────────
function AdminView({ onLogout, showToast }) {
    const [storeExchanges, setStoreExchanges] = useState({});

    const [selectedExchange, setSelectedExchange] = useState(null);

        const waitForDB = () => new Promise(resolve => {
            const check = () => window.TrocaDB ? resolve() : setTimeout(check, 100);
            check();
        });
        (async () => {
            await waitForDB();
            unsubRef.current = window.TrocaDB.ouvirTodasLojas(STORES, (storeId, trocas) => {
                setStoreExchanges(prev => ({ ...prev, [storeId]: trocas }));
                setLoading(false);
            });
        })();
        return () => unsubRef.current && unsubRef.current();
    }, []);

    const allExchanges = Object.values(storeExchanges).flat()
        .sort((a, b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
    const filteredExchanges = selectedStore === 'all' ? allExchanges : allExchanges.filter(ex => ex.storeId === selectedStore);
    const totalDifference = allExchanges.reduce((sum, ex) => sum + (ex.difference || 0), 0);

        if (allExchanges.length === 0) { alert('Não há dados para exportar'); return; }
        const wb = XLSX.utils.book_new();
        const summaryData = [
            ['Relatório Consolidado - Todas as Lojas'],
            ['Data de Geração:', new Date().toLocaleString('pt-BR')],[''],
            ['Total de Trocas:', allExchanges.length],
            ['Pendentes:', allExchanges.filter(e => e.status === 'pending').length],
            ['Confirmadas:', allExchanges.filter(e => e.status === 'confirmed').length],

            'Vendedor': ex.salesPerson || '', 'Valor Saída': ex.outTotal,
            'Valor Entrada': ex.inTotal, 'Diferença': ex.difference,
            'Status': ex.status === 'pending' ? 'Pendente' : 'Confirmado'
        }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), 'Todas as Trocas');

                                <span className="nav-icon">📊</span>Dashboard Geral

                            <div className={`nav-link ${adminPage === 'calendar' ? 'active' : ''}`}
                                onClick={() => setAdminPage('calendar')}>
                                <span className="nav-icon">🗓️</span>Calendário Global
                            </div>
                        </li>
                    </ul>
                </nav>
                <button className="logout-btn" onClick={onLogout}>🚪 Sair</button>
            </aside>
            <main className="main-content">

                            <h1 className="page-title">🗓️ Calendário Global</h1>

                            <h1 className="page-title">👨‍💼 Painel do Administrador</h1>
                            <p className="page-subtitle">Dados sincronizados em tempo real • Firebase Firestore</p>
                        </div>
                        <div className="action-buttons">
                            <button className="btn btn-success" onClick={handleExportAll}>📥 Exportar Consolidado</button>

                            <div className="stat-card"><span className="stat-icon">✅</span><span className="stat-value">{allExchanges.filter(e => e.status === 'confirmed').length}</span><span className="stat-label">Confirmadas</span></div>
                        </div>
                        <div className="card">
                            <h2 className="card-title">💰 Diferença Total Consolidada</h2>
                            <div style={{ textAlign: 'center', padding: '2rem' }}>

                                </div>

                        <div className="card">
                            <h2 className="card-title">📊 Desempenho por Loja</h2>
                            <div className="table-container">
                                <table className="table">
                                    <thead><tr><th>Loja</th><th>Total Trocas</th><th>Pendentes</th><th>Confirmadas</th><th>Diferença Total</th></tr></thead>
