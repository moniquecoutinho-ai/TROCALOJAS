    const diff = exchange.difference || 0;
    return (
        <div id="print-receipt" style={{ position:'fixed', top:0, left:0, width:'100%', zIndex:99999, background:'white', display:'flex', alignItems:'flex-start', justifyContent:'center', padding:'2rem', minHeight:'100vh' }}>
            <div className="receipt-wrap" style={{ width:'380px' }}>
                <div className="receipt-logo">TROCAFACIL</div>
                <div className="receipt-sub">Comprovante de Troca</div>
                <hr className="receipt-divider" />
                <div className="receipt-row"><span>Filial:</span><strong>{storeName || exchange.storeName || '-'}</strong></div>
                <div className="receipt-row"><span>No Venda:</span><strong>{exchange.saleNumber}</strong></div>
                <div className="receipt-row"><span>Data:</span><strong>{exchange.date ? new Date(exchange.date).toLocaleDateString('pt-BR') : '-'}</strong></div>
                <div className="receipt-row"><span>Cliente:</span><strong>{exchange.customerName}</strong></div>
                {exchange.salesPerson && <div className="receipt-row"><span>Vendedor:</span><strong>{exchange.salesPerson}</strong></div>}
                <hr className="receipt-divider" />
                <div className="receipt-section-title">PRODUTOS DE SAIDA</div>
                {(exchange.outgoingItems||[]).map((item, i) => <div key={i} className="receipt-item"><span>{item.description}</span><strong>{fmt(parseFloat(item.value||0))}</strong></div>)}
                <div className="receipt-total"><span>TOTAL SAIDA</span><span>{fmt(exchange.outTotal||0)}</span></div>
                <hr className="receipt-divider" />
                <div className="receipt-section-title">PRODUTOS DE ENTRADA</div>
                {(exchange.incomingItems||[]).map((item, i) => <div key={i} className="receipt-item"><span>{item.description}</span><strong>{fmt(parseFloat(item.value||0))}</strong></div>)}
                <div className="receipt-total"><span>TOTAL ENTRADA</span><span>{fmt(exchange.inTotal||0)}</span></div>
                <hr className="receipt-divider" />
                <div className="receipt-diff" style={{ borderColor: diff >= 0 ? '#16a34a' : '#dc2626', color: diff >= 0 ? '#16a34a' : '#dc2626' }}>
                    {diff > 0 && 'CLIENTE PAGA: ' + fmt(diff)}
                    {diff < 0 && 'LOJA DEVOLVE: ' + fmt(Math.abs(diff))}
                    {diff === 0 && 'TROCA EQUILIBRADA'}
                </div>
                <div className="receipt-sig">
                    <div className="receipt-section-title">ASSINATURA DO CLIENTE</div>
                    <div className="receipt-sig-line">Assinatura</div>
                    <div className="receipt-sig-line" style={{ marginTop:'2rem' }}>Nome legivel</div>
                </div>
                <div className="receipt-footer">Gerado em {new Date().toLocaleString('pt-BR')} - TrocaFacil</div>
            </div>
        </div>
    );
}

function EditExchangeModal({ exchange, storeId, onClose, onSaved }) {
    const [form, setForm] = useState({
        saleNumber: exchange.saleNumber||'', customerName: exchange.customerName||'',
        customerCPF: exchange.customerCPF||'', salesPerson: exchange.salesPerson||'',
        date: exchange.date||new Date().toISOString().split('T')[0],
        observations: exchange.observations||'', status: exchange.status||'pending',
    });
    const [outgoingItems, setOutgoingItems] = useState(exchange.outgoingItems || []);
    const [incomingItems, setIncomingItems] = useState(exchange.incomingItems || []);
    const [newOut, setNewOut] = useState({ description:'', value:'' });
    const [newIn, setNewIn] = useState({ description:'', value:'', condition:'Novo' });
    const [saving, setSaving] = useState(false);

    const outTotal = outgoingItems.reduce((s, i) => s + parseFloat(i.value||0), 0);
    const inTotal  = incomingItems.reduce((s, i) => s + parseFloat(i.value||0), 0);
    const difference = outTotal - inTotal;

    const addOut = () => { if (!newOut.description||!newOut.value) return; setOutgoingItems(p => [...p, { id:Date.now(), description:newOut.description, value:parseFloat(newOut.value) }]); setNewOut({ description:'', value:'' }); };
    const addIn  = () => { if (!newIn.description||!newIn.value) return; setIncomingItems(p => [...p, { id:Date.now(), description:newIn.description, value:parseFloat(newIn.value), condition:newIn.condition }]); setNewIn({ description:'', value:'', condition:'Novo' }); };

    const handleSave = async () => {
        if (!form.saleNumber||!form.customerName||!form.salesPerson) { alert('Preencha os campos obrigatorios'); return; }
        setSaving(true);
        try {
            await window.TrocaDB.atualizarTroca(storeId, exchange.id, { ...form, outgoingItems, incomingItems, outTotal, inTotal, difference });
            onSaved();
        } catch(e) { console.error(e); alert('Erro ao salvar'); }
        finally { setSaving(false); }
    };

    const setF = (k, v) => setForm(p => ({ ...p, [k]: v }));

    return (
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal-content" style={{ maxWidth:'800px' }} onClick={e => e.stopPropagation()}>
                <div className="modal-header"><h2 className="modal-title">✏️ Editar Troca #{exchange.saleNumber}</h2><button className="modal-close" onClick={onClose}>×</button></div>
                <div className="modal-body">
                    <div className="form-row">
                        <div className="form-group"><label className="form-label">No da Venda *</label><input className="form-input" value={form.saleNumber} onChange={e => setF('saleNumber', e.target.value)} /></div>
                        <div className="form-group"><label className="form-label">Cliente *</label><input className="form-input" value={form.customerName} onChange={e => setF('customerName', e.target.value)} /></div>
                        <div className="form-group"><label className="form-label">Vendedor *</label><input className="form-input" value={form.salesPerson} onChange={e => setF('salesPerson', e.target.value)} /></div>
                        <div className="form-group"><label className="form-label">Data</label><input type="date" className="form-input" value={form.date} onChange={e => setF('date', e.target.value)} /></div>
                        <div className="form-group"><label className="form-label">Status</label>
                            <select className="form-select" value={form.status} onChange={e => setF('status', e.target.value)}>
                                <option value="pending">⏳ Pendente</option><option value="confirmed">✅ Confirmada</option>
                            </select>
                        </div>
                    </div>
                    <div className="form-group"><label className="form-label">Observacoes</label><textarea className="form-textarea" value={form.observations} onChange={e => setF('observations', e.target.value)} /></div>
                    <div style={{ borderTop:'1px solid var(--border)', paddingTop:'1.5rem', marginBottom:'1.5rem' }}>
                        <div style={{ fontWeight:'700', marginBottom:'1rem' }}>📤 Saida</div>
                        <div className="form-row">
                            <div className="form-group"><input className="form-input" placeholder="Descricao" value={newOut.description} onChange={e => setNewOut({...newOut, description:e.target.value})} /></div>
                            <div className="form-group"><input type="number" step="0.01" className="form-input" placeholder="Valor" value={newOut.value} onChange={e => setNewOut({...newOut, value:e.target.value})} /></div>
                            <div className="form-group" style={{ display:'flex', alignItems:'flex-end' }}><button type="button" className="btn btn-primary" onClick={addOut} style={{ width:'100%' }}>➕</button></div>
                        </div>
                        {outgoingItems.map(item => <div key={item.id} className="item-card"><div className="item-info"><div className="item-description">{item.description}</div><div className="item-value">{fmt(parseFloat(item.value))}</div></div><button type="button" className="btn btn-danger btn-small" onClick={() => setOutgoingItems(p => p.filter(i => i.id !== item.id))}>🗑️</button></div>)}
                        {outgoingItems.length > 0 && <div style={{ textAlign:'right', fontWeight:'700', padding:'0.75rem', background:'var(--bg-dark)', borderRadius:'8px', marginTop:'0.5rem' }}>Total: {fmt(outTotal)}</div>}
                    </div>
                    <div style={{ borderTop:'1px solid var(--border)', paddingTop:'1.5rem', marginBottom:'1.5rem' }}>
                        <div style={{ fontWeight:'700', marginBottom:'1rem' }}>📥 Entrada</div>
                        <div className="form-row">
                            <div className="form-group"><input className="form-input" placeholder="Descricao" value={newIn.description} onChange={e => setNewIn({...newIn, description:e.target.value})} /></div>
                            <div className="form-group"><input type="number" step="0.01" className="form-input" placeholder="Valor" value={newIn.value} onChange={e => setNewIn({...newIn, value:e.target.value})} /></div>
                            <div className="form-group"><select className="form-select" value={newIn.condition} onChange={e => setNewIn({...newIn, condition:e.target.value})}><option>Novo</option><option>Usado - Otimo</option><option>Usado - Bom</option><option>Danificado</option></select></div>
                            <div className="form-group" style={{ display:'flex', alignItems:'flex-end' }}><button type="button" className="btn btn-primary" onClick={addIn} style={{ width:'100%' }}>➕</button></div>
                        </div>
                        {incomingItems.map(item => <div key={item.id} className="item-card"><div className="item-info"><div className="item-description">{item.description}</div><div className="item-value">{fmt(parseFloat(item.value))}</div><div className="item-condition">{item.condition}</div></div><button type="button" className="btn btn-danger btn-small" onClick={() => setIncomingItems(p => p.filter(i => i.id !== item.id))}>🗑️</button></div>)}
                        {incomingItems.length > 0 && <div style={{ textAlign:'right', fontWeight:'700', padding:'0.75rem', background:'var(--bg-dark)', borderRadius:'8px', marginTop:'0.5rem' }}>Total: {fmt(inTotal)}</div>}
                    </div>
                    {outgoingItems.length > 0 && incomingItems.length > 0 && (
                        <div style={{ background: difference >= 0 ? 'rgba(6,214,160,0.1)' : 'rgba(239,71,111,0.1)', border:`2px solid ${difference >= 0 ? 'var(--success)' : 'var(--danger)'}`, borderRadius:'12px', padding:'1.5rem', marginBottom:'1.5rem', textAlign:'center' }}>
                            <div style={{ fontSize:'2rem', fontWeight:'800', color: difference >= 0 ? 'var(--success)' : 'var(--danger)' }}>{fmt(Math.abs(difference))}</div>
                            <div style={{ color:'var(--text-secondary)' }}>{difference > 0 ? '↗️ Cliente paga' : difference < 0 ? '↙️ Cliente recebe' : '✅ Equilibrada'}</div>
                        </div>
                    )}
                    <div style={{ display:'flex', gap:'1rem' }}>
                        <button className="btn btn-outline" style={{ flex:1 }} onClick={onClose}>Cancelar</button>
                        <button className="btn btn-success" style={{ flex:2 }} onClick={handleSave} disabled={saving}>{saving ? '⏳ Salvando...' : '💾 Salvar'}</button>
                    </div>
                </div>
            </div>
        </div>
    );
}

function AdminSeedPage({ showToast }) {
    const [seeding, setSeeding] = useState(false);
    const [done, setDone] = useState([]);

    const handleSeed = async () => {
        if (!confirm('Isso vai SUBSTITUIR o estoque de TODAS as filiais. Confirmar?')) return;
        setSeeding(true); setDone([]);
        try {
            const results = await window.TrocaDB.seedInventoryAllStores(STORES.map(s => s.id), INITIAL_INVENTORY);
            setDone(results);
            showToast('Estoque sincronizado em todas as filiais! ✅');
        } catch(e) {
            console.error(e);
            showToast('Erro ao sincronizar estoque', 'error');
        } finally { setSeeding(false); }
    };

    return (
        <div>
            <div className="header"><h1 className="page-title">📦 Sincronizar Estoque</h1><p className="page-subtitle">Aplica o catalogo padrao em todas as filiais</p></div>
            <div className="card">
                <div style={{ padding:'1rem', background:'rgba(247,179,43,0.1)', border:'1px solid var(--accent)', borderRadius:'12px', marginBottom:'1.5rem', fontSize:'0.95rem', color:'var(--accent)' }}>
                    ⚠️ Esta acao substitui o estoque atual de todas as filiais pelo catalogo padrao.
                </div>
                <button className="btn btn-primary" style={{ width:'100%', fontSize:'1.1rem', padding:'1.25rem' }} onClick={handleSeed} disabled={seeding}>
                    {seeding ? '⏳ Sincronizando...' : '🚀 Aplicar estoque em todas as filiais'}
                </button>
                {done.length > 0 && (
                    <div style={{ marginTop:'1.5rem' }}>
                        <div style={{ fontWeight:'700', marginBottom:'1rem', color:'var(--success)' }}>✅ Sincronizado com sucesso em:</div>
                        <div style={{ display:'flex', flexWrap:'wrap', gap:'0.5rem' }}>
                            {STORES.filter(s => done.includes(s.id)).map(s => <span key={s.id} className="badge badge-confirmed">{s.name}</span>)}
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
}

try {
    if (window.__FIREBASE_ERROR__) {
        document.getElementById('root').innerHTML =
            '<div style="padding:3rem;font-family:sans-serif;color:#fff;text-align:center;max-width:600px;margin:0 auto;">' +
            '<h2>⚠️ Firebase não conectou</h2><p style="color:#A0AEC0;">' + window.__FIREBASE_ERROR__ + '</p>' +
            '<p style="color:#718096;font-size:0.9rem;margin-top:1rem;">Possíveis causas: sem internet, navegador bloqueando gstatic.com, ou extensão de bloqueio ativa.</p></div>';
    } else {
        ReactDOM.render(<App />, document.getElementById('root'));
    }
} catch (err) {
    document.getElementById('root').innerHTML =
        '<div style="padding:3rem;font-family:sans-serif;color:#fff;text-align:center;">' +
        '<h2>⚠️ Erro ao iniciar o sistema</h2><p>' + err.message + '</p></div>';
    console.error(err);
}
</script>
